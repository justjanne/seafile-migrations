databaseChangeLog:
  - changeSet:
      id: V013_EmailUser-normalize
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          tableExists:
            tableName: EmailUser
      changes:
        - renameTable:
            oldTableName: EmailUser
            newTableName: emailuser
  - changeSet:
      id: V013_EmailUser-table
      author: seafile
      preConditions:
        onFail: MARK_RAN
        not:
          tableExists:
            tableName: emailuser
      changes:
        - createTable:
            tableName: emailuser
            columns:
              - column:
                  name: id
                  type: serial
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: email
                  type: varchar(255)
                  constraints:
                    unique: true
              - column:
                  name: passwd
                  type: varchar(255)
              - column:
                  name: is_staff
                  type: boolean
                  constraints:
                    nullable: false
              - column:
                  name: is_active
                  type: boolean
                  constraints:
                    nullable: false
              - column:
                  name: ctime
                  type: bigint
