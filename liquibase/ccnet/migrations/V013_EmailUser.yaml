databaseChangeLog:
  - changeSet:
      id: V013_rename_EmailUser_to_emailuser
      author: seafile
      failOnError: false
      preConditions:
        - tableExists:
            tableName: EmailUser
      changes:
        - renameTable:
            oldTableName: EmailUser
            newTableName: emailuser
  - changeSet:
      id: V013_create_emailuser
      author: seafile
      changes:
        - createTable:
            tableName: emailuser
            ifNotExists: true
            columns:
              - column:
                  name: id
                  type: serial
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: email
                  type: varchar(255)
                  constraints:
                    unique: true
              - column:
                  name: passwd
                  type: varchar(255)
              - column:
                  name: is_staff
                  type: boolean
                  constraints:
                    nullable: false
              - column:
                  name: is_active
                  type: boolean
                  constraints:
                    nullable: false
              - column:
                  name: ctime
                  type: bigint
