databaseChangeLog:
  - changeSet:
      id: V063_normalize_ldapusers_pkey_purge
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          and:
            - primaryKeyExists:
                tableName: ldapusers
            - not:
                - columnExists:
                    tableName: ldapusers
                    columnName: id
      changes:
        - dropPrimaryKey:
            tableName: ldapusers
  - changeSet:
      id: V063_normalize_LDAPUsers_pkey_purge
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: ldapusers
            indexName: LDAPUsers_pkey
      changes:
        - dropPrimaryKey:
            tableName: ldapusers
            constraintName: LDAPUsers_pkey
  - changeSet:
      id: V063_normalize_LDAPUsers_id_pkey_purge
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          primaryKeyExists:
            tableName: ldapusers
            primaryKeyName: LDAPUsers_id_pkey
      changes:
        - dropPrimaryKey:
            tableName: ldapusers
            constraintName: LDAPUsers_id_pkey
  - changeSet:
      id: V063_change_id_type_in_ldapusers
      author: seafile
      changes:
        - modifyDataType:
            tableName: ldapusers
            columnName: id
            newDataType: bigserial
  - changeSet:
      id: V063_normalize_ldapusers_pkey_rebuild
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - primaryKeyExists:
                tableName: ldapusers
      changes:
        - addPrimaryKey:
            tableName: ldapusers
            columnNames: id
            constraintName: ldapusers_pkey
  - changeSet:
      id: V063_normalize_ldapusers_id_autoincrement
      author: seafile
      dbms: mysql,mariadb
      changes:
        - addAutoIncrement:
            tableName: ldapusers
            columnName: id
            columnDataType: bigint