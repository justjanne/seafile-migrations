databaseChangeLog:
- changeSet:
    id: V041_LDAPUsers
    author: seafile
    changes:
    - createTable:
        tableName: ldapusers
        columns:
        - column:
            name: id
            type: int
            autoIncrement: true
            constraints:
              primaryKey: true
              nullable: false
        - column:
            name: email
            type: varchar(255)
            constraints:
              nullable: false
        - column:
            name: password
            type: varchar(255)
            constraints:
              nullable: false
        - column:
            name: is_staff
            type: boolean
            constraints:
              nullable: false
        - column:
            name: is_active
            type: boolean
            constraints:
              nullable: false
        - column:
            name: extra_attrs
            type: text
    - dropIndex:
        tableName: ldapusers
        indexName: email
    - dropIndex:
        tableName: ldapusers
        indexName: ldapusers_email_idx
    - dropIndex:
        tableName: ldapusers
        indexName: email
    - dropIndex:
        tableName: ldapusers
        indexName: ldapusers_email_idx
    - dropIndex:
        tableName: ldapusers
        indexName: reference_id
    - dropIndex:
        tableName: ldapusers
        indexName: ldapusers_reference_id_idx
    - createIndex:
        tableName: ldapusers
        indexName: idx_ldapusers_email
        columns:
        - column:
            name: email
    preConditions:
      onFail: MARK_RAN
      not:
        tableExists:
          tableName: ldapusers
    failOnError: false
