databaseChangeLog:
  - changeSet:
      id: V062_EmailUser_reference_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - columnExists:
                tableName: emailuser
                columnName: reference_id
      changes:
        - addColumn:
            tableName: emailuser
            columns:
              - column:
                  name: reference_id
                  type: varchar(255)
  - changeSet:
      id: V062_EmailUser_normalize_reference_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: emailuser
            indexName: emailuser_reference_id_key
      changes:
        - dropUniqueConstraint:
            tableName: emailuser
            constraintName: emailuser_reference_id_key
  - changeSet:
      id: V062_EmailUser_index_reference_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: emailuser
                indexName: idx_emailuser_reference_id
      changes:
        - addUniqueConstraint:
            tableName: emailuser
            constraintName: idx_emailuser_reference_id
            columnNames: reference_id

