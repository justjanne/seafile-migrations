databaseChangeLog:
- changeSet:
    id: V062_EmailUser
    author: seafile
    changes:
    - addColumn:
        tableName: emailuser
        columns:
        - column:
            name: reference_id
            type: varchar(255)
    - createIndex:
        indexName: reference_id
        tableName: emailuser
        columns:
        - column:
            name: reference_id
        unique: true
    preConditions:
      onFail: CONTINUE
      not:
        columnExists:
          tableName: emailuser
          columnName: reference_id
