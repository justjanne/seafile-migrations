databaseChangeLog:
- changeSet:
    id: V062_LDAPConfig
    author: seafile
    changes:
    - createTable:
        tableName: ldapconfig
        columns:
        - column:
            name: cfg_group
            type: varchar(255)
            constraints:
              nullable: false
        - column:
            name: cfg_key
            type: varchar(255)
            constraints:
              nullable: false
        - column:
            name: value
            type: varchar(255)
        - column:
            name: property
            type: int
    preConditions:
      onFail: MARK_RAN
      not:
        tableExists:
          tableName: ldapconfig
