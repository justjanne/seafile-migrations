databaseChangeLog:
  - changeSet:
      id: V013_OrgGroup
      author: seafile
      changes:
        - createTable:
            tableName: OrgGroup
            columns:
              - column:
                  name: org_id
                  type: int
              - column:
                  name: group_id
                  type: int
        - addUniqueConstraint:
            columnNames: org_id, group_id
            tableName: OrgGroup
        - createIndex:
            indexName: orggroup_groupid_idx
            tableName: OrgGroup
            columns:
              - column:
                  name: group_id
