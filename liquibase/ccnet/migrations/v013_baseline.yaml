databaseChangeLog:
  - changeSet:
      id: v013-baseline-Binding
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not: { tableExists: { tableName: binding } }
      changes:
        - createTable:
            tableName: binding
            columns:
              - column: { name: email, type: varchar(255) }
              - column: { name: peer_id, type: char(41), constraints: { unique: true } }
        - createIndex: { indexName: idx_Binding_email, tableName: binding, columns: [ { name: email } ] }

  - changeSet:
      id: v013-baseline-EmailUser
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not: { tableExists: { tableName: emailuser } }
      changes:
        - createTable:
            tableName: emailuser
            columns:
              - column: { name: id, type: int, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: email, type: varchar(255), constraints: { unique: true } }
              - column: { name: passwd, type: char(41) }
              - column: { name: is_staff, type: boolean, constraints: { nullable: false } }
              - column: { name: is_active, type: boolean, constraints: { nullable: false } }
              - column: { name: ctime, type: bigint }

  - changeSet:
      id: v013-baseline-Group
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not: { tableExists: { tableName: "Group" } }
      changes:
        - createTable:
            tableName: "Group"
            columns:
              - column: { name: group_id, type: int, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: group_name, type: varchar(255) }
              - column: { name: creator_name, type: varchar(255) }
              - column: { name: timestamp, type: bigint }

  - changeSet:
      id: v013-baseline-GroupUser
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not: { tableExists: { tableName: groupuser } }
      changes:
        - createTable:
            tableName: groupuser
            columns:
              - column: { name: group_id, type: int }
              - column: { name: user_name, type: varchar(255) }
              - column: { name: is_staff, type: smallint }
        - addUniqueConstraint: { columnNames: "group_id, user_name", constraintName: uq_GroupUser_group_user, tableName: groupuser }
        - createIndex: { indexName: idx_GroupUser_user_name, tableName: groupuser, columns: [ { name: user_name } ] }

  - changeSet:
      id: v013-baseline-OrgGroup
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not: { tableExists: { tableName: orggroup } }
      changes:
        - createTable:
            tableName: orggroup
            columns:
              - column: { name: org_id, type: int }
              - column: { name: group_id, type: int }
        - addUniqueConstraint: { columnNames: "org_id, group_id", constraintName: uq_OrgGroup_org_group, tableName: orggroup }
        - createIndex: { indexName: idx_OrgGroup_group_id, tableName: orggroup, columns: [ { name: group_id } ] }

  - changeSet:
      id: v013-baseline-OrgUser
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not: { tableExists: { tableName: orguser } }
      changes:
        - createTable:
            tableName: orguser
            columns:
              - column: { name: org_id, type: int }
              - column: { name: email, type: varchar(255) }
              - column: { name: is_staff, type: boolean, constraints: { nullable: false } }
        - addUniqueConstraint: { columnNames: "org_id, email", constraintName: uq_OrgUser_org_email, tableName: orguser }
        - createIndex: { indexName: idx_OrgUser_email, tableName: orguser, columns: [ { name: email } ] }

  - changeSet:
      id: v013-baseline-Organization
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not: { tableExists: { tableName: organization } }
      changes:
        - createTable:
            tableName: organization
            columns:
              - column: { name: org_id, type: int, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: org_name, type: varchar(255) }
              - column: { name: url_prefix, type: varchar(255), constraints: { unique: true } }
              - column: { name: creator, type: varchar(255) }
              - column: { name: ctime, type: bigint }
