databaseChangeLog:
- changeSet:
    id: V063_Binding
    author: seafile
    changes:
    - addColumn:
        tableName: binding
        columns:
        - column:
            name: id
            type: bigint
            autoIncrement: true
            constraints:
              primaryKey: true
              nullable: false
    preConditions:
      onFail: MARK_RAN
      not:
        columnExists:
          tableName: binding
          columnName: id
