databaseChangeLog:
  - changeSet:
      id: V063_normalize_binding_pkey
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          primaryKeyExists:
            tableName: binding
            primaryKeyName: binding_id_pkey
      changes:
        - dropPrimaryKey:
            tableName: binding
        - addPrimaryKey:
            tableName: binding
            columnNames: id
            constraintName: binding_pkey
  - changeSet:
      id: V063_add_id_to_binding
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - columnExists:
                tableName: binding
                columnName: id
      changes:
        - addColumn:
            tableName: binding
            ifNotExists: true
            columns:
              - column:
                  name: id
                  type: bigserial
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
  - changeSet:
      id: V063_change_id_type_in_binding
      author: seafile
      changes:
        - modifyDataType:
            tableName: binding
            columnName: id
            newDataType: bigserial
  - changeSet:
      id: V063_normalize_binding_id_autoincrement
      author: seafile
      dbms: mysql,mariadb
      changes:
        - addAutoIncrement:
            tableName: binding
            columnName: id
            columnDataType: bigint
