databaseChangeLog:
  - changeSet:
      id: v063-update-binding-id
      author: seafile
      preConditions:
        - onFail: CONTINUE
          not:
            columnExists:
              tableName: "${t_Binding}"
              columnName: id
      changes:
        - addColumn:
            tableName: "${t_Binding}"
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

  - changeSet:
      id: v063-update-emailuser-id-type
      author: seafile
      changes:
        - modifyDataType:
            tableName: "${t_EmailUser}"
            columnName: id
            newDataType: bigint

  - changeSet:
      id: v063-update-group-id-type
      author: seafile
      changes:
        - modifyDataType:
            tableName: "${t_Group}"
            columnName: group_id
            newDataType: bigint
        - addColumn:
            tableName: "${t_Group}"
            columns:
              - column:
                  name: parent_group_id
                  type: int
      preConditions:
        - onFail: CONTINUE
          not:
            columnExists:
              tableName: "${t_Group}"
              columnName: parent_group_id

  - changeSet:
      id: v063-create-groupstructure
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not: { tableExists: { tableName: "${t_GroupStructure}" } }
      changes:
        - createTable:
            tableName: "${t_GroupStructure}"
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: group_id
                  type: int
                  constraints:
                    unique: true
              - column:
                  name: path
                  type: varchar(1024)

  - changeSet:
      id: v063-update-groupuser-id
      author: seafile
      preConditions:
        - onFail: CONTINUE
          not:
            columnExists:
              tableName: "${t_GroupUser}"
              columnName: id
      changes:
        - dropPrimaryKey:
            tableName: "${t_GroupUser}"
        - addColumn:
            tableName: "${t_GroupUser}"
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
        - modifyDataType:
            tableName: "${t_GroupUser}"
            columnName: group_id
            newDataType: bigint

  - changeSet:
      id: v063-update-ldapconfig-id
      author: seafile
      preConditions:
        - onFail: CONTINUE
          not:
            columnExists:
              tableName: "${t_LDAPConfig}"
              columnName: id
      changes:
        - addColumn:
            tableName: "${t_LDAPConfig}"
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

  - changeSet:
      id: v063-update-ldapusers-id-type
      author: seafile
      changes:
        - modifyDataType:
            tableName: "${t_LDAPUsers}"
            columnName: id
            newDataType: bigint

  - changeSet:
      id: v063-update-organization-id-type
      author: seafile
      changes:
        - modifyDataType:
            tableName: "${t_Organization}"
            columnName: org_id
            newDataType: bigint

  - changeSet:
      id: v063-update-orggroup-id
      author: seafile
      preConditions:
        - onFail: CONTINUE
          not:
            columnExists:
              tableName: "${t_OrgGroup}"
              columnName: id
      changes:
        - dropPrimaryKey:
            tableName: "${t_OrgGroup}"
        - addColumn:
            tableName: "${t_OrgGroup}"
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

  - changeSet:
      id: v063-update-orguser-id
      author: seafile
      preConditions:
        - onFail: CONTINUE
          not:
            columnExists:
              tableName: "${t_OrgUser}"
              columnName: id
      changes:
        - dropPrimaryKey:
            tableName: "${t_OrgUser}"
        - addColumn:
            tableName: "${t_OrgUser}"
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
