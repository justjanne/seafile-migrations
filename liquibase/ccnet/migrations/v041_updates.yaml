databaseChangeLog:
  - changeSet:
      id: v041-update-group-type
      author: seafile
      preConditions:
        - onFail: CONTINUE
          not:
            columnExists:
              tableName: "${t_Group}"
              columnName: type
      changes:
        - addColumn:
            tableName: "${t_Group}"
            columns:
              - column:
                  name: type
                  type: varchar(32)

  - changeSet:
      id: v041-create-ldapusers
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not: { tableExists: { tableName: "${t_LDAPUsers}" } }
      changes:
        - createTable:
            tableName: "${t_LDAPUsers}"
            columns:
              - column:
                  name: id
                  type: int
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: email
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: password
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: is_staff
                  type: boolean
                  constraints:
                    nullable: false
              - column:
                  name: is_active
                  type: boolean
                  constraints:
                    nullable: false
              - column:
                  name: extra_attrs
                  type: text
        - createIndex:
            indexName: idx_ldapusers_email
            tableName: "${t_LDAPUsers}"
            columns:
              - column:
                  name: email

  - changeSet:
      id: v041-create-groupdnpair
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not: { tableExists: { tableName: "${t_GroupDNPair}" } }
      changes:
        - createTable:
            tableName: "${t_GroupDNPair}"
            columns:
              - column:
                  name: group_id
                  type: int
              - column:
                  name: dn
                  type: varchar(255)
