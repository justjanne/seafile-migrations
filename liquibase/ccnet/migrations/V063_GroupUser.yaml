databaseChangeLog:
  - {{migration_add_pkey(V063,GroupUser,id)}}
  - changeSet:
      id: V063_change_group_id_type_in_groupuser
      author: seafile
      changes:
        - modifyDataType:
            tableName: groupuser
            columnName: group_id
            newDataType: bigint
  - changeSet:
      id: V063_normalize_groupuser_group_id_idx
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: groupuser
            indexName: groupuser_group_id_user_name_key
      changes:
        - dropUniqueConstraint:
            tableName: groupuser
            constraintName: groupuser_group_id_user_name_key
  - changeSet:
      id: V063_add_unique_constraint_to_groupuser_group_id_user_name
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: groupuser
                indexName: idx_groupuser_group_id
      changes:
        - addUniqueConstraint:
            tableName: groupuser
            columnNames: 'group_id,user_name'
            constraintName: idx_groupuser_group_id
