databaseChangeLog:
  - changeSet:
      id: V013_Group_normalize
      author: seafile
      failOnError: false
      preConditions:
        - tableExists:
            tableName: Group
      changes:
        - renameTable:
            oldTableName: Group
            newTableName: group
  - changeSet:
      id: V013_Group_table
      author: seafile
      changes:
        - createTable:
            ifNotExists: true
            tableName: group
            columns:
              - column:
                  name: group_id
                  type: int
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: group_name
                  type: varchar(255)
                  defaultValue: 'null'
              - column:
                  name: creator_name
                  type: varchar(255)
                  defaultValue: 'null'
              - column:
                  name: timestamp
                  type: bigint
                  defaultValue: 'null'
