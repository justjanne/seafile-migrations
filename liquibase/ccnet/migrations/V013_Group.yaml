databaseChangeLog:
  - changeSet:
      id: V013_Group_normalize
      author: seafile
      failOnError: false
      preConditions:
        - tableExists:
            tableName: Group
      changes:
        - renameTable:
            oldTableName: Group
            newTableName: group
  - changeSet:
      id: V013_Group_table
      author: seafile
      changes:
        - createTable:
            ifNotExists: true
            tableName: group
            columns:
              - column:
                  name: group_id
                  type: int
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: group_name
                  type: varchar(255)
              - column:
                  name: creator_name
                  type: varchar(255)
              - column:
                  name: timestamp
                  type: bigint
  - changeSet:
      id: V013_Group_normalize_pkey
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          primaryKeyExists:
            tableName: group
            primaryKeyName: group_pkey
      changes:
        - dropPrimaryKey:
            tableName: group
        - addPrimaryKey:
            tableName: group
            columnNames: group_id
            constraintName: group_pkey
