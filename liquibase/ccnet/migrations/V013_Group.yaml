databaseChangeLog:
  - changeSet:
      id: V013_rename_Group_to_group
      author: seafile
      failOnError: false
      preConditions:
        - tableExists:
            tableName: Group
      changes:
        - renameTable:
            oldTableName: Group
            newTableName: group
  - changeSet:
      id: V013_create_group
      author: seafile
      changes:
        - createTable:
            ifNotExists: true
            tableName: group
            columns:
              - column:
                  name: group_id
                  type: int
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: group_pkey
                    nullable: false
              - column:
                  name: group_name
                  type: varchar(255)
              - column:
                  name: creator_name
                  type: varchar(255)
              - column:
                  name: timestamp
                  type: bigint
