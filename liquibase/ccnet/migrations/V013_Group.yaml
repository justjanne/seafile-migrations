databaseChangeLog:
- changeSet:
    id: normalize-group
    author: seafile
    dbms: mysql,mariadb
    failOnError: false
    changes:
    - renameTable:
        oldTableName: group
        newTableName: group
- changeSet:
    id: normalize-group
    author: seafile
    dbms: mysql,mariadb
    failOnError: false
    changes:
    - renameTable:
        oldTableName: group
        newTableName: group
- changeSet:
    id: normalize-group
    author: seafile
    dbms: mysql,mariadb
    failOnError: false
    changes:
    - renameTable:
        oldTableName: Group
        newTableName: group
- changeSet:
    id: V013_Group
    author: seafile
    changes:
    - createTable:
        tableName: group
        columns:
        - column:
            name: group_id
            type: int
            autoIncrement: true
            constraints:
              primaryKey: true
              nullable: false
        - column:
            name: group_name
            type: varchar(255)
        - column:
            name: creator_name
            type: varchar(255)
        - column:
            name: timestamp
            type: bigint
    preConditions:
      onFail: MARK_RAN
      not:
        tableExists:
          tableName: group
