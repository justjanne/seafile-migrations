databaseChangeLog:
  - changeSet:
      id: v060-update-ldapusers-unique-email
      author: seafile
      preConditions:
        - onFail: CONTINUE
          sqlCheck:
            expectedResult: 1
            sql: "${index_exists_query} 'idx_ldapusers_email'"
      changes:
        - dropIndex: { indexName: idx_ldapusers_email, tableName: "${t_LDAPUsers}" }
        - addUniqueConstraint: { columnNames: email, constraintName: uq_ldapusers_email, tableName: "${t_LDAPUsers}" }
