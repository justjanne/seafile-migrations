databaseChangeLog:
  - changeSet:
      id: v060-update-ldapusers-unique-email
      author: seafile
      preConditions:
        - onFail: CONTINUE
          indexExists:
            indexName: idx_ldapusers_email
            tableName: ldapusers
      changes:
        - dropIndex:
            indexName: idx_ldapusers_email
            tableName: ldapusers
        - addUniqueConstraint:
            columnNames: email
            constraintName: uq_ldapusers_email
            tableName: ldapusers
