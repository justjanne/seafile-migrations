databaseChangeLog:
  - changeSet:
      id: V013_rename_Binding_to_binding
      author: seafile
      failOnError: false
      preConditions:
        - tableExists:
            tableName: Binding
      changes:
        - renameTable:
            oldTableName: Binding
            newTableName: binding
  - changeSet:
      id: V013_create_binding
      author: seafile
      changes:
        - createTable:
            ifNotExists: true
            tableName: binding
            columns:
              - column:
                  name: email
                  type: varchar(255)
              - column:
                  name: peer_id
                  type: varchar(41)
                  constraints:
                    unique: true
  - changeSet:
      id: V013_normalize_binding_email
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: binding
            indexName: email
      changes:
        - dropIndex:
            tableName: binding
            indexName: email
  - changeSet:
      id: V013_add_index_to_binding_email
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: binding
                indexName: idx_binding_email
      changes:
        - createIndex:
            tableName: binding
            indexName: idx_binding_email
            columns:
              - column:
                  name: email
