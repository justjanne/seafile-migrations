databaseChangeLog:
  - changeSet:
      id: V013_Binding-normalize
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          tableExists:
            tableName: Binding
      changes:
        - renameTable:
            oldTableName: Binding
            newTableName: binding
  - changeSet:
      id: V013_Binding-table
      author: seafile
      preConditions:
        onFail: MARK_RAN
        not:
          tableExists:
            tableName: binding
      changes:
        - createTable:
            tableName: binding
            columns:
              - column:
                  name: email
                  type: varchar(255)
              - column:
                  name: peer_id
                  type: char(41)
                  constraints:
                    unique: true
  - changeSet:
      id: V013_Binding_normalize_email
      author: seafile
      preConditions:
        onFail: MARK_RAN
        indexExists:
          tableName: binding
          indexName: email
      changes:
        - dropIndex:
            tableName: binding
            indexName: email
  - changeSet:
      id: V013_Binding_index_email
      author: seafile
      preConditions:
        onFail: MARK_RAN
        not:
          indexExists:
            tableName: binding
            indexName: idx_binding_email
      changes:
        - createIndex:
            tableName: binding
            indexName: idx_binding_email
            columns:
              - column:
                  name: email
