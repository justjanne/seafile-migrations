databaseChangeLog:
  - changeSet:
      id: V013_Binding_normalize
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          tableExists:
            tableName: binding
      changes:
        - renameTable:
            oldTableName: binding
            newTableName: Binding
  - changeSet:
      id: V013_Binding_table
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - tableExists:
                tableName: Binding
      changes:
        - createTable:
            tableName: Binding
            columns:
              - column:
                  name: email
                  type: varchar(255)
              - column:
                  name: peer_id
                  type: char(41)
                  constraints:
                    unique: true
  - changeSet:
      id: V013_Binding_normalize_email
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: Binding
            indexName: email
      changes:
        - dropIndex:
            tableName: Binding
            indexName: email
  - changeSet:
      id: V013_Binding_index_email
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: Binding
                indexName: idx_binding_email
      changes:
        - createIndex:
            tableName: Binding
            indexName: idx_binding_email
            columns:
              - column:
                  name: email
