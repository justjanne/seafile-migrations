databaseChangeLog:
- changeSet:
    id: V018_Organization
    author: seafile
    changes:
    - createTable:
        tableName: organization
        columns:
        - column:
            name: org_id
            type: int
            autoIncrement: true
            constraints:
              primaryKey: true
              nullable: false
        - column:
            name: org_name
            type: varchar(255)
        - column:
            name: url_prefix
            type: varchar(255)
            constraints:
              unique: true
        - column:
            name: creator
            type: varchar(255)
        - column:
            name: ctime
            type: bigint
    preConditions:
      onFail: MARK_RAN
      not:
        tableExists:
          tableName: organization
