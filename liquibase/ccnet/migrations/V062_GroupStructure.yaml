databaseChangeLog:
  - changeSet:
      id: V062_rename_GroupStructure_to_groupstructure
      author: seafile
      failOnError: false
      preConditions:
        - tableExists:
            tableName: GroupStructure
      changes:
        - renameTable:
            oldTableName: GroupStructure
            newTableName: groupstructure
  - changeSet:
      id: V062_create_groupstructure
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - tableExists:
                tableName: groupstructure
      changes:
        - createTable:
            ifNotExists: true
            tableName: groupstructure
            columns:
              - column:
                  name: id
                  type: bigserial
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: group_id
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: path
                  type: varchar(1024)
  - changeSet:
      id: V062_normalize_groupstructure_group_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          columnExists:
            tableName: groupstructure
            columnName: group_id
      changes:
        - addNotNullConstraint:
            tableName: groupstructure
            columnName: group_id
            columnDataType: int
            defaultNullValue: 0
