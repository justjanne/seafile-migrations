databaseChangeLog:
  - changeSet:
      id: V130_normalize_emailuser_is_department_owner
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: emailuser
            indexName: EmailUser_is_department_owenr
      changes:
        - dropIndex:
            tableName: emailuser
            indexName: EmailUser_is_department_owenr
  - changeSet:
      id: V130_add_is_department_owner_to_emailuser
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - columnExists:
                tableName: emailuser
                columnName: is_department_owner
      changes:
        - addColumn:
            tableName: emailuser
            columns:
              - column:
                  name: is_department_owner
                  type: boolean
                  defaultValue: 'false'
                  constraints:
                    nullable: false
