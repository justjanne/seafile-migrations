databaseChangeLog:
  - changeSet:
      id: V063_normalize_groupstructure_pkey_purge
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          and:
            - primaryKeyExists:
                tableName: groupstructure
            - not:
                - columnExists:
                    tableName: groupstructure
                    columnName: id
      changes:
        - dropPrimaryKey:
            tableName: groupstructure
  - changeSet:
      id: V063_normalize_GroupStructure_pkey_purge
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: groupstructure
            indexName: GroupStructure_pkey
      changes:
        - dropPrimaryKey:
            tableName: groupstructure
            constraintName: GroupStructure_pkey
  - changeSet:
      id: V063_normalize_GroupStructure_id_pkey_purge
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          primaryKeyExists:
            tableName: groupstructure
            primaryKeyName: GroupStructure_id_pkey
      changes:
        - dropPrimaryKey:
            tableName: groupstructure
            constraintName: GroupStructure_id_pkey
  - changeSet:
      id: V063_add_id_to_groupstructure
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - columnExists:
                tableName: groupstructure
                columnName: id
      changes:
        - addColumn:
            tableName: groupstructure
            ifNotExists: true
            columns:
              - column:
                  name: id
                  type: bigserial
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: groupstructure_pkey
  - changeSet:
      id: V063_change_id_type_in_groupstructure
      author: seafile
      changes:
        - modifyDataType:
            tableName: groupstructure
            columnName: id
            newDataType: bigserial
  - changeSet:
      id: V063_normalize_groupstructure_pkey_rebuild
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - primaryKeyExists:
                tableName: groupstructure
      changes:
        - addPrimaryKey:
            tableName: groupstructure
            columnNames: id
            constraintName: groupstructure_pkey
  - changeSet:
      id: V063_normalize_groupstructure_id_autoincrement
      author: seafile
      dbms: mysql,mariadb
      changes:
        - addAutoIncrement:
            tableName: groupstructure
            columnName: id
            columnDataType: bigint
  - changeSet:
      id: V063_normalize_groupstructure_group_id_key
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: groupstructure
            indexName: groupstructure_group_id_key
      changes:
        - dropUniqueConstraint:
            tableName: groupstructure
            constraintName: groupstructure_group_id_key
  - changeSet:
      id: V063_normalize_groupstructure_group_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: groupstructure
            indexName: group_id
      changes:
        - dropUniqueConstraint:
            tableName: groupstructure
            constraintName: group_id
  - changeSet:
      id: V063_normalize_groupstructure_groupid_idx
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: groupstructure
            indexName: groupstructure_groupid_idx
      changes:
        - dropIndex:
            tableName: groupstructure
            indexName: groupstructure_groupid_idx
  - changeSet:
      id: V063_add_unique_constraint_to_groupstructure_group_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: groupstructure
                indexName: idx_groupstructure_group_id
      changes:
        - addUniqueConstraint:
            tableName: groupstructure
            constraintName: idx_groupstructure_group_id
            columnNames: group_id