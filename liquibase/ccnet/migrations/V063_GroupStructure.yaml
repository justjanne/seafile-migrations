databaseChangeLog:
  - changeSet:
      id: V063_rename_GroupStructure_to_groupstructure
      author: seafile
      failOnError: false
      preConditions:
        - tableExists:
            tableName: GroupStructure
      changes:
        - renameTable:
            oldTableName: GroupStructure
            newTableName: groupstructure
  - changeSet:
      id: V063_create_groupstructure
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - tableExists:
                tableName: groupstructure
      changes:
        - createTable:
            ifNotExists: true
            tableName: groupstructure
            columns:
              - column:
                  name: id
                  type: bigserial
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: group_id
                  type: int
              - column:
                  name: path
                  type: varchar(1024)
  - changeSet:
      id: V063_change_id_type_in_groupstructure
      author: seafile
      changes:
        - modifyDataType:
            tableName: groupstructure
            columnName: id
            newDataType: bigserial
  - changeSet:
      id: V063_normalize_groupstructure_id_autoincrement
      author: seafile
      dbms: mysql,mariadb
      changes:
        - addAutoIncrement:
            tableName: groupstructure
            columnName: id
            columnDataType: bigint
  - changeSet:
      id: V063_normalize_groupstructure_group_id_key
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: groupstructure
            indexName: groupstructure_group_id_key
      changes:
        - dropUniqueConstraint:
            tableName: groupstructure
            constraintName: groupstructure_group_id_key
  - changeSet:
      id: V063_normalize_groupstructure_group_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: groupstructure
            indexName: group_id
      changes:
        - dropUniqueConstraint:
            tableName: groupstructure
            constraintName: group_id
  - changeSet:
      id: V063_add_unique_constraint_to_groupstructure_group_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: groupstructure
                indexName: idx_groupstructure_group_id
      changes:
        - addUniqueConstraint:
            tableName: groupstructure
            constraintName: idx_groupstructure_group_id
            columnNames: group_id
  - changeSet:
      id: V063_normalize_groupstructure_pkey
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          primaryKeyExists:
            tableName: groupstructure
            primaryKeyName: groupstructure_id_pkey
      changes:
        - dropPrimaryKey:
            tableName: groupstructure
        - addPrimaryKey:
            tableName: groupstructure
            columnNames: id
            constraintName: groupstructure_pkey
