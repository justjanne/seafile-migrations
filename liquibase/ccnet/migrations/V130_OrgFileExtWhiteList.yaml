databaseChangeLog:
  - changeSet:
      id: V130_rename_OrgFileExtWhiteList_to_orgfileextwhitelist
      author: seafile
      failOnError: false
      preConditions:
        - tableExists:
            tableName: OrgFileExtWhiteList
      changes:
        - renameTable:
            oldTableName: OrgFileExtWhiteList
            newTableName: orgfileextwhitelist
  - changeSet:
      id: V130_create_orgfileextwhitelist
      author: seafile
      changes:
        - createTable:
            ifNotExists: true
            tableName: orgfileextwhitelist
            columns:
              - column:
                  name: id
                  type: bigserial
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: org_id
                  type: int
              - column:
                  name: white_list
                  type: text
  - changeSet:
      id: V063_normalize_orgfileextwhitelist_pkey_purge
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          and:
            - primaryKeyExists:
                tableName: orgfileextwhitelist
            - not:
                - columnExists:
                    tableName: orgfileextwhitelist
                    columnName: id
      changes:
        - dropPrimaryKey:
            tableName: orgfileextwhitelist
  - changeSet:
      id: V063_normalize_OrgFileExtWhiteList_pkey_purge
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: orgfileextwhitelist
            indexName: OrgFileExtWhiteList_pkey
      changes:
        - dropPrimaryKey:
            tableName: orgfileextwhitelist
            constraintName: OrgFileExtWhiteList_pkey
  - changeSet:
      id: V063_normalize_OrgFileExtWhiteList_id_pkey_purge
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          primaryKeyExists:
            tableName: orgfileextwhitelist
            primaryKeyName: OrgFileExtWhiteList_id_pkey
      changes:
        - dropPrimaryKey:
            tableName: orgfileextwhitelist
            constraintName: OrgFileExtWhiteList_id_pkey
  - changeSet:
      id: V063_change_id_type_in_orgfileextwhitelist
      author: seafile
      changes:
        - modifyDataType:
            tableName: orgfileextwhitelist
            columnName: id
            newDataType: bigserial
  - changeSet:
      id: V063_normalize_orgfileextwhitelist_pkey_rebuild
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - primaryKeyExists:
                tableName: orgfileextwhitelist
      changes:
        - addPrimaryKey:
            tableName: orgfileextwhitelist
            columnNames: id
            constraintName: orgfileextwhitelist_pkey
  - changeSet:
      id: V063_normalize_orgfileextwhitelist_id_autoincrement
      author: seafile
      dbms: mysql,mariadb
      changes:
        - addAutoIncrement:
            tableName: orgfileextwhitelist
            columnName: id
            columnDataType: bigint
  - changeSet:
      id: V130_normalize_orgfileextwhitelist_org_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: orgfileextwhitelist
            indexName: org_id
      changes:
        - dropUniqueConstraint:
            tableName: orgfileextwhitelist
            constraintName: org_id
  - changeSet:
      id: V130_normalize_orgfileextwhitelist_org_id_key
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: orgfileextwhitelist
            indexName: orgfileextwhitelist_org_id_key
      changes:
        - dropUniqueConstraint:
            tableName: orgfileextwhitelist
            constraintName: orgfileextwhitelist_org_id_key
  - changeSet:
      id: V130_add_unique_constraint_to_orgfileextwhitelist_org_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: orgfileextwhitelist
                indexName: idx_orgfileextwhitelist_org_id
      changes:
        - addUniqueConstraint:
            tableName: orgfileextwhitelist
            columnNames: org_id
            constraintName: idx_orgfileextwhitelist_org_id
