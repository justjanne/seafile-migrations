databaseChangeLog:
  - changeSet:
      id: V063_Group_group_id
      author: seafile
      changes:
        - modifyDataType:
            tableName: group
            columnName: group_id
            newDataType: bigserial
  - changeSet:
      id: V063_Group_autoincrement_group_id
      author: seafile
      dbms: mysql,mariadb
      changes:
        - addAutoIncrement:
            tableName: group
            columnName: group_id
            columnDataType: bigint
  - changeSet:
      id: V063_Group_parent_group_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - columnExists:
                tableName: group
                columnName: parent_group_id
      changes:
        - addColumn:
            tableName: group
            columns:
              - column:
                  name: parent_group_id
                  type: int
  - changeSet:
      id: V063_Group_normalize_parent_group_id
      author: seafile
      changes:
        - dropDefaultValue:
            tableName: group
            columnName: parent_group_id
        - addDefaultValue:
            tableName: group
            columnName: parent_group_id
            defaultValue: '0'
