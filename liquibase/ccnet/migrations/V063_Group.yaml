databaseChangeLog:
  - changeSet:
      id: V063_change_group_id_type_in_group
      author: seafile
      changes:
        - modifyDataType:
            tableName: group
            columnName: group_id
            newDataType: bigserial
  - changeSet:
      id: V063_normalize_group_id_autoincrement
      author: seafile
      dbms: mysql,mariadb
      changes:
        - addAutoIncrement:
            tableName: group
            columnName: group_id
            columnDataType: bigint
  - changeSet:
      id: V063_add_parent_group_id_to_group
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - columnExists:
                tableName: group
                columnName: parent_group_id
      changes:
        - addColumn:
            tableName: group
            columns:
              - column:
                  name: parent_group_id
                  type: int
  - changeSet:
      id: V063_normalize_group_parent_group_id
      author: seafile
      changes:
        - dropDefaultValue:
            tableName: group
            columnName: parent_group_id
        - addDefaultValue:
            tableName: group
            columnName: parent_group_id
            defaultValue: '0'
