databaseChangeLog:
  - changeSet:
      id: V031_UserRole_normalize
      author: seafile
      failOnError: false
      preConditions:
        - tableExists:
            tableName: UserRole
      changes:
        - renameTable:
            oldTableName: UserRole
            newTableName: userrole
  - changeSet:
      id: V031_UserRole_table
      author: seafile
      changes:
        - createTable:
            ifNotExists: true
            tableName: userrole
            columns:
              - column:
                  name: id
                  type: int
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: email
                  type: varchar(255)
              - column:
                  name: role
                  type: varchar(255)
  - changeSet:
      id: V031_UserRole_normalize_email
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: userrole
            indexName: email
      changes:
        - dropUniqueConstraint:
            tableName: userrole
            constraintName: email
  - changeSet:
      id: V031_UserRole_normalize_email_key
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: userrole
            indexName: userrole_email_key
      changes:
        - dropUniqueConstraint:
            tableName: userrole
            constraintName: userrole_email_key
  - changeSet:
      id: V031_UserRole_index_email
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: userrole
                indexName: idx_userrole_email
      changes:
        - addUniqueConstraint:
            tableName: userrole
            columnNames: email
            constraintName: idx_userrole_email
