databaseChangeLog:
- changeSet:
    id: V031_UserRole
    author: seafile
    changes:
    - createTable:
        tableName: userrole
        columns:
        - column:
            name: id
            type: int
            autoIncrement: true
            constraints:
              primaryKey: true
              nullable: false
        - column:
            name: email
            type: varchar(255)
        - column:
            name: role
            type: varchar(255)
    - createIndex:
        indexName: userrole_email_idx
        tableName: userrole
        columns:
        - column:
            name: email
    - addUniqueConstraint:
        tableName: userrole
        columnNames: email
        dbms: mysql
    - addUniqueConstraint:
        tableName: userrole
        columnNames: email, role
        dbms: postgresql
    preConditions:
      onFail: MARK_RAN
      not:
        tableExists:
          tableName: userrole
