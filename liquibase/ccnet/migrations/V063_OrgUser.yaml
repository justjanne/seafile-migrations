databaseChangeLog:
  - changeSet:
      id: V063_normalize_orguser_pkey
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - columnExists:
                tableName: orguser
                columnName: id
      changes:
        - dropPrimaryKey:
            tableName: orguser
  - changeSet:
      id: V063_normalize_orguser_compound_pkey
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: orguser
            indexName: orguser_pkey
            columnName: org_id, email
      changes:
        - dropPrimaryKey:
            tableName: orguser
  - changeSet:
      id: V063_normalize_orguser_id_pkey
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: orguser
            indexName: OrgUser_id_pkey
      changes:
        - dropPrimaryKey:
            tableName: orguser
            constraintName: OrgUser_id_pkey
  - changeSet:
      id: V063_add_id_to_orguser
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - columnExists:
                tableName: orguser
                columnName: id
      changes:
        - addColumn:
            tableName: orguser
            ifNotExists: true
            columns:
              - column:
                  name: id
                  type: bigserial
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: orguser_pkey
  - changeSet:
      id: V063_change_id_type_in_orguser
      author: seafile
      changes:
        - modifyDataType:
            tableName: orguser
            columnName: id
            newDataType: bigserial
  - changeSet:
      id: V063_normalize_orguser_pkey_standard
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - primaryKeyExists:
                tableName: orguser
      changes:
        - addPrimaryKey:
            tableName: orguser
            columnNames: id
            constraintName: orguser_pkey
  - changeSet:
      id: V063_normalize_orguser_id_autoincrement
      author: seafile
      dbms: mysql,mariadb
      changes:
        - addAutoIncrement:
            tableName: orguser
            columnName: id
            columnDataType: bigint
  - changeSet:
      id: V063_change_email_type_in_orguser
      author: seafile
      changes:
        - modifyDataType:
            tableName: orguser
            columnName: email
            newDataType: bigint
  - changeSet:
      id: V063_normalize_orguser_email_idx
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: orguser
            indexName: idx_orguser_org_id_email
      changes:
        - dropUniqueConstraint:
            tableName: orguser
            constraintName: idx_orguser_org_id_email
  - changeSet:
      id: V063_normalize_orguser_email_key
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: orguser
            indexName: orguser_org_id_email_key
      changes:
        - dropUniqueConstraint:
            tableName: orguser
            constraintName: orguser_org_id_email_key
  - changeSet:
      id: V063_add_unique_constraint_to_orguser_email
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: orguser
                indexName: idx_orguser_email
      changes:
        - addUniqueConstraint:
            tableName: orguser
            columnNames: org_id, email
            constraintName: idx_orguser_email
