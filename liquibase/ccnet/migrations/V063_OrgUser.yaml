databaseChangeLog:
- changeSet:
    id: V063_OrgUser
    author: seafile
    changes:
    - dropPrimaryKey:
        tableName: orguser
        dbms: mysql
    - addColumn:
        tableName: orguser
        columns:
        - column:
            name: id
            type: bigint
            autoIncrement: true
            constraints:
              primaryKey: true
              nullable: false
    - addUniqueConstraint:
        tableName: orguser
        columnNames: org_id, email
        dbms: mysql
    - dropIndex:
        tableName: orguser
        indexName: email
      dbms: postgresql
    - dropIndex:
        tableName: orguser
        indexName: email
    - dropIndex:
        tableName: orguser
        indexName: orguser_email_idx
    - dropIndex:
        tableName: orguser
        indexName: email
    - dropIndex:
        tableName: orguser
        indexName: orguser_email_idx
    - dropIndex:
        tableName: orguser
        indexName: email
    - dropIndex:
        tableName: orguser
        indexName: orguser_email_idx
    - createIndex:
        tableName: orguser
        indexName: idx_orguser_email
        columns:
        - column:
            name: email
    preConditions:
      onFail: CONTINUE
      or:
      - not:
          columnExists:
            tableName: orguser
            columnName: id
      - indexExists:
          tableName: orguser
          indexName: email
      - indexExists:
          tableName: orguser
          indexName: orguser_email_idx
      - not:
          indexExists:
            tableName: orguser
            indexName: idx_orguser_email
    failOnError: false
