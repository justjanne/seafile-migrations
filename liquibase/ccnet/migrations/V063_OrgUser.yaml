databaseChangeLog:
  - {{migration_add_pkey(V063,OrgUser,id)}}
  - changeSet:
      id: V063_change_email_type_in_orguser
      author: seafile
      changes:
        - modifyDataType:
            tableName: orguser
            columnName: email
            newDataType: bigint
  - changeSet:
      id: V063_normalize_orguser_email_idx
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: orguser
            indexName: idx_orguser_org_id_email
      changes:
        - dropUniqueConstraint:
            tableName: orguser
            constraintName: idx_orguser_org_id_email
  - changeSet:
      id: V063_normalize_orguser_email_key
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: orguser
            indexName: orguser_org_id_email_key
      changes:
        - dropUniqueConstraint:
            tableName: orguser
            constraintName: orguser_org_id_email_key
  - changeSet:
      id: V063_add_unique_constraint_to_orguser_email
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: orguser
                indexName: idx_orguser_email
      changes:
        - addUniqueConstraint:
            tableName: orguser
            columnNames: org_id, email
            constraintName: idx_orguser_email
