databaseChangeLog:
  - changeSet:
      id: v130-update-emailuser-dept-owner
      author: seafile
      preConditions:
        - onFail: CONTINUE
          not: { columnExists: { tableName: emailuser, columnName: is_department_owner } }
      changes:
        - addColumn:
            tableName: emailuser
            columns:
              - column: { name: is_department_owner, type: boolean, defaultValueBoolean: false, constraints: { nullable: false } }

  - changeSet:
      id: v130-fix-legacy-typo-index
      author: seafile
      changes:
        - sql:
            dbms: mysql,mariadb
            sql: "DROP INDEX IF EXISTS EmailUser_is_department_owenr ON emailuser"
        - sql:
            dbms: postgresql
            sql: "DROP INDEX IF EXISTS idx_emailuser_is_department_owenr"
      failOnError: false

  - changeSet:
      id: v130-create-emailuser-indices
      author: seafile
      preConditions:
        - onFail: CONTINUE
        - not: { indexExists: { indexName: idx_emailuser_is_active, tableName: emailuser } }
        - not: { indexExists: { indexName: idx_emailuser_is_department_owner, tableName: emailuser } }
      changes:
        - createIndex: { indexName: idx_emailuser_is_active, tableName: emailuser, columns: [ { name: is_active } ] }
        - createIndex: { indexName: idx_emailuser_is_department_owner, tableName: emailuser, columns: [ { name: is_department_owner } ] }

  - changeSet:
      id: v130-normalize-orgfileextwhitelist
      author: seafile
      dbms: mysql,mariadb
      preConditions: [ { onFail: CONTINUE, tableExists: { tableName: OrgFileExtWhiteList } } ]
      changes: [ { renameTable: { oldTableName: OrgFileExtWhiteList, newTableName: orgfileextwhitelist } } ]

  - changeSet:
      id: v130-create-orgfileextwhitelist
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not: { tableExists: { tableName: orgfileextwhitelist } }
      changes:
        - createTable:
            tableName: orgfileextwhitelist
            columns:
              - column: { name: id, type: bigint, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: org_id, type: int, constraints: { unique: true } }
              - column: { name: white_list, type: text }

  - changeSet:
      id: v130-update-group-parent-default
      author: seafile
      preConditions:
        - onFail: CONTINUE
          columnExists: { tableName: "Group", columnName: parent_group_id }
      changes:
        - addDefaultValue: { tableName: "Group", columnName: parent_group_id, defaultValueNumeric: 0 }
