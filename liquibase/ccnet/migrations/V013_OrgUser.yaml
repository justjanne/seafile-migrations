databaseChangeLog:
  - changeSet:
      id: V013_OrgUser
      author: seafile
      changes:
        - createTable:
            tableName: OrgUser
            columns:
              - column:
                  name: org_id
                  type: int
              - column:
                  name: email
                  type: varchar(255)
              - column:
                  name: is_staff
                  type: boolean
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            columnNames: org_id, email
            tableName: OrgUser
        - createIndex:
            indexName: orguser_email_idx
            tableName: OrgUser
            columns:
              - column:
                  name: email
