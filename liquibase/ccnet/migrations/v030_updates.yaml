databaseChangeLog:
  - changeSet:
      id: v030-update-groupuser-pk
      author: seafile
      preConditions:
        - onFail: CONTINUE
          not:
            primaryKeyExists:
              tableName: "${t_GroupUser}"
      changes:
        - addNotNullConstraint:
            columnName: group_id
            tableName: "${t_GroupUser}"
            columnDataType: int
        - addNotNullConstraint:
            columnName: user_name
            tableName: "${t_GroupUser}"
            columnDataType: varchar(255)
        - addPrimaryKey:
            columnNames: group_id, user_name
            constraintName: pk_groupuser
            tableName: "${t_GroupUser}"

  - changeSet:
      id: v030-update-orggroup-pk
      author: seafile
      preConditions:
        - onFail: CONTINUE
          not:
            primaryKeyExists:
              tableName: "${t_OrgGroup}"
      changes:
        - addNotNullConstraint:
            columnName: org_id
            tableName: "${t_OrgGroup}"
            columnDataType: int
        - addNotNullConstraint:
            columnName: group_id
            tableName: "${t_OrgGroup}"
            columnDataType: int
        - addPrimaryKey:
            columnNames: org_id, group_id
            constraintName: pk_orggroup
            tableName: "${t_OrgGroup}"

  - changeSet:
      id: v030-update-orguser-pk
      author: seafile
      preConditions:
        - onFail: CONTINUE
          not:
            primaryKeyExists:
              tableName: "${t_OrgUser}"
      changes:
        - addNotNullConstraint:
            columnName: org_id
            tableName: "${t_OrgUser}"
            columnDataType: int
        - addNotNullConstraint:
            columnName: email
            tableName: "${t_OrgUser}"
            columnDataType: varchar(255)
        - addPrimaryKey:
            columnNames: org_id, email
            constraintName: pk_orguser
            tableName: "${t_OrgUser}"
