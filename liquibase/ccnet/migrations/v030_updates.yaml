databaseChangeLog:
  - changeSet:
      id: v030-update-groupuser-pk
      author: seafile
      preConditions:
        - onFail: CONTINUE
          not:
            primaryKeyExists:
              tableName: groupuser
      changes:
        - addNotNullConstraint:
            columnName: group_id
            tableName: groupuser
            columnDataType: int
        - addNotNullConstraint:
            columnName: user_name
            tableName: groupuser
            columnDataType: varchar(255)
        - addPrimaryKey:
            columnNames: group_id, user_name
            constraintName: pk_groupuser
            tableName: groupuser

  - changeSet:
      id: v030-update-orggroup-pk
      author: seafile
      preConditions:
        - onFail: CONTINUE
          not:
            primaryKeyExists:
              tableName: orggroup
      changes:
        - addNotNullConstraint:
            columnName: org_id
            tableName: orggroup
            columnDataType: int
        - addNotNullConstraint:
            columnName: group_id
            tableName: orggroup
            columnDataType: int
        - addPrimaryKey:
            columnNames: org_id, group_id
            constraintName: pk_orggroup
            tableName: orggroup

  - changeSet:
      id: v030-update-orguser-pk
      author: seafile
      preConditions:
        - onFail: CONTINUE
          not:
            primaryKeyExists:
              tableName: orguser
      changes:
        - addNotNullConstraint:
            columnName: org_id
            tableName: orguser
            columnDataType: int
        - addNotNullConstraint:
            columnName: email
            tableName: orguser
            columnDataType: varchar(255)
        - addPrimaryKey:
            columnNames: org_id, email
            constraintName: pk_orguser
            tableName: orguser
