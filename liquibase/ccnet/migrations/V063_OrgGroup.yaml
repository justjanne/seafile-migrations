databaseChangeLog:
  - {{migration_add_pkey(V063,OrgGroup,id)}}
  - changeSet:
      id: V063_change_group_id_type_in_orggroup
      author: seafile
      changes:
        - modifyDataType:
            tableName: orggroup
            columnName: group_id
            newDataType: bigint
  - changeSet:
      id: V063_normalize_orggroup_group_id_idx
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: orggroup
            indexName: orggroup_org_id_group_id_key
      changes:
        - dropUniqueConstraint:
            tableName: orggroup
            constraintName: orggroup_org_id_group_id_key
  - changeSet:
      id: V063_add_unique_constraint_to_orggroup_org_id_group_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: orggroup
                indexName: idx_orggroup_group_id
      changes:
        - addUniqueConstraint:
            tableName: orggroup
            columnNames: org_id, group_id
            constraintName: idx_orggroup_group_id
