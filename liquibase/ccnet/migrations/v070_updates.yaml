databaseChangeLog:
  - changeSet:
      id: v070-update-userrole-manual-set
      author: seafile
      preConditions:
        - onFail: CONTINUE
          not:
            columnExists:
              tableName: "${t_UserRole}"
              columnName: is_manual_set
      changes:
        - addColumn:
            tableName: "${t_UserRole}"
            columns:
              - column:
                  name: is_manual_set
                  type: int
                  defaultValueNumeric: 0
