databaseChangeLog:
  - changeSet:
      id: v031-create-userrole
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          sqlCheck:
            expectedResult: 0
            sql: "${table_exists_query} 'userrole'"
      changes:
        - createTable:
            tableName: userrole
            columns:
              - column:
                  name: id
                  type: int
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: email
                  type: varchar(255)
                  constraints:
                    unique: true
              - column:
                  name: role
                  type: varchar(255)
