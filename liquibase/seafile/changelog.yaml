databaseChangeLog:
  - property:
      name: table_exists_query
      value: "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema = DATABASE() AND LOWER(table_name) ="
      dbms: mysql,mariadb
  - property:
      name: table_exists_query
      value: "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema = CURRENT_SCHEMA AND LOWER(table_name) ="
      dbms: postgresql
  - includeAll:
      path: "migrations/"
