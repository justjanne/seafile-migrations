databaseChangeLog:
  - changeSet:
      id: V070_rename_RepoSyncError_to_reposyncerror
      author: seafile
      failOnError: false
      preConditions:
        - tableExists:
            tableName: RepoSyncError
      changes:
        - renameTable:
            oldTableName: RepoSyncError
            newTableName: reposyncerror
  - changeSet:
      id: V070_change_error_time_type_in_reposyncerror
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          columnExists:
            tableName: reposyncerror
            columnName: error_time
      changes:
        - modifyDataType:
            tableName: reposyncerror
            columnName: error_time
            newDataType: bigint
  - changeSet:
      id: V070_create_reposyncerror
      author: seafile
      changes:
        - createTable:
            ifNotExists: true
            tableName: reposyncerror
            columns:
              - column:
                  name: id
                  type: bigserial
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: reposyncerror_pkey
              - column:
                  name: token
                  type: varchar(41)
              - column:
                  name: error_time
                  type: bigint
              - column:
                  name: error_con
                  type: varchar(1024)
  - changeSet:
      id: V070_normalize_reposyncerror_token_type
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          columnExists:
            tableName: reposyncerror
            columnName: token
      changes:
        - modifyDataType:
            tableName: reposyncerror
            columnName: token
            newDataType: varchar(41)
  - changeSet:
      id: V070_normalize_reposyncerror_token
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: reposyncerror
            indexName: token
      changes:
        - dropUniqueConstraint:
            tableName: reposyncerror
            constraintName: token
  - changeSet:
      id: V070_normalize_reposyncerror_token_key
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: reposyncerror
            indexName: reposyncerror_token_key
      changes:
        - dropUniqueConstraint:
            tableName: reposyncerror
            constraintName: reposyncerror_token_key
  - changeSet:
      id: V070_add_unique_constraint_to_reposyncerror_token_name
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: reposyncerror
                indexName: idx_reposyncerror_token_name
      changes:
        - addUniqueConstraint:
            tableName: reposyncerror
            columnNames: token
            constraintName: idx_reposyncerror_token_name
