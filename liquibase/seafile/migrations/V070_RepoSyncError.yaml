databaseChangeLog:
  - changeSet:
      id: V070_RepoSyncError
      author: seafile
      changes:
        - createTable:
            tableName: RepoSyncError
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: token
                  type: CHAR(41)
              - column:
                  name: error_time
                  type: BIGINT
              - column:
                  name: error_con
                  type: VARCHAR(1024)
        - addUniqueConstraint:
            tableName: RepoSyncError
            columnNames: token
            constraintName: token_unique_reposyncerror
