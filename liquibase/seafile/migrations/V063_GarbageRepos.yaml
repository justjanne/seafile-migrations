databaseChangeLog:
  - changeSet:
      id: V063_normalize_garbagerepos_pkey_purge
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          primaryKeyExists:
            tableName: garbagerepos
          not:
            columnExists:
              tableName: garbagerepos
              columnName: id
      changes:
        - dropPrimaryKey:
            tableName: garbagerepos
  - changeSet:
      id: V063_add_id_to_garbagerepos
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - columnExists:
                tableName: garbagerepos
                columnName: id
          not:
            - primaryKeyExists:
                tableName: garbagerepos
      changes:
        - addColumn:
            tableName: garbagerepos
            ifNotExists: true
            columns:
              - column:
                  name: id
                  type: bigserial
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: garbagerepos_pkey
  - changeSet:
      id: V063_change_id_type_in_garbagerepos
      author: seafile
      changes:
        - modifyDataType:
            tableName: garbagerepos
            columnName: id
            newDataType: bigserial
  - changeSet:
      id: V063_normalize_garbagerepos_pkey_rebuild
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          primaryKeyExists:
            tableName: garbagerepos
          not:
            primaryKeyExists:
              tableName: garbagerepos
              primaryKeyName: garbagerepos_pkey
      changes:
        - dropPrimaryKey:
            tableName: garbagerepos
        - addPrimaryKey:
            tableName: garbagerepos
            columnNames: id
            constraintName: garbagerepos_pkey
  - changeSet:
      id: V063_normalize_garbagerepos_id_autoincrement
      author: seafile
      dbms: mysql,mariadb
      changes:
        - addAutoIncrement:
            tableName: garbagerepos
            columnName: id
            columnDataType: bigint
  - changeSet:
      id: V063_normalize_garbagerepos_repo_id_idx
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: garbagerepos
            indexName: repo_id
      changes:
        - dropUniqueConstraint:
            tableName: garbagerepos
            constraintName: repo_id
  - changeSet:
      id: V063_add_unique_constraint_to_garbagerepos_repo_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: garbagerepos
                indexName: idx_garbagerepos_repo_id
      changes:
        - addUniqueConstraint:
            tableName: garbagerepos
            columnNames: repo_id
            constraintName: idx_garbagerepos_repo_id
