databaseChangeLog:
  - {{migration_add_pkey(V063,RepoGroup,id)}}
  - changeSet:
      id: V063_add_unique_constraint_to_repogroup_group_id_repo_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: repogroup
                indexName: idx_repogroup_group_id_repo_id
      changes:
        - addUniqueConstraint:
            tableName: repogroup
            columnNames: group_id, repo_id
            constraintName: idx_repogroup_group_id_repo_id
  - changeSet:
      id: V063_normalize_repogroup_repo_id_type
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          columnExists:
            tableName: repogroup
            columnName: repo_id
      changes:
        - modifyDataType:
            tableName: repogroup
            columnName: repo_id
            newDataType: varchar(41)
