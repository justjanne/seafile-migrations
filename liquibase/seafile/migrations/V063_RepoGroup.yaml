databaseChangeLog:
  - changeSet:
      id: V063_normalize_repogroup_pkey_purge
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          and:
            - primaryKeyExists:
                tableName: repogroup
            - not:
                - columnExists:
                    tableName: repogroup
                    columnName: id
      changes:
        - dropPrimaryKey:
            tableName: repogroup
  - changeSet:
      id: V063_normalize_RepoGroup_pkey_purge
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: repogroup
            indexName: RepoGroup_pkey
      changes:
        - dropPrimaryKey:
            tableName: repogroup
            constraintName: RepoGroup_pkey
  - changeSet:
      id: V063_normalize_RepoGroup_id_pkey_purge
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          primaryKeyExists:
            tableName: repogroup
            primaryKeyName: RepoGroup_id_pkey
      changes:
        - dropPrimaryKey:
            tableName: repogroup
            constraintName: RepoGroup_id_pkey
  - changeSet:
      id: V063_add_id_to_repogroup
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - columnExists:
                tableName: repogroup
                columnName: id
      changes:
        - addColumn:
            tableName: repogroup
            ifNotExists: true
            columns:
              - column:
                  name: id
                  type: bigserial
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: repogroup_pkey
  - changeSet:
      id: V063_change_id_type_in_repogroup
      author: seafile
      changes:
        - modifyDataType:
            tableName: repogroup
            columnName: id
            newDataType: bigserial
  - changeSet:
      id: V063_normalize_repogroup_pkey_rebuild
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - primaryKeyExists:
                tableName: repogroup
      changes:
        - addPrimaryKey:
            tableName: repogroup
            columnNames: id
            constraintName: repogroup_pkey
  - changeSet:
      id: V063_normalize_repogroup_id_autoincrement
      author: seafile
      dbms: mysql,mariadb
      changes:
        - addAutoIncrement:
            tableName: repogroup
            columnName: id
            columnDataType: bigint
  - changeSet:
      id: V063_add_unique_constraint_to_repogroup_group_id_repo_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: repogroup
                indexName: idx_repogroup_group_id_repo_id
      changes:
        - addUniqueConstraint:
            tableName: repogroup
            columnNames: group_id, repo_id
            constraintName: idx_repogroup_group_id_repo_id
  - changeSet:
      id: V063_normalize_repogroup_repo_id_type
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          columnExists:
            tableName: repogroup
            columnName: repo_id
      changes:
        - modifyDataType:
            tableName: repogroup
            columnName: repo_id
            newDataType: varchar(41)
