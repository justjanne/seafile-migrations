databaseChangeLog:
  - changeSet:
      id: V018_normalize_branch_repousertoken_email_idx
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: repousertoken
            indexName: repousertoken_email
      changes:
        - dropUniqueConstraint:
            tableName: repousertoken
            constraintName: repousertoken_email
  - changeSet:
      id: add_index_to_repousertoken_email
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: repousertoken
                indexName: idx_repousertoken_email
      changes:
        - createIndex:
            indexName: idx_repousertoken_email
            tableName: repousertoken
            columns:
              - column:
                  name: email
