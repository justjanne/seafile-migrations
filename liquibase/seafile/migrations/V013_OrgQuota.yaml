databaseChangeLog:
  - changeSet:
      id: V013_rename_OrgQuota_to_orgquota
      author: seafile
      failOnError: false
      preConditions:
        - tableExists:
            tableName: OrgQuota
      changes:
        - renameTable:
            oldTableName: OrgQuota
            newTableName: orgquota
  - changeSet:
      id: V013_normalize_org_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          columnExists:
            tableName: orgquota
            columnName: org_id
      changes:
        - addNotNullConstraint:
            tableName: orgquota
            columnName: org_id
            columnDataType: int
            defaultNullValue: 0
        - dropDefaultValue:
            tableName: orgquota
            columnName: org_id
  - changeSet:
      id: V013_create_orgquota
      author: seafile
      changes:
        - createTable:
            ifNotExists: true
            tableName: orgquota
            columns:
              - column:
                  name: org_id
                  type: int
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: orgquota_pkey
              - column:
                  name: quota
                  type: bigint
