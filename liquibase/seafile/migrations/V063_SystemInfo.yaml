databaseChangeLog:
  - changeSet:
      id: V063_add_id_to_systeminfo
      author: seafile
      comment: "Regular Migration: Structural PK change - add bigint id column as primary key."
      preConditions:
        - onFail: MARK_RAN
          not:
            - columnExists:
                tableName: systeminfo
                columnName: id
      changes:
        - addColumn:
            tableName: systeminfo
            ifNotExists: true
            columns:
              - column:
                  name: id
                  type: bigserial
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: systeminfo_pkey
  - changeSet:
      id: V063_change_id_type_in_systeminfo
      author: seafile
      comment: "Regular Migration: Ensure id column is bigint/bigserial."
      changes:
        - modifyDataType:
            tableName: systeminfo
            columnName: id
            newDataType: bigserial
  - changeSet:
      id: V063_normalize_systeminfo_pkey
      author: seafile
      comment: "Regular Migration: Ensure id column is the primary key."
      preConditions:
        - onFail: MARK_RAN
          not:
            - primaryKeyExists:
                tableName: systeminfo
      changes:
        - addPrimaryKey:
            tableName: systeminfo
            columnNames: id
            constraintName: systeminfo_pkey
  - changeSet:
      id: V063_normalize_systeminfo_id_autoincrement
      author: seafile
      comment: "Regular Migration: Add auto-increment to id for MySQL/MariaDB."
      dbms: mysql,mariadb
      changes:
        - addAutoIncrement:
            tableName: systeminfo
            columnName: id
            columnDataType: bigint
