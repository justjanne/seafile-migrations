databaseChangeLog:
- changeSet:
    id: V018_VirtualRepo
    author: seafile
    changes:
    - createTable:
        tableName: virtualrepo
        columns:
        - column:
            name: repo_id
            type: char(36)
            constraints:
              primaryKey: true
              nullable: false
        - column:
            name: origin_repo
            type: char(36)
        - column:
            name: path
            type: text
        - column:
            name: base_commit
            type: char(40)
    - dropIndex:
        tableName: virtualrepo
        indexName: origin_repo
    - createIndex:
        tableName: virtualrepo
        indexName: idx_virtualrepo_origin_repo
        columns:
        - column:
            name: origin_repo
    preConditions:
      onFail: MARK_RAN
      not:
        tableExists:
          tableName: virtualrepo
    failOnError: false
