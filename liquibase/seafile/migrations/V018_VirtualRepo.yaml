databaseChangeLog:
  - changeSet:
      id: V018_rename_VirtualRepo_to_virtualrepo
      author: seafile
      failOnError: false
      preConditions:
        - tableExists:
            tableName: VirtualRepo
      changes:
        - renameTable:
            oldTableName: VirtualRepo
            newTableName: virtualrepo
  - changeSet:
      id: V018_normalize_virtualrepo_repo_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          columnExists:
            tableName: virtualrepo
            columnName: repo_id
      changes:
        - addNotNullConstraint:
            tableName: virtualrepo
            columnName: repo_id
            columnDataType: varchar(41)
            defaultNullValue: ""
        - dropDefaultValue:
            tableName: virtualrepo
            columnName: repo_id
  - changeSet:
      id: V018_normalize_virtualrepo_repo_id_type
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          columnExists:
            tableName: virtualrepo
            columnName: repo_id
      changes:
        - modifyDataType:
            tableName: virtualrepo
            columnName: repo_id
            newDataType: varchar(41)
  - changeSet:
      id: V018_normalize_virtualrepo_origin_repo_type
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          columnExists:
            tableName: virtualrepo
            columnName: origin_repo
      changes:
        - modifyDataType:
            tableName: virtualrepo
            columnName: origin_repo
            newDataType: varchar(41)
  - changeSet:
      id: V018_normalize_virtualrepo_base_commit_type
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          columnExists:
            tableName: virtualrepo
            columnName: base_commit
      changes:
        - modifyDataType:
            tableName: virtualrepo
            columnName: base_commit
            newDataType: varchar(41)
  - changeSet:
      id: V018_create_virtualrepo
      author: seafile
      changes:
        - createTable:
            ifNotExists: true
            tableName: virtualrepo
            columns:
              - column:
                  name: repo_id
                  type: varchar(41)
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: virtualrepo_pkey
              - column:
                  name: origin_repo
                  type: varchar(41)
              - column:
                  name: path
                  type: text
              - column:
                  name: base_commit
                  type: varchar(41)
  - changeSet:
      id: V018_normalize_virtualrepo_origin_repo
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: virtualrepo
            indexName: origin_repo
      changes:
        - dropUniqueConstraint:
            tableName: virtualrepo
            constraintName: origin_repo
  - changeSet:
      id: V018_add_index_to_virtualrepo_origin_repo
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: virtualrepo
                indexName: idx_virtualrepo_origin_repo
      changes:
        - createIndex:
            indexName: idx_virtualrepo_origin_repo
            tableName: virtualrepo
            columns:
              - column:
                  name: origin_repo
