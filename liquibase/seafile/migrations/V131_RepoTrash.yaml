databaseChangeLog:
- changeSet:
    id: V131_RepoTrash
    author: seafile
    preConditions:
      onFail: CONTINUE
      not:
        indexExists:
          tableName: repotrash
          indexName: idx_repotrash_owner_id
    changes:
    - dropIndex:
        tableName: repotrash
        indexName: repotrash_owner_id
    - dropIndex:
        tableName: repotrash
        indexName: owner_id
    - createIndex:
        tableName: repotrash
        indexName: idx_repotrash_owner_id
        columns:
        - column:
            name: owner_id
    - dropIndex:
        tableName: repotrash
        indexName: repotrash_org_id
    failOnError: false
