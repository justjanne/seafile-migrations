databaseChangeLog:
  - {{migration_add_pkey(V063,Branch,id)}}
  - changeSet:
      id: V063_normalize_branch_repo_id_idx
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: branch
            indexName: repo_id
      changes:
        - dropUniqueConstraint:
            tableName: branch
            constraintName: repo_id
  - changeSet:
      id: V063_normalize_branch_repo_id_name_key_idx
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: branch
            indexName: branch_repo_id_name_key
      changes:
        - dropUniqueConstraint:
            tableName: branch
            constraintName: branch_repo_id_name_key
  - changeSet:
      id: V063_add_unique_constraint_to_branch_repo_id_name
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: branch
                indexName: idx_branch_repo_id_name
      changes:
        - addUniqueConstraint:
            tableName: branch
            columnNames: repo_id, name
            constraintName: idx_branch_repo_id_name
  - changeSet:
      id: V063_normalize_branch_repo_id_type
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          columnExists:
            tableName: branch
            columnName: repo_id
      changes:
        - modifyDataType:
            tableName: branch
            columnName: repo_id
            newDataType: varchar(41)
