databaseChangeLog:
- changeSet:
    id: V063_Branch
    author: seafile
    changes:
    - dropPrimaryKey:
        dbms: postgresql
        tableName: branch
        constraintName: branch_pkey
    - dropPrimaryKey:
        dbms: mysql
        tableName: branch
    - addColumn:
        tableName: branch
        columns:
        - column:
            name: id
            type: BIGINT
            autoIncrement: true
            constraints:
              primaryKey: true
              nullable: false
    - addUniqueConstraint:
        tableName: branch
        columnNames: repo_id, name
    - sql:
        dbms: mysql,mariadb
        sql: ALTER TABLE `branch` MODIFY COLUMN `name` varchar(10)
    - sql:
        dbms: mysql,mariadb
        sql: ALTER TABLE `branch` MODIFY COLUMN `name` varchar(10)
    - modifyDataType:
        dbms: postgresql
        tableName: branch
        columnName: name
        newDataType: varchar(10)
    - sql:
        dbms: mysql,mariadb
        sql: ALTER TABLE `branch` MODIFY COLUMN `repo_id` char(41)
    - sql:
        dbms: mysql,mariadb
        sql: ALTER TABLE `branch` MODIFY COLUMN `repo_id` char(41)
    - modifyDataType:
        tableName: branch
        columnName: repo_id
        newDataType: char(41)
        dbms: postgresql
    - sql:
        dbms: mysql,mariadb
        sql: ALTER TABLE `branch` MODIFY COLUMN `commit_id` char(41)
    - sql:
        dbms: mysql,mariadb
        sql: ALTER TABLE `branch` MODIFY COLUMN `commit_id` char(41)
    - modifyDataType:
        dbms: postgresql
        tableName: branch
        columnName: commit_id
        newDataType: char(41)
    preConditions:
      onFail: CONTINUE
      not:
        columnExists:
          tableName: branch
          columnName: id
    failOnError: false
