databaseChangeLog:
  - changeSet:
      id: V063_normalize_branch_pkey_purge
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          primaryKeyExists:
            tableName: branch
          not:
            columnExists:
              tableName: branch
              columnName: id
      changes:
        - dropPrimaryKey:
            tableName: branch
  - changeSet:
      id: V063_add_id_to_branch
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - columnExists:
                tableName: branch
                columnName: id
          not:
            - primaryKeyExists:
                tableName: branch
      changes:
        - addColumn:
            tableName: branch
            ifNotExists: true
            columns:
              - column:
                  name: id
                  type: bigserial
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: branch_pkey
  - changeSet:
      id: V063_change_id_type_in_branch
      author: seafile
      changes:
        - modifyDataType:
            tableName: branch
            columnName: id
            newDataType: bigserial
  - changeSet:
      id: V063_normalize_branch_pkey_rebuild
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          primaryKeyExists:
            tableName: branch
          not:
            primaryKeyExists:
              tableName: branch
              primaryKeyName: branch_pkey
      changes:
        - dropPrimaryKey:
            tableName: branch
        - addPrimaryKey:
            tableName: branch
            columnNames: id
            constraintName: branch_pkey
  - changeSet:
      id: V063_normalize_branch_id_autoincrement
      author: seafile
      dbms: mysql,mariadb
      changes:
        - addAutoIncrement:
            tableName: branch
            columnName: id
            columnDataType: bigint
  - changeSet:
      id: V063_normalize_branch_repo_id_idx
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: branch
            indexName: repo_id
      changes:
        - dropUniqueConstraint:
            tableName: branch
            constraintName: repo_id
  - changeSet:
      id: V063_add_unique_constraint_to_branch_repo_id_name
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: branch
                indexName: idx_branch_repo_id_name
      changes:
        - addUniqueConstraint:
            tableName: branch
            columnNames: repo_id, name
            constraintName: idx_branch_repo_id_name
