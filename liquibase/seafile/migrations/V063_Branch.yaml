databaseChangeLog:
  - changeSet:
      id: V063_Branch
      author: seafile
      changes:
        - dropPrimaryKey:
            dbms: postgresql
            tableName: Branch
            constraintName: branch_pkey
        - dropPrimaryKey:
            dbms: mysql
            tableName: Branch
        - addColumn:
            tableName: Branch
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
        - addUniqueConstraint:
            tableName: Branch
            columnNames: repo_id, name
        - modifyDataType:
            dbms: mysql
            tableName: Branch
            columnName: name
            newDataType: varchar(10)
        - modifyDataType:
            tableName: Branch
            columnName: repo_id
            newDataType: char(41)
        - modifyDataType:
            dbms: postgresql
            tableName: Branch
            columnName: commit_id
            newDataType: char(41)
