databaseChangeLog:
  - changeSet:
      id: V070_rename_OrgGroupRepo_to_orggrouprepo
      author: seafile
      failOnError: false
      preConditions:
        - tableExists:
            tableName: OrgGroupRepo
      changes:
        - renameTable:
            oldTableName: OrgGroupRepo
            newTableName: orggrouprepo
  - changeSet:
      id: V070_create_orggrouprepo
      author: seafile
      changes:
        - createTable:
            ifNotExists: true
            tableName: orggrouprepo
            columns:
              - column:
                  name: id
                  type: bigserial
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: orggrouprepo_pkey
              - column:
                  name: org_id
                  type: int
              - column:
                  name: repo_id
                  type: varchar(41)
              - column:
                  name: group_id
                  type: int
              - column:
                  name: owner
                  type: varchar(255)
              - column:
                  name: permission
                  type: varchar(15)
  - changeSet:
      id: V070_normalize_orggrouprepo_repo_id_type
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          columnExists:
            tableName: orggrouprepo
            columnName: repo_id
      changes:
        - modifyDataType:
            tableName: orggrouprepo
            columnName: repo_id
            newDataType: varchar(41)
  - changeSet:
      id: V070_normalize_orggrouprepo_permission_type
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          columnExists:
            tableName: orggrouprepo
            columnName: permission
      changes:
        - modifyDataType:
            tableName: orggrouprepo
            columnName: permission
            newDataType: varchar(15)
  - changeSet:
      id: V070_normalize_orggrouprepo_org_id_idx
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: orggrouprepo
            indexName: org_id
      changes:
        - dropUniqueConstraint:
            tableName: orggrouprepo
            constraintName: org_id
  - changeSet:
      id: V070_normalize_orggrouprepo_org_id_group_id_repo_id_key
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: orggrouprepo
            indexName: orggrouprepo_org_id_group_id_repo_id_key
      changes:
        - dropUniqueConstraint:
            tableName: orggrouprepo
            constraintName: orggrouprepo_org_id_group_id_repo_id_key
  - changeSet:
      id: V070_add_unique_constraint_to_orggrouprepo_org_id_group_id_repo_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: orggrouprepo
                indexName: idx_orggrouprepo_org_id_group_id_repo_id
      changes:
        - addUniqueConstraint:
            tableName: orggrouprepo
            columnNames: org_id, group_id, repo_id
            constraintName: idx_orggrouprepo_org_id_group_id_repo_id
  - changeSet:
      id: V070_normalize_orggrouprepo_repo_id_idx
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: orggrouprepo
            indexName: repo_id
      changes:
        - dropUniqueConstraint:
            tableName: orggrouprepo
            constraintName: repo_id
  - changeSet:
      id: V070_add_index_to_orggrouprepo_repo_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: orggrouprepo
                indexName: idx_orggrouprepo_repo_id
      changes:
        - createIndex:
            indexName: idx_orggrouprepo_repo_id
            tableName: orggrouprepo
            columns:
              - column:
                  name: repo_id
  - changeSet:
      id: V070_normalize_orggrouprepo_owner_idx
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: orggrouprepo
            indexName: owner
      changes:
        - dropUniqueConstraint:
            tableName: orggrouprepo
            constraintName: owner
  - changeSet:
      id: V070_add_index_to_orggrouprepo_owner
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: orggrouprepo
                indexName: idx_orggrouprepo_owner
      changes:
        - createIndex:
            indexName: idx_orggrouprepo_owner
            tableName: orggrouprepo
            columns:
              - column:
                  name: owner
