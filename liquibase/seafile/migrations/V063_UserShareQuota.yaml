databaseChangeLog:
  - changeSet:
      id: V063_drop_primary_key_from_usersharequota
      author: seafile
      comment: "Legacy/Normalization: Prepare for structural PK change by dropping old PK."
      preConditions:
        - onFail: MARK_RAN
          primaryKeyExists:
            tableName: usersharequota
          not:
            - columnExists:
                tableName: usersharequota
                columnName: id
      changes:
        - dropPrimaryKey:
            tableName: usersharequota
  - changeSet:
      id: V063_normalize_usersharequota_compound_pkey
      author: seafile
      comment: "Legacy/Normalization: Drop old compound primary key."
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: usersharequota
            indexName: usersharequota_pkey
            columnNames: user
      changes:
        - dropPrimaryKey:
            tableName: usersharequota
  - changeSet:
      id: V063_normalize_usersharequota_id_pkey
      author: seafile
      comment: "Legacy/Normalization: Drop old named primary key."
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: usersharequota
            indexName: UserShareQuota_id_pkey
      changes:
        - dropPrimaryKey:
            tableName: usersharequota
            constraintName: UserShareQuota_id_pkey
  - changeSet:
      id: V063_add_id_to_usersharequota
      author: seafile
      comment: "Regular Migration: Structural PK change - add bigint id column as primary key."
      preConditions:
        - onFail: MARK_RAN
          not:
            - columnExists:
                tableName: usersharequota
                columnName: id
      changes:
        - addColumn:
            tableName: usersharequota
            ifNotExists: true
            columns:
              - column:
                  name: id
                  type: bigserial
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: usersharequota_pkey
  - changeSet:
      id: V063_change_id_type_in_usersharequota
      author: seafile
      comment: "Regular Migration: Ensure id column is bigint/bigserial."
      changes:
        - modifyDataType:
            tableName: usersharequota
            columnName: id
            newDataType: bigserial
  - changeSet:
      id: V063_normalize_usersharequota_pkey
      author: seafile
      comment: "Regular Migration: Ensure id column is the primary key."
      preConditions:
        - onFail: MARK_RAN
          not:
            - primaryKeyExists:
                tableName: usersharequota
      changes:
        - addPrimaryKey:
            tableName: usersharequota
            columnNames: id
            constraintName: usersharequota_pkey
  - changeSet:
      id: V063_normalize_usersharequota_id_autoincrement
      author: seafile
      comment: "Regular Migration: Add auto-increment to id for MySQL/MariaDB."
      dbms: mysql,mariadb
      changes:
        - addAutoIncrement:
            tableName: usersharequota
            columnName: id
            columnDataType: bigint
  - changeSet:
      id: V063_normalize_usersharequota_user_idx
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: usersharequota
            indexName: user
      changes:
        - dropUniqueConstraint:
            tableName: usersharequota
            constraintName: user
  - changeSet:
      id: V063_add_unique_constraint_to_usersharequota_user
      author: seafile
      comment: "Regular Migration: Add unique constraint on old key columns."
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: usersharequota
                indexName: idx_usersharequota_user
      changes:
        - addUniqueConstraint:
            tableName: usersharequota
            columnNames: user
            constraintName: idx_usersharequota_user
