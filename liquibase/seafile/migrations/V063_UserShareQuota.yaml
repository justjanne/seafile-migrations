databaseChangeLog:
  - changeSet:
      id: V063_normalize_usersharequota_pkey_purge_legacy
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          primaryKeyExists:
            tableName: usersharequota
          not:
            columnExists:
              tableName: usersharequota
              columnName: id
      changes:
        - dropPrimaryKey:
            tableName: usersharequota
  - changeSet:
      id: V063_add_id_to_usersharequota
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - columnExists:
                tableName: usersharequota
                columnName: id
          not:
            - primaryKeyExists:
                tableName: usersharequota
      changes:
        - addColumn:
            tableName: usersharequota
            ifNotExists: true
            columns:
              - column:
                  name: id
                  type: bigserial
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: usersharequota_pkey
  - changeSet:
      id: V063_change_id_type_in_usersharequota
      author: seafile
      changes:
        - modifyDataType:
            tableName: usersharequota
            columnName: id
            newDataType: bigserial
  - changeSet:
      id: V063_normalize_usersharequota_pkey_rebuild
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          primaryKeyExists:
            tableName: usersharequota
          not:
            primaryKeyExists:
              tableName: usersharequota
              primaryKeyName: usersharequota_pkey
      changes:
        - dropPrimaryKey:
            tableName: usersharequota
        - addPrimaryKey:
            tableName: usersharequota
            columnNames: id
            constraintName: usersharequota_pkey
  - changeSet:
      id: V063_normalize_usersharequota_id_autoincrement
      author: seafile
      dbms: mysql,mariadb
      changes:
        - addAutoIncrement:
            tableName: usersharequota
            columnName: id
            columnDataType: bigint
  - changeSet:
      id: V063_normalize_usersharequota_user_idx
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: usersharequota
            indexName: user
      changes:
        - dropUniqueConstraint:
            tableName: usersharequota
            constraintName: user
  - changeSet:
      id: V063_normalize_usersharequota_user_key
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: usersharequota
            indexName: usersharequota_user_key
      changes:
        - dropUniqueConstraint:
            tableName: usersharequota
            constraintName: usersharequota_user_key
  - changeSet:
      id: V063_add_unique_constraint_to_usersharequota_user
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: usersharequota
                indexName: idx_usersharequota_user
      changes:
        - addUniqueConstraint:
            tableName: usersharequota
            columnNames: user
            constraintName: idx_usersharequota_user
