databaseChangeLog:
  - changeSet:
      id: V013_RepoOwner
      author: seafile
      changes:
        - createTable:
            tableName: RepoOwner
            columns:
              - column:
                  name: repo_id
                  type: char(37)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: owner_id
                  type: varchar(255)
        - createIndex:
            tableName: RepoOwner
            indexName: repoowner_owner_id_idx
            columns:
              - column:
                  name: owner_id
