databaseChangeLog:
  - changeSet:
      id: V013_rename_RepoOwner_to_repoowner
      author: seafile
      failOnError: false
      preConditions:
        - tableExists:
            tableName: RepoOwner
      changes:
        - renameTable:
            oldTableName: RepoOwner
            newTableName: repoowner
  - changeSet:
      id: V013_normalize_repoowner_repo_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          columnExists:
            tableName: repoowner
            columnName: repo_id
      changes:
        - addNotNullConstraint:
            tableName: repoowner
            columnName: repo_id
            columnDataType: varchar(41)
            defaultNullValue: ""
        - dropDefaultValue:
            tableName: repoowner
            columnName: repo_id
  - changeSet:
      id: V013_normalize_repoowner_repo_id_type
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          columnExists:
            tableName: repoowner
            columnName: repo_id
      changes:
        - modifyDataType:
            tableName: repoowner
            columnName: repo_id
            newDataType: varchar(41)
  - changeSet:
      id: V013_create_repoowner
      author: seafile
      changes:
        - createTable:
            ifNotExists: true
            tableName: repoowner
            columns:
              - column:
                  name: repo_id
                  type: varchar(41)
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: repoowner_pkey
              - column:
                  name: owner_id
                  type: varchar(255)
  - changeSet:
      id: V013_normalize_repoowner_owner_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: repoowner
            indexName: owner_id
      changes:
        - dropIndex:
            tableName: repoowner
            indexName: owner_id
  - changeSet:
      id: V013_normalize_RepoOwner_repo_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: repoowner
            indexName: RepoOwner_repo_id
      changes:
        - dropIndex:
            tableName: repoowner
            indexName: RepoOwner_repo_id
  - changeSet:
      id: V013_add_index_to_repoowner_owner_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: repoowner
                indexName: idx_repoowner_owner_id
      changes:
        - createIndex:
            tableName: repoowner
            indexName: idx_repoowner_owner_id
            columns:
              - column:
                  name: owner_id
