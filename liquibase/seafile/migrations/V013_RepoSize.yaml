databaseChangeLog:
  - changeSet:
      id: V013_RepoSize
      author: seafile
      changes:
        - createTable:
            tableName: RepoSize
            columns:
              - column:
                  name: repo_id
                  type: char(37)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: size
                  type: bigint
              - column:
                  name: head_id
                  type: char(41)
