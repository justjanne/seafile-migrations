databaseChangeLog:
  - changeSet:
      id: V090_add_index_to_repousertoken_token
      author: seafile
      comment: Regular Migration - Add index to repousertoken token
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: repousertoken
                indexName: idx_repousertoken_token
      changes:
        - createIndex:
            indexName: idx_repousertoken_token
            tableName: repousertoken
            columns:
              - column:
                  name: token
