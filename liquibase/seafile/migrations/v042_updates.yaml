databaseChangeLog:
  - changeSet:
      id: v042-update-repotrash-del-time
      author: seafile
      preConditions:
        - onFail: CONTINUE
          not: { columnExists: { tableName: "${t_RepoTrash}", columnName: del_time } }
      changes:
        - addColumn:
            tableName: "${t_RepoTrash}"
            columns:
              - column: { name: del_time, type: bigint }

  - changeSet:
      id: v042-create-usersharequota
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not: { tableExists: { tableName: "${t_UserShareQuota}" } }
      changes:
        - createTable:
            tableName: "${t_UserShareQuota}"
            columns:
              - column: { name: user, type: varchar(255), constraints: { primaryKey: true, nullable: false } }
              - column: { name: quota, type: bigint }
