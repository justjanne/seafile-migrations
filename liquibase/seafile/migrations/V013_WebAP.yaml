databaseChangeLog:
  - changeSet:
      id: V013_rename_WebAP_to_webap
      author: seafile
      failOnError: false
      preConditions:
        - tableExists:
            tableName: WebAP
      changes:
        - renameTable:
            oldTableName: WebAP
            newTableName: webap
  - changeSet:
      id: V013_normalize_webap_repo_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          columnExists:
            tableName: webap
            columnName: repo_id
      changes:
        - addNotNullConstraint:
            tableName: webap
            columnName: repo_id
            columnDataType: varchar(41)
            defaultNullValue: ""
        - dropDefaultValue:
            tableName: webap
            columnName: repo_id
  - changeSet:
      id: V013_normalize_webap_repo_id_type
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          columnExists:
            tableName: webap
            columnName: repo_id
      changes:
        - modifyDataType:
            tableName: webap
            columnName: repo_id
            newDataType: varchar(41)
  - changeSet:
      id: V013_create_webap
      author: seafile
      changes:
        - createTable:
            ifNotExists: true
            tableName: webap
            columns:
              - column:
                  name: repo_id
                  type: varchar(41)
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: webap_pkey
              - column:
                  name: access_property
                  type: varchar(10)
