databaseChangeLog:
  - changeSet:
      id: V070_rename_OrgSharedRepo_to_orgsharedrepo
      author: seafile
      failOnError: false
      preConditions:
        - tableExists:
            tableName: OrgSharedRepo
      changes:
        - renameTable:
            oldTableName: OrgSharedRepo
            newTableName: orgsharedrepo
  - changeSet:
      id: V070_create_orgsharedrepo
      author: seafile
      changes:
        - createTable:
            ifNotExists: true
            tableName: orgsharedrepo
            columns:
              - column:
                  name: id
                  type: serial
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: orgsharedrepo_pkey
              - column:
                  name: org_id
                  type: int
              - column:
                  name: repo_id
                  type: varchar(41)
              - column:
                  name: from_email
                  type: varchar(255)
              - column:
                  name: to_email
                  type: varchar(255)
              - column:
                  name: permission
                  type: varchar(15)
  - changeSet:
      id: V070_add_index_to_orgsharedrepo_repo_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: orgsharedrepo
                indexName: idx_orgsharedrepo_repo_id
      changes:
        - createIndex:
            indexName: idx_orgsharedrepo_repo_id
            tableName: orgsharedrepo
            columns:
              - column:
                  name: repo_id
  - changeSet:
      id: V070_add_index_to_orgsharedrepo_org_id_repo_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: orgsharedrepo
                indexName: idx_orgsharedrepo_org_id_repo_id
      changes:
        - createIndex:
            indexName: idx_orgsharedrepo_org_id_repo_id
            tableName: orgsharedrepo
            columns:
              - column:
                  name: org_id
              - column:
                  name: repo_id
  - changeSet:
      id: V070_normalize_orgsharedrepo_from_email
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: orgsharedrepo
            indexName: from_email
      changes:
        - dropIndex:
            tableName: orgsharedrepo
            indexName: from_email
  - changeSet:
      id: V070_add_index_to_orgsharedrepo_from_email
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: orgsharedrepo
                indexName: idx_orgsharedrepo_from_email
      changes:
        - createIndex:
            indexName: idx_orgsharedrepo_from_email
            tableName: orgsharedrepo
            columns:
              - column:
                  name: from_email
  - changeSet:
      id: V070_normalize_orgsharedrepo_to_email
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: orgsharedrepo
            indexName: to_email
      changes:
        - dropIndex:
            tableName: orgsharedrepo
            indexName: to_email
  - changeSet:
      id: V070_add_index_to_orgsharedrepo_to_email
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: orgsharedrepo
                indexName: idx_orgsharedrepo_to_email
      changes:
        - createIndex:
            indexName: idx_orgsharedrepo_to_email
            tableName: orgsharedrepo
            columns:
              - column:
                  name: to_email
