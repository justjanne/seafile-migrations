databaseChangeLog:
  - changeSet:
      id: V070_rename_OrgSharedRepo_to_orgsharedrepo
      author: seafile
      failOnError: false
      preConditions:
        - tableExists:
            tableName: OrgSharedRepo
      changes:
        - renameTable:
            oldTableName: OrgSharedRepo
            newTableName: orgsharedrepo
  - changeSet:
      id: V070_create_orgsharedrepo
      author: seafile
      changes:
        - createTable:
            ifNotExists: true
            tableName: orgsharedrepo
            columns:
              - column:
                  name: id
                  type: bigserial
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: orgsharedrepo_pkey
              - column:
                  name: org_id
                  type: int
              - column:
                  name: repo_id
                  type: varchar(41)
              - column:
                  name: from_email
                  type: varchar(255)
              - column:
                  name: to_email
                  type: varchar(255)
              - column:
                  name: permission
                  type: varchar(15)
  - changeSet:
      id: V070_change_id_type_in_orgsharedrepo
      author: seafile
      changes:
        - modifyDataType:
            tableName: orgsharedrepo
            columnName: id
            newDataType: bigserial
  - changeSet:
      id: V070_normalize_orgsharedrepo_pkey
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - primaryKeyExists:
                tableName: orgsharedrepo
      changes:
        - addPrimaryKey:
            tableName: orgsharedrepo
            columnNames: id
            constraintName: orgsharedrepo_pkey
  - changeSet:
      id: V070_normalize_orgsharedrepo_id_autoincrement
      author: seafile
      dbms: mysql,mariadb
      changes:
        - addAutoIncrement:
            tableName: orgsharedrepo
            columnName: id
            columnDataType: bigint
  - changeSet:
      id: V070_normalize_orgsharedrepo_repo_id_type
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          columnExists:
            tableName: orgsharedrepo
            columnName: repo_id
      changes:
        - modifyDataType:
            tableName: orgsharedrepo
            columnName: repo_id
            newDataType: varchar(41)
  - changeSet:
      id: V070_normalize_orgsharedrepo_permission_type
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          columnExists:
            tableName: orgsharedrepo
            columnName: permission
      changes:
        - modifyDataType:
            tableName: orgsharedrepo
            columnName: permission
            newDataType: varchar(15)
  - changeSet:
      id: V070_add_index_to_orgsharedrepo_repo_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: orgsharedrepo
                indexName: idx_orgsharedrepo_repo_id
      changes:
        - createIndex:
            indexName: idx_orgsharedrepo_repo_id
            tableName: orgsharedrepo
            columns:
              - column:
                  name: repo_id
  - changeSet:
      id: V070_normalize_orgsharedrepo_org_id_repo_id_idx
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: orgsharedrepo
            indexName: orgsharedrepo_org_id_repo_id_idx
      changes:
        - dropIndex:
            tableName: orgsharedrepo
            indexName: orgsharedrepo_org_id_repo_id_idx
  - changeSet:
      id: V070_add_index_to_orgsharedrepo_org_id_repo_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: orgsharedrepo
                indexName: idx_orgsharedrepo_org_id_repo_id
      changes:
        - createIndex:
            indexName: idx_orgsharedrepo_org_id_repo_id
            tableName: orgsharedrepo
            columns:
              - column:
                  name: org_id
              - column:
                  name: repo_id
  - changeSet:
      id: V070_normalize_orgsharedrepo_from_email
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: orgsharedrepo
            indexName: from_email
      changes:
        - dropIndex:
            tableName: orgsharedrepo
            indexName: from_email
  - changeSet:
      id: V070_normalize_orgsharedrepo_from_email_idx
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: orgsharedrepo
            indexName: orgsharedrepo_from_email_idx
      changes:
        - dropIndex:
            tableName: orgsharedrepo
            indexName: orgsharedrepo_from_email_idx
  - changeSet:
      id: V070_add_index_to_orgsharedrepo_from_email
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: orgsharedrepo
                indexName: idx_orgsharedrepo_from_email
      changes:
        - createIndex:
            indexName: idx_orgsharedrepo_from_email
            tableName: orgsharedrepo
            columns:
              - column:
                  name: from_email
  - changeSet:
      id: V070_normalize_orgsharedrepo_to_email
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: orgsharedrepo
            indexName: to_email
      changes:
        - dropIndex:
            tableName: orgsharedrepo
            indexName: to_email
  - changeSet:
      id: V070_normalize_orgsharedrepo_to_email_idx
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: orgsharedrepo
            indexName: orgsharedrepo_to_email_idx
      changes:
        - dropIndex:
            tableName: orgsharedrepo
            indexName: orgsharedrepo_to_email_idx
  - changeSet:
      id: V070_add_index_to_orgsharedrepo_to_email
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: orgsharedrepo
                indexName: idx_orgsharedrepo_to_email
      changes:
        - createIndex:
            indexName: idx_orgsharedrepo_to_email
            tableName: orgsharedrepo
            columns:
              - column:
                  name: to_email
