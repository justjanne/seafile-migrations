databaseChangeLog:
- changeSet:
    id: V063_RepoHistoryLimit
    author: seafile
    changes:
    - dropPrimaryKey:
        tableName: repohistorylimit
        constraintName: RepoHistoryLimit_pkey
    - addColumn:
        tableName: repohistorylimit
        columns:
        - column:
            name: id
            type: BIGINT
            autoIncrement: true
            constraints:
              primaryKey: true
              primaryKeyName: RepoHistoryLimit_pkey
    - sql:
        dbms: mysql,mariadb
        sql: ALTER TABLE `repohistorylimit` MODIFY COLUMN `repo_id` CHAR(37)
    - modifyDataType:
        tableName: repohistorylimit
        columnName: repo_id
        newDataType: CHAR(37)
        dbms: postgresql
    - dropDefaultValue:
        tableName: repohistorylimit
        columnName: repo_id
    - addUniqueConstraint:
        tableName: repohistorylimit
        columnNames: repo_id
        constraintName: RepoHistoryLimit_repo_id_uq
    preConditions:
      onFail: CONTINUE
      not:
        columnExists:
          tableName: repohistorylimit
          columnName: id
    failOnError: false
