        sql: ALTER TABLE `orgquota` MODIFY COLUMN `org_id` int NOT NULL AUTO_INCREMENT
    - sql:
        dbms: mysql,mariadb
        sql: ALTER TABLE `orgquota` MODIFY COLUMN `org_id` int NOT NULL AUTO_INCREMENT
    - sql:
        dbms: mysql,mariadb
