databaseChangeLog:
  - {{migration_add_pkey(V063,OrgQuota,id)}}
  - changeSet:
      id: V063_normalize_orgquota_org_id_idx
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: orgquota
            indexName: org_id
      changes:
        - dropUniqueConstraint:
            tableName: orgquota
            constraintName: org_id
  - changeSet:
      id: V063_normalize_orgquota_org_id_key
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: orgquota
            indexName: orgquota_org_id_key
      changes:
        - dropUniqueConstraint:
            tableName: orgquota
            constraintName: orgquota_org_id_key
  - changeSet:
      id: V063_add_unique_constraint_to_orgquota_org_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: orgquota
                indexName: idx_orgquota_org_id
      changes:
        - addUniqueConstraint:
            tableName: orgquota
            columnNames: org_id
            constraintName: idx_orgquota_org_id
