databaseChangeLog:
  - changeSet:
      id: V063_normalize_orgquota_pkey_drop
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          primaryKeyExists:
            tableName: orgquota
          not:
            - columnExists:
                tableName: orgquota
                columnName: id
      changes:
        - dropPrimaryKey:
            tableName: orgquota
  - changeSet:
      id: V063_normalize_orgquota_compound_pkey
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: orgquota
            indexName: orgquota_pkey
            columnNames: org_id
      changes:
        - dropPrimaryKey:
            tableName: orgquota
  - changeSet:
      id: V063_normalize_orgquota_id_pkey_old
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: orgquota
            indexName: OrgQuota_id_pkey
      changes:
        - dropPrimaryKey:
            tableName: orgquota
            constraintName: OrgQuota_id_pkey
  - changeSet:
      id: V063_add_id_to_orgquota
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - columnExists:
                tableName: orgquota
                columnName: id
      changes:
        - addColumn:
            tableName: orgquota
            ifNotExists: true
            columns:
              - column:
                  name: id
                  type: bigserial
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: orgquota_pkey
  - changeSet:
      id: V063_change_id_type_in_orgquota
      author: seafile
      changes:
        - modifyDataType:
            tableName: orgquota
            columnName: id
            newDataType: bigserial
  - changeSet:
      id: V063_normalize_orgquota_pkey
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - primaryKeyExists:
                tableName: orgquota
      changes:
        - addPrimaryKey:
            tableName: orgquota
            columnNames: id
            constraintName: orgquota_pkey
  - changeSet:
      id: V063_normalize_orgquota_id_autoincrement
      author: seafile
      dbms: mysql,mariadb
      changes:
        - addAutoIncrement:
            tableName: orgquota
            columnName: id
            columnDataType: bigint
  - changeSet:
      id: V063_normalize_orgquota_org_id_idx
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: orgquota
            indexName: org_id
      changes:
        - dropUniqueConstraint:
            tableName: orgquota
            constraintName: org_id
  - changeSet:
      id: V063_add_unique_constraint_to_orgquota_org_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: orgquota
                indexName: idx_orgquota_org_id
      changes:
        - addUniqueConstraint:
            tableName: orgquota
            columnNames: org_id
            constraintName: idx_orgquota_org_id
