databaseChangeLog:
  - changeSet:
      id: V030_rename_GarbageRepos_to_garbagerepos
      author: seafile
      failOnError: false
      preConditions:
        - tableExists:
            tableName: GarbageRepos
      changes:
        - renameTable:
            oldTableName: GarbageRepos
            newTableName: garbagerepos
  - changeSet:
      id: V030_normalize_garbagerepos_repo_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          columnExists:
            tableName: garbagerepos
            columnName: repo_id
      changes:
        - addNotNullConstraint:
            tableName: garbagerepos
            columnName: repo_id
            columnDataType: varchar(41)
            defaultNullValue: ""
        - dropDefaultValue:
            tableName: garbagerepos
            columnName: repo_id
  - changeSet:
      id: V030_create_garbagerepos
      author: seafile
      changes:
        - createTable:
            ifNotExists: true
            tableName: garbagerepos
            columns:
              - column:
                  name: repo_id
                  type: varchar(41)
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: garbagerepos_pkey
