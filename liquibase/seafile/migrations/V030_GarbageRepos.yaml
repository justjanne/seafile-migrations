databaseChangeLog:
- changeSet:
    id: V030_GarbageRepos
    author: seafile
    changes:
    - createTable:
        tableName: garbagerepos
        columns:
        - column:
            name: repo_id
            type: char(36)
            constraints:
              primaryKey: true
              nullable: false
    preConditions:
      onFail: MARK_RAN
      not:
        tableExists:
          tableName: garbagerepos
