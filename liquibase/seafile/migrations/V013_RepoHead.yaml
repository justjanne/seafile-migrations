databaseChangeLog:
  - changeSet:
      id: V013_RepoHead
      author: seafile
      changes:
        - createTable:
            tableName: RepoHead
            columns:
              - column:
                  name: repo_id
                  type: char(37)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: branch_name
                  type: varchar(10)
