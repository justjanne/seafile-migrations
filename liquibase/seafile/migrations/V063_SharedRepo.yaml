databaseChangeLog:
  - changeSet:
      id: V063_normalize_sharedrepo_repo_id_type
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          columnExists:
            tableName: sharedrepo
            columnName: repo_id
      changes:
        - modifyDataType:
            tableName: sharedrepo
            columnName: repo_id
            newDataType: varchar(41)
  - changeSet:
      id: V063_change_id_type_in_sharedrepo
      author: seafile
      changes:
        - modifyDataType:
            tableName: sharedrepo
            columnName: id
            newDataType: bigint
  - changeSet:
      id: V063_normalize_sharedrepo_id_autoincrement
      author: seafile
      dbms: mysql,mariadb
      changes:
        - addAutoIncrement:
            tableName: sharedrepo
            columnName: id
            columnDataType: bigint
