databaseChangeLog:
  - changeSet:
      id: V063_normalize_repoowner_pkey_drop
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          primaryKeyExists:
            tableName: repoowner
          not:
            - columnExists:
                tableName: repoowner
                columnName: id
      changes:
        - dropPrimaryKey:
            tableName: repoowner
  - changeSet:
      id: V063_normalize_repoowner_compound_pkey
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: repoowner
            indexName: repoowner_pkey
            columnNames: repo_id
      changes:
        - dropPrimaryKey:
            tableName: repoowner
  - changeSet:
      id: V063_normalize_repoowner_id_pkey_old
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: repoowner
            indexName: RepoOwner_id_pkey
      changes:
        - dropPrimaryKey:
            tableName: repoowner
            constraintName: RepoOwner_id_pkey
  - changeSet:
      id: V063_add_id_to_repoowner
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - columnExists:
                tableName: repoowner
                columnName: id
      changes:
        - addColumn:
            tableName: repoowner
            ifNotExists: true
            columns:
              - column:
                  name: id
                  type: bigserial
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: repoowner_pkey
  - changeSet:
      id: V063_change_id_type_in_repoowner
      author: seafile
      changes:
        - modifyDataType:
            tableName: repoowner
            columnName: id
            newDataType: bigserial
  - changeSet:
      id: V063_normalize_repoowner_pkey
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - primaryKeyExists:
                tableName: repoowner
      changes:
        - addPrimaryKey:
            tableName: repoowner
            columnNames: id
            constraintName: repoowner_pkey
  - changeSet:
      id: V063_normalize_repoowner_id_autoincrement
      author: seafile
      dbms: mysql,mariadb
      changes:
        - addAutoIncrement:
            tableName: repoowner
            columnName: id
            columnDataType: bigint
  - changeSet:
      id: V063_normalize_repoowner_repo_id_idx
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: repoowner
            indexName: repo_id
      changes:
        - dropUniqueConstraint:
            tableName: repoowner
            constraintName: repo_id
  - changeSet:
      id: V063_normalize_repoowner_repo_id_key
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: repoowner
            indexName: repoowner_repo_id_key
      changes:
        - dropUniqueConstraint:
            tableName: repoowner
            constraintName: repoowner_repo_id_key
  - changeSet:
      id: V063_normalize_repoowner_owner_idx
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: repoowner
            indexName: repoowner_owner_idx
      changes:
        - dropIndex:
            tableName: repoowner
            indexName: repoowner_owner_idx
  - changeSet:
      id: V063_add_unique_constraint_to_repoowner_repo_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: repoowner
                indexName: idx_repoowner_repo_id
      changes:
        - addUniqueConstraint:
            tableName: repoowner
            columnNames: repo_id
            constraintName: idx_repoowner_repo_id
  - changeSet:
      id: V063_normalize_repoowner_repo_id_type
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          columnExists:
            tableName: repoowner
            columnName: repo_id
      changes:
        - modifyDataType:
            tableName: repoowner
            columnName: repo_id
            newDataType: varchar(41)
