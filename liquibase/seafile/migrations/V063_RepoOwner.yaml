databaseChangeLog:
  - changeSet:
      id: V063_drop_primary_key_from_repoowner
      author: seafile
      comment: "Legacy/Normalization: Prepare for structural PK change by dropping old PK."
      preConditions:
        - onFail: MARK_RAN
          primaryKeyExists:
            tableName: repoowner
          not:
            - columnExists:
                tableName: repoowner
                columnName: id
      changes:
        - dropPrimaryKey:
            tableName: repoowner
  - changeSet:
      id: V063_normalize_repoowner_compound_pkey
      author: seafile
      comment: "Legacy/Normalization: Drop old compound primary key."
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: repoowner
            indexName: repoowner_pkey
            columnNames: repo_id
      changes:
        - dropPrimaryKey:
            tableName: repoowner
  - changeSet:
      id: V063_normalize_repoowner_id_pkey
      author: seafile
      comment: "Legacy/Normalization: Drop old named primary key."
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: repoowner
            indexName: RepoOwner_id_pkey
      changes:
        - dropPrimaryKey:
            tableName: repoowner
            constraintName: RepoOwner_id_pkey
  - changeSet:
      id: V063_add_id_to_repoowner
      author: seafile
      comment: "Regular Migration: Structural PK change - add bigint id column as primary key."
      preConditions:
        - onFail: MARK_RAN
          not:
            - columnExists:
                tableName: repoowner
                columnName: id
      changes:
        - addColumn:
            tableName: repoowner
            ifNotExists: true
            columns:
              - column:
                  name: id
                  type: bigserial
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: repoowner_pkey
  - changeSet:
      id: V063_change_id_type_in_repoowner
      author: seafile
      comment: "Regular Migration: Ensure id column is bigint/bigserial."
      changes:
        - modifyDataType:
            tableName: repoowner
            columnName: id
            newDataType: bigserial
  - changeSet:
      id: V063_normalize_repoowner_pkey
      author: seafile
      comment: "Regular Migration: Ensure id column is the primary key."
      preConditions:
        - onFail: MARK_RAN
          not:
            - primaryKeyExists:
                tableName: repoowner
      changes:
        - addPrimaryKey:
            tableName: repoowner
            columnNames: id
            constraintName: repoowner_pkey
  - changeSet:
      id: V063_normalize_repoowner_id_autoincrement
      author: seafile
      comment: "Regular Migration: Add auto-increment to id for MySQL/MariaDB."
      dbms: mysql,mariadb
      changes:
        - addAutoIncrement:
            tableName: repoowner
            columnName: id
            columnDataType: bigint
  - changeSet:
      id: V063_normalize_repoowner_repo_id_idx
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: repoowner
            indexName: repo_id
      changes:
        - dropUniqueConstraint:
            tableName: repoowner
            constraintName: repo_id
  - changeSet:
      id: V063_add_unique_constraint_to_repoowner_repo_id
      author: seafile
      comment: "Regular Migration: Add unique constraint on old key columns."
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: repoowner
                indexName: idx_repoowner_repo_id
      changes:
        - addUniqueConstraint:
            tableName: repoowner
            columnNames: repo_id
            constraintName: idx_repoowner_repo_id
