databaseChangeLog:
  - changeSet:
      id: V070_create_gcid
      author: seafile
      changes:
        - createTable:
            ifNotExists: true
            tableName: gcid
            columns:
              - column:
                  name: id
                  type: bigserial
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: gcid_pkey
              - column:
                  name: repo_id
                  type: varchar(41)
              - column:
                  name: gc_id
                  type: varchar(41)
  - changeSet:
      id: V070_normalize_gcid_repo_id_type
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          columnExists:
            tableName: gcid
            columnName: repo_id
      changes:
        - modifyDataType:
            tableName: gcid
            columnName: repo_id
            newDataType: varchar(41)
  - changeSet:
      id: V070_normalize_gcid_gc_id_type
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          columnExists:
            tableName: gcid
            columnName: gc_id
      changes:
        - modifyDataType:
            tableName: gcid
            columnName: gc_id
            newDataType: varchar(41)
  - changeSet:
      id: V070_normalize_gcid_repo_id_key
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: gcid
            indexName: gcid_repo_id_key
      changes:
        - dropUniqueConstraint:
            tableName: gcid
            constraintName: gcid_repo_id_key
  - changeSet:
      id: V070_add_unique_constraint_to_gcid_repo_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: gcid
                indexName: idx_gcid_repo_id
      changes:
        - addUniqueConstraint:
            tableName: gcid
            columnNames: repo_id
            constraintName: idx_gcid_repo_id
