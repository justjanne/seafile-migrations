databaseChangeLog:
- changeSet:
    id: V131_VirtualRepo
    author: seafile
    preConditions:
    - onFail: MARK_RAN
      dbms:
        type: postgresql
    changes:
    - dropIndex:
        tableName: virtualrepo
        indexName: virtualrepo_origin_repo_idx
    - createIndex:
        tableName: virtualrepo
        indexName: origin_repo
        columns:
        - column:
            name: repo_id
    failOnError: false
