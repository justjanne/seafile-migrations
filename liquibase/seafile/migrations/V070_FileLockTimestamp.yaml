databaseChangeLog:
  - changeSet:
      id: V070_rename_FileLockTimestamp_to_filelocktimestamp
      author: seafile
      failOnError: false
      preConditions:
        - tableExists:
            tableName: FileLockTimestamp
      changes:
        - renameTable:
            oldTableName: FileLockTimestamp
            newTableName: filelocktimestamp
  - changeSet:
      id: V070_create_filelocktimestamp
      author: seafile
      changes:
        - createTable:
            ifNotExists: true
            tableName: filelocktimestamp
            columns:
              - column:
                  name: id
                  type: bigserial
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: filelocktimestamp_pkey
              - column:
                  name: repo_id
                  type: varchar(41)
              - column:
                  name: update_time
                  type: bigint
                  constraints:
                    nullable: false
  - changeSet:
      id: V070_normalize_filelocktimestamp_repo_id_type
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          columnExists:
            tableName: filelocktimestamp
            columnName: repo_id
      changes:
        - modifyDataType:
            tableName: filelocktimestamp
            columnName: repo_id
            newDataType: varchar(41)
  - changeSet:
      id: V070_normalize_filelocktimestamp_repo_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: filelocktimestamp
            indexName: repo_id
      changes:
        - dropUniqueConstraint:
            tableName: filelocktimestamp
            constraintName: repo_id
  - changeSet:
      id: V070_normalize_filelocktimestamp_repo_id_key
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: filelocktimestamp
            indexName: filelocktimestamp_repo_id_key
      changes:
        - dropUniqueConstraint:
            tableName: filelocktimestamp
            constraintName: filelocktimestamp_repo_id_key
  - changeSet:
      id: V070_add_index_to_filelocktimestamp_repo_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: filelocktimestamp
                indexName: idx_filelocktimestamp_repo_id
      changes:
        - addUniqueConstraint:
            indexName: idx_filelocktimestamp_repo_id
            tableName: filelocktimestamp
            columnNames: repo_id
