databaseChangeLog:
  - changeSet:
      id: V063_drop_primary_key_from_virtualrepo
      author: seafile
      comment: "Legacy/Normalization: Prepare for structural PK change by dropping old PK."
      preConditions:
        - onFail: MARK_RAN
          primaryKeyExists:
            tableName: virtualrepo
          not:
            - columnExists:
                tableName: virtualrepo
                columnName: id
      changes:
        - dropPrimaryKey:
            tableName: virtualrepo
  - changeSet:
      id: V063_normalize_virtualrepo_compound_pkey
      author: seafile
      comment: "Legacy/Normalization: Drop old compound primary key."
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: virtualrepo
            indexName: virtualrepo_pkey
            columnNames: repo_id
      changes:
        - dropPrimaryKey:
            tableName: virtualrepo
  - changeSet:
      id: V063_normalize_virtualrepo_id_pkey
      author: seafile
      comment: "Legacy/Normalization: Drop old named primary key."
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: virtualrepo
            indexName: VirtualRepo_id_pkey
      changes:
        - dropPrimaryKey:
            tableName: virtualrepo
            constraintName: VirtualRepo_id_pkey
  - changeSet:
      id: V063_add_id_to_virtualrepo
      author: seafile
      comment: "Regular Migration: Structural PK change - add bigint id column as primary key."
      preConditions:
        - onFail: MARK_RAN
          not:
            - columnExists:
                tableName: virtualrepo
                columnName: id
      changes:
        - addColumn:
            tableName: virtualrepo
            ifNotExists: true
            columns:
              - column:
                  name: id
                  type: bigserial
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: virtualrepo_pkey
  - changeSet:
      id: V063_change_id_type_in_virtualrepo
      author: seafile
      comment: "Regular Migration: Ensure id column is bigint/bigserial."
      changes:
        - modifyDataType:
            tableName: virtualrepo
            columnName: id
            newDataType: bigserial
  - changeSet:
      id: V063_normalize_virtualrepo_pkey
      author: seafile
      comment: "Regular Migration: Ensure id column is the primary key."
      preConditions:
        - onFail: MARK_RAN
          not:
            - primaryKeyExists:
                tableName: virtualrepo
      changes:
        - addPrimaryKey:
            tableName: virtualrepo
            columnNames: id
            constraintName: virtualrepo_pkey
  - changeSet:
      id: V063_normalize_virtualrepo_id_autoincrement
      author: seafile
      comment: "Regular Migration: Add auto-increment to id for MySQL/MariaDB."
      dbms: mysql,mariadb
      changes:
        - addAutoIncrement:
            tableName: virtualrepo
            columnName: id
            columnDataType: bigint
  - changeSet:
      id: V063_normalize_virtualrepo_repo_id_idx
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: virtualrepo
            indexName: repo_id
      changes:
        - dropUniqueConstraint:
            tableName: virtualrepo
            constraintName: repo_id
  - changeSet:
      id: V063_add_unique_constraint_to_virtualrepo_repo_id
      author: seafile
      comment: "Regular Migration: Add unique constraint on old key columns."
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: virtualrepo
                indexName: idx_virtualrepo_repo_id
      changes:
        - addUniqueConstraint:
            tableName: virtualrepo
            columnNames: repo_id
            constraintName: idx_virtualrepo_repo_id
