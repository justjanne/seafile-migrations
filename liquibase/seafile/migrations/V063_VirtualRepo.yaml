databaseChangeLog:
  - changeSet:
      id: V063_normalize_virtualrepo_pkey_purge
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          and:
            - primaryKeyExists:
                tableName: virtualrepo
            - not:
                - columnExists:
                    tableName: virtualrepo
                    columnName: id
      changes:
        - dropPrimaryKey:
            tableName: virtualrepo
  - changeSet:
      id: V063_normalize_VirtualRepo_pkey_purge
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: virtualrepo
            indexName: VirtualRepo_pkey
      changes:
        - dropPrimaryKey:
            tableName: virtualrepo
            constraintName: VirtualRepo_pkey
  - changeSet:
      id: V063_normalize_VirtualRepo_id_pkey_purge
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          primaryKeyExists:
            tableName: virtualrepo
            primaryKeyName: VirtualRepo_id_pkey
      changes:
        - dropPrimaryKey:
            tableName: virtualrepo
            constraintName: VirtualRepo_id_pkey
  - changeSet:
      id: V063_add_id_to_virtualrepo
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - columnExists:
                tableName: virtualrepo
                columnName: id
      changes:
        - addColumn:
            tableName: virtualrepo
            ifNotExists: true
            columns:
              - column:
                  name: id
                  type: bigserial
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: virtualrepo_pkey
  - changeSet:
      id: V063_change_id_type_in_virtualrepo
      author: seafile
      changes:
        - modifyDataType:
            tableName: virtualrepo
            columnName: id
            newDataType: bigserial
  - changeSet:
      id: V063_normalize_virtualrepo_pkey_rebuild
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - primaryKeyExists:
                tableName: virtualrepo
      changes:
        - addPrimaryKey:
            tableName: virtualrepo
            columnNames: id
            constraintName: virtualrepo_pkey
  - changeSet:
      id: V063_normalize_virtualrepo_id_autoincrement
      author: seafile
      dbms: mysql,mariadb
      changes:
        - addAutoIncrement:
            tableName: virtualrepo
            columnName: id
            columnDataType: bigint
  - changeSet:
      id: V063_normalize_virtualrepo_repo_id_type
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          columnExists:
            tableName: virtualrepo
            columnName: repo_id
      changes:
        - modifyDataType:
            tableName: virtualrepo
            columnName: repo_id
            newDataType: varchar(41)
  - changeSet:
      id: V063_normalize_virtualrepo_origin_repo_type
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          columnExists:
            tableName: virtualrepo
            columnName: origin_repo
      changes:
        - modifyDataType:
            tableName: virtualrepo
            columnName: origin_repo
            newDataType: varchar(41)
  - changeSet:
      id: V063_normalize_virtualrepo_base_commit_type
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          columnExists:
            tableName: virtualrepo
            columnName: base_commit
      changes:
        - modifyDataType:
            tableName: virtualrepo
            columnName: base_commit
            newDataType: varchar(41)
  - changeSet:
      id: V063_normalize_virtualrepo_repo_id_idx
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: virtualrepo
            indexName: repo_id
      changes:
        - dropUniqueConstraint:
            tableName: virtualrepo
            constraintName: repo_id
  - changeSet:
      id: V063_normalize_virtualrepo_repo_id_key
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: virtualrepo
            indexName: virtualrepo_repo_id_key
      changes:
        - dropUniqueConstraint:
            tableName: virtualrepo
            constraintName: virtualrepo_repo_id_key
  - changeSet:
      id: V063_normalize_VirtualRepo_repo_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: virtualrepo
            indexName: VirtualRepo_repo_id
      changes:
        - dropIndex:
            tableName: virtualrepo
            indexName: VirtualRepo_repo_id
  - changeSet:
      id: V063_add_unique_constraint_to_virtualrepo_repo_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: virtualrepo
                indexName: idx_virtualrepo_repo_id
      changes:
        - addUniqueConstraint:
            tableName: virtualrepo
            columnNames: repo_id
            constraintName: idx_virtualrepo_repo_id
