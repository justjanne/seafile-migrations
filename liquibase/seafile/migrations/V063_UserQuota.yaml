databaseChangeLog:
  - changeSet:
      id: V063_drop_primary_key_from_userquota
      author: seafile
      comment: "Legacy/Normalization: Prepare for structural PK change by dropping old PK."
      preConditions:
        - onFail: MARK_RAN
          primaryKeyExists:
            tableName: userquota
          not:
            - columnExists:
                tableName: userquota
                columnName: id
      changes:
        - dropPrimaryKey:
            tableName: userquota
  - changeSet:
      id: V063_normalize_userquota_compound_pkey
      author: seafile
      comment: "Legacy/Normalization: Drop old compound primary key."
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: userquota
            indexName: userquota_pkey
            columnNames: user
      changes:
        - dropPrimaryKey:
            tableName: userquota
  - changeSet:
      id: V063_normalize_userquota_id_pkey
      author: seafile
      comment: "Legacy/Normalization: Drop old named primary key."
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: userquota
            indexName: UserQuota_id_pkey
      changes:
        - dropPrimaryKey:
            tableName: userquota
            constraintName: UserQuota_id_pkey
  - changeSet:
      id: V063_add_id_to_userquota
      author: seafile
      comment: "Regular Migration: Structural PK change - add bigint id column as primary key."
      preConditions:
        - onFail: MARK_RAN
          not:
            - columnExists:
                tableName: userquota
                columnName: id
      changes:
        - addColumn:
            tableName: userquota
            ifNotExists: true
            columns:
              - column:
                  name: id
                  type: bigserial
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: userquota_pkey
  - changeSet:
      id: V063_change_id_type_in_userquota
      author: seafile
      comment: "Regular Migration: Ensure id column is bigint/bigserial."
      changes:
        - modifyDataType:
            tableName: userquota
            columnName: id
            newDataType: bigserial
  - changeSet:
      id: V063_normalize_userquota_pkey
      author: seafile
      comment: "Regular Migration: Ensure id column is the primary key."
      preConditions:
        - onFail: MARK_RAN
          not:
            - primaryKeyExists:
                tableName: userquota
      changes:
        - addPrimaryKey:
            tableName: userquota
            columnNames: id
            constraintName: userquota_pkey
  - changeSet:
      id: V063_normalize_userquota_id_autoincrement
      author: seafile
      comment: "Regular Migration: Add auto-increment to id for MySQL/MariaDB."
      dbms: mysql,mariadb
      changes:
        - addAutoIncrement:
            tableName: userquota
            columnName: id
            columnDataType: bigint
  - changeSet:
      id: V063_normalize_userquota_user_idx
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: userquota
            indexName: user
      changes:
        - dropUniqueConstraint:
            tableName: userquota
            constraintName: user
  - changeSet:
      id: V063_add_unique_constraint_to_userquota_user
      author: seafile
      comment: "Regular Migration: Add unique constraint on old key columns."
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: userquota
                indexName: idx_userquota_user
      changes:
        - addUniqueConstraint:
            tableName: userquota
            columnNames: user
            constraintName: idx_userquota_user
