databaseChangeLog:
  - changeSet:
      id: V063_normalize_userquota_pkey_purge_legacy
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          primaryKeyExists:
            tableName: userquota
          not:
            columnExists:
              tableName: userquota
              columnName: id
      changes:
        - dropPrimaryKey:
            tableName: userquota
  - changeSet:
      id: V063_add_id_to_userquota
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - columnExists:
                tableName: userquota
                columnName: id
          not:
            - primaryKeyExists:
                tableName: userquota
      changes:
        - addColumn:
            tableName: userquota
            ifNotExists: true
            columns:
              - column:
                  name: id
                  type: bigserial
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: userquota_pkey
  - changeSet:
      id: V063_change_id_type_in_userquota
      author: seafile
      changes:
        - modifyDataType:
            tableName: userquota
            columnName: id
            newDataType: bigserial
  - changeSet:
      id: V063_normalize_userquota_pkey_rebuild
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          primaryKeyExists:
            tableName: userquota
          not:
            primaryKeyExists:
              tableName: userquota
              primaryKeyName: userquota_pkey
      changes:
        - dropPrimaryKey:
            tableName: userquota
        - addPrimaryKey:
            tableName: userquota
            columnNames: id
            constraintName: userquota_pkey
  - changeSet:
      id: V063_normalize_userquota_id_autoincrement
      author: seafile
      dbms: mysql,mariadb
      changes:
        - addAutoIncrement:
            tableName: userquota
            columnName: id
            columnDataType: bigint
  - changeSet:
      id: V063_normalize_userquota_user_idx
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: userquota
            indexName: user
      changes:
        - dropUniqueConstraint:
            tableName: userquota
            constraintName: user
  - changeSet:
      id: V063_add_unique_constraint_to_userquota_user
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: userquota
                indexName: idx_userquota_user
      changes:
        - addUniqueConstraint:
            tableName: userquota
            columnNames: user
            constraintName: idx_userquota_user
