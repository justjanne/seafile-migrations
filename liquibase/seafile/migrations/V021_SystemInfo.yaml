databaseChangeLog:
- changeSet:
    id: V021_SystemInfo
    author: seafile
    changes:
    - createTable:
        tableName: systeminfo
        columns:
        - column:
            name: info_key
            type: varchar(256)
        - column:
            name: info_value
            type: varchar(1024)
    preConditions:
      onFail: MARK_RAN
      not:
        tableExists:
          tableName: systeminfo
