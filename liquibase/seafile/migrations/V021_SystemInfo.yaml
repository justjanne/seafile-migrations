databaseChangeLog:
  - changeSet:
      id: V021_rename_SystemInfo_to_systeminfo
      author: seafile
      failOnError: false
      preConditions:
        - tableExists:
            tableName: SystemInfo
      changes:
        - renameTable:
            oldTableName: SystemInfo
            newTableName: systeminfo
  - changeSet:
      id: V021_create_systeminfo
      author: seafile
      changes:
        - createTable:
            ifNotExists: true
            tableName: systeminfo
            columns:
              - column:
                  name: info_key
                  type: varchar(256)
              - column:
                  name: info_value
                  type: varchar(1024)
