databaseChangeLog:
  - changeSet:
      id: V063_normalize_repovalidsince_pkey_drop
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          primaryKeyExists:
            tableName: repovalidsince
          not:
            - columnExists:
                tableName: repovalidsince
                columnName: id
      changes:
        - dropPrimaryKey:
            tableName: repovalidsince
  - changeSet:
      id: V063_normalize_repovalidsince_compound_pkey
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: repovalidsince
            indexName: repovalidsince_pkey
            columnNames: repo_id
      changes:
        - dropPrimaryKey:
            tableName: repovalidsince
  - changeSet:
      id: V063_normalize_repovalidsince_id_pkey_old
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: repovalidsince
            indexName: RepoValidSince_id_pkey
      changes:
        - dropPrimaryKey:
            tableName: repovalidsince
            constraintName: RepoValidSince_id_pkey
  - changeSet:
      id: V063_add_id_to_repovalidsince
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - columnExists:
                tableName: repovalidsince
                columnName: id
      changes:
        - addColumn:
            tableName: repovalidsince
            ifNotExists: true
            columns:
              - column:
                  name: id
                  type: bigserial
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: repovalidsince_pkey
  - changeSet:
      id: V063_change_id_type_in_repovalidsince
      author: seafile
      changes:
        - modifyDataType:
            tableName: repovalidsince
            columnName: id
            newDataType: bigserial
  - changeSet:
      id: V063_normalize_repovalidsince_pkey
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - primaryKeyExists:
                tableName: repovalidsince
      changes:
        - addPrimaryKey:
            tableName: repovalidsince
            columnNames: id
            constraintName: repovalidsince_pkey
  - changeSet:
      id: V063_normalize_repovalidsince_id_autoincrement
      author: seafile
      dbms: mysql,mariadb
      changes:
        - addAutoIncrement:
            tableName: repovalidsince
            columnName: id
            columnDataType: bigint
  - changeSet:
      id: V063_normalize_repovalidsince_repo_id_idx
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: repovalidsince
            indexName: repo_id
      changes:
        - dropUniqueConstraint:
            tableName: repovalidsince
            constraintName: repo_id
  - changeSet:
      id: V063_add_unique_constraint_to_repovalidsince_repo_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: repovalidsince
                indexName: idx_repovalidsince_repo_id
      changes:
        - addUniqueConstraint:
            tableName: repovalidsince
            columnNames: repo_id
            constraintName: idx_repovalidsince_repo_id
