databaseChangeLog:
  - changeSet:
      id: V130_RoleDownloadRateLimit
      author: seafile
      changes:
        - createTable:
            tableName: RoleDownloadRateLimit
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: role
                  type: varchar(255)
                  constraints:
                    unique: true
              - column:
                  name: download_limit
                  type: bigint
