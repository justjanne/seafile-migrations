databaseChangeLog:
  - changeSet:
      id: V070_rename_RoleQuota_to_rolequota
      author: seafile
      comment: Legacy/Normalization - Normalize table name to lowercase
      failOnError: false
      preConditions:
        - tableExists:
            tableName: RoleQuota
      changes:
        - renameTable:
            oldTableName: RoleQuota
            newTableName: rolequota
  - changeSet:
      id: V070_create_rolequota
      author: seafile
      comment: Regular Migration - Create table rolequota
      changes:
        - createTable:
            ifNotExists: true
            tableName: rolequota
            columns:
              - column:
                  name: id
                  type: bigserial
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: rolequota_pkey
              - column:
                  name: role
                  type: varchar(255)
              - column:
                  name: quota
                  type: bigint
  - changeSet:
      id: V070_normalize_rolequota_role_idx
      author: seafile
      comment: Legacy/Normalization - Normalize constraint name from role back to idx_rolequota_role
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: rolequota
            indexName: role
      changes:
        - dropUniqueConstraint:
            tableName: rolequota
            constraintName: role
  - changeSet:
      id: V063_add_unique_constraint_to_rolequota_role
      author: seafile
      comment: "Regular Migration: Add unique constraint on old key columns."
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: rolequota
                indexName: idx_rolequota_role
      changes:
        - addUniqueConstraint:
            tableName: rolequota
            columnNames: role
            constraintName: idx_rolequota_role
