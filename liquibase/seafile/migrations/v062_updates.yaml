databaseChangeLog:
  - changeSet:
      id: v062-create-repoinfo
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not: { tableExists: { tableName: "${t_RepoInfo}" } }
      changes:
        - createTable:
            tableName: "${t_RepoInfo}"
            columns:
              - column: { name: repo_id, type: char(36), constraints: { primaryKey: true, nullable: false } }
              - column: { name: name, type: varchar(255), constraints: { nullable: false } }
              - column: { name: update_time, type: bigint }
              - column: { name: version, type: int }
              - column: { name: is_encrypted, type: int }
              - column: { name: last_modifier, type: varchar(255) }

  - changeSet:
      id: v062-create-seafileconf
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not: { tableExists: { tableName: "${t_SeafileConf}" } }
      changes:
        - createTable:
            tableName: "${t_SeafileConf}"
            columns:
              - column: { name: cfg_group, type: varchar(255), constraints: { nullable: false } }
              - column: { name: cfg_key, type: varchar(255), constraints: { nullable: false } }
              - column: { name: value, type: varchar(255) }
              - column: { name: property, type: int }
