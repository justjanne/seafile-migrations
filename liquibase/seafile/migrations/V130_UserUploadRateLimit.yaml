databaseChangeLog:
- changeSet:
    id: V130_UserUploadRateLimit
    author: seafile
    changes:
    - createTable:
        tableName: useruploadratelimit
        columns:
        - column:
            name: id
            type: BIGINT
            autoIncrement: true
            constraints:
              primaryKey: true
        - column:
            name: user
            type: VARCHAR(255)
            constraints:
              unique: true
        - column:
            name: upload_limit
            type: BIGINT
    preConditions:
      onFail: MARK_RAN
      not:
        tableExists:
          tableName: useruploadratelimit
