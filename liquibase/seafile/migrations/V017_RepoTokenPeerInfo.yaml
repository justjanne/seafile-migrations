databaseChangeLog:
- changeSet:
    id: V017_RepoTokenPeerInfo
    author: seafile
    changes:
    - createTable:
        tableName: repotokenpeerinfo
        columns:
        - column:
            name: token
            type: char(41)
            constraints:
              primaryKey: true
              nullable: false
        - column:
            name: peer_id
            type: char(41)
        - column:
            name: peer_ip
            type: varchar(41)
        - column:
            name: peer_name
            type: varchar(255)
        - column:
            name: sync_time
            type: bigint
    preConditions:
      onFail: MARK_RAN
      not:
        tableExists:
          tableName: repotokenpeerinfo
