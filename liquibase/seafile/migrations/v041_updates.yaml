databaseChangeLog:
  - changeSet:
      id: v041-normalize-repotrash
      author: seafile
      failOnError: false
      dbms: mysql,mariadb
      changes: [ { renameTable: { oldTableName: RepoTrash, newTableName: repotrash } } ]
  - changeSet:
      id: v041-create-repotrash
      author: seafile
      preConditions: [ { onFail: MARK_RAN, not: { tableExists: { tableName: repotrash } } } ]
      changes:
        - createTable:
            tableName: repotrash
            columns:
              - column: { name: repo_id, type: char(36), constraints: { primaryKey: true, nullable: false } }
              - column: { name: repo_name, type: varchar(255) }
              - column: { name: head_id, type: char(40) }
              - column: { name: owner_id, type: varchar(255) }
              - column: { name: size, type: bigint }
              - column: { name: org_id, type: int }
        - createIndex: { indexName: idx_repotrash_owner_id, tableName: repotrash, columns: [ { name: owner_id } ] }
        - createIndex: { indexName: idx_repotrash_org_id, tableName: repotrash, columns: [ { name: org_id } ] }
