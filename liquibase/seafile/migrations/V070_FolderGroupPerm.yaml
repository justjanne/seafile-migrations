databaseChangeLog:
  - changeSet:
      id: V070_rename_FolderGroupPerm_to_foldergroupperm
      author: seafile
      failOnError: false
      preConditions:
        - tableExists:
            tableName: FolderGroupPerm
      changes:
        - renameTable:
            oldTableName: FolderGroupPerm
            newTableName: foldergroupperm
  - changeSet:
      id: V070_create_foldergroupperm
      author: seafile
      changes:
        - createTable:
            ifNotExists: true
            tableName: foldergroupperm
            columns:
              - column:
                  name: id
                  type: bigserial
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: foldergroupperm_pkey
              - column:
                  name: repo_id
                  type: varchar(41)
                  constraints:
                    nullable: false
              - column:
                  name: path
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: permission
                  type: varchar(15)
              - column:
                  name: group_id
                  type: int
                  constraints:
                    nullable: false
  - changeSet:
      id: V070_normalize_foldergroupperm_repo_id_type
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          columnExists:
            tableName: foldergroupperm
            columnName: repo_id
      changes:
        - modifyDataType:
            tableName: foldergroupperm
            columnName: repo_id
            newDataType: varchar(41)
  - changeSet:
      id: V070_normalize_foldergroupperm_repo_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: foldergroupperm
            indexName: repo_id
      changes:
        - dropUniqueConstraint:
            tableName: foldergroupperm
            constraintName: repo_id
  - changeSet:
      id: V070_add_index_to_foldergroupperm_repo_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: foldergroupperm
                indexName: idx_foldergroupperm_repo_id
      changes:
        - createIndex:
            indexName: idx_foldergroupperm_repo_id
            tableName: foldergroupperm
            columns:
              - column:
                  name: repo_id
