databaseChangeLog:
  - changeSet:
      id: v030-create-garbagerepos
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not: { tableExists: { tableName: "${t_GarbageRepos}" } }
      changes:
        - createTable:
            tableName: "${t_GarbageRepos}"
            columns:
              - column: { name: repo_id, type: char(36), constraints: { primaryKey: true, nullable: false } }
