databaseChangeLog:
  - {{migration_add_pkey(V063,WebAP,id)}}
  - changeSet:
      id: V063_normalize_webap_repo_id_type
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          columnExists:
            tableName: webap
            columnName: repo_id
      changes:
        - modifyDataType:
            tableName: webap
            columnName: repo_id
            newDataType: varchar(41)
  - changeSet:
      id: V063_normalize_webap_webap_repo_id_idx
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: webap
            indexName: repo_id
      changes:
        - dropUniqueConstraint:
            tableName: webap
            constraintName: repo_id
  - changeSet:
      id: V063_normalize_webap_webap_repo_id_key
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: webap
            indexName: webap_repo_id_key
      changes:
        - dropUniqueConstraint:
            tableName: webap
            constraintName: webap_repo_id_key
  - changeSet:
      id: V063_normalize_WebAP_repo_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: webap
            indexName: WebAP_repo_id
      changes:
        - dropIndex:
            tableName: webap
            indexName: WebAP_repo_id
  - changeSet:
      id: V063_add_unique_constraint_to_webap_repo_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: webap
                indexName: idx_webap_repo_id
      changes:
        - addUniqueConstraint:
            tableName: webap
            columnNames: repo_id
            constraintName: idx_webap_repo_id
