databaseChangeLog:
  - changeSet:
      id: V063_normalize_webap_pkey_purge_legacy
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          primaryKeyExists:
            tableName: webap
          not:
            columnExists:
              tableName: webap
              columnName: id
      changes:
        - dropPrimaryKey:
            tableName: webap
  - changeSet:
      id: V063_add_id_to_webap
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - columnExists:
                tableName: webap
                columnName: id
          not:
            - primaryKeyExists:
                tableName: webap
      changes:
        - addColumn:
            tableName: webap
            ifNotExists: true
            columns:
              - column:
                  name: id
                  type: bigserial
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: webap_pkey
  - changeSet:
      id: V063_change_id_type_in_webap
      author: seafile
      changes:
        - modifyDataType:
            tableName: webap
            columnName: id
            newDataType: bigserial
  - changeSet:
      id: V063_normalize_webap_pkey_rebuild
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          primaryKeyExists:
            tableName: webap
          not:
            primaryKeyExists:
              tableName: webap
              primaryKeyName: webap_pkey
      changes:
        - dropPrimaryKey:
            tableName: webap
        - addPrimaryKey:
            tableName: webap
            columnNames: id
            constraintName: webap_pkey
  - changeSet:
      id: V063_normalize_webap_id_autoincrement
      author: seafile
      dbms: mysql,mariadb
      changes:
        - addAutoIncrement:
            tableName: webap
            columnName: id
            columnDataType: bigint
  - changeSet:
      id: V063_normalize_webap_repo_id_idx
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: webap
            indexName: repo_id
      changes:
        - dropUniqueConstraint:
            tableName: webap
            constraintName: repo_id
  - changeSet:
      id: V063_normalize_webap_repo_id_type
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          columnExists:
            tableName: webap
            columnName: repo_id
      changes:
        - modifyDataType:
            tableName: webap
            columnName: repo_id
            newDataType: varchar(41)
  - changeSet:
      id: V063_add_unique_constraint_to_webap_repo_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: webap
                indexName: idx_webap_repo_id
      changes:
        - addUniqueConstraint:
            tableName: webap
            columnNames: repo_id
            constraintName: idx_webap_repo_id
