databaseChangeLog:
- changeSet:
    id: V014_RepoHistoryLimit
    author: seafile
    changes:
    - createTable:
        tableName: repohistorylimit
        columns:
        - column:
            name: repo_id
            type: char(37)
            constraints:
              primaryKey: true
              nullable: false
        - column:
            name: days
            type: int
    preConditions:
      onFail: MARK_RAN
      not:
        tableExists:
          tableName: repohistorylimit
