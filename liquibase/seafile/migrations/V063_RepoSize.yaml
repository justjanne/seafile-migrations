            tableName: RepoSize
            columnName: repo_id
            newDataType: CHAR(37)
        - dropDefaultValue:
            tableName: RepoSize
            columnName: repo_id
        - addUniqueConstraint:
            tableName: RepoSize
            columnNames: repo_id
            constraintName: RepoSize_repo_id_uq
