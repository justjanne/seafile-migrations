databaseChangeLog:
  - changeSet:
      id: V063_RepoSize
      author: seafile
      changes:
        - dropPrimaryKey:
            tableName: RepoSize
            constraintName: RepoSize_pkey
        - addColumn:
            tableName: RepoSize
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
