databaseChangeLog:
  - changeSet:
      id: V063_normalize_reposize_pkey_purge
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          and:
            - primaryKeyExists:
                tableName: reposize
            - not:
                - columnExists:
                    tableName: reposize
                    columnName: id
      changes:
        - dropPrimaryKey:
            tableName: reposize
  - changeSet:
      id: V063_normalize_RepoSize_pkey_purge
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: reposize
            indexName: RepoSize_pkey
      changes:
        - dropPrimaryKey:
            tableName: reposize
            constraintName: RepoSize_pkey
  - changeSet:
      id: V063_normalize_RepoSize_id_pkey_purge
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          primaryKeyExists:
            tableName: reposize
            primaryKeyName: RepoSize_id_pkey
      changes:
        - dropPrimaryKey:
            tableName: reposize
            constraintName: RepoSize_id_pkey
  - changeSet:
      id: V063_add_id_to_reposize
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - columnExists:
                tableName: reposize
                columnName: id
      changes:
        - addColumn:
            tableName: reposize
            ifNotExists: true
            columns:
              - column:
                  name: id
                  type: bigserial
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: reposize_pkey
  - changeSet:
      id: V063_change_id_type_in_reposize
      author: seafile
      changes:
        - modifyDataType:
            tableName: reposize
            columnName: id
            newDataType: bigserial
  - changeSet:
      id: V063_normalize_reposize_pkey_rebuild
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - primaryKeyExists:
                tableName: reposize
      changes:
        - addPrimaryKey:
            tableName: reposize
            columnNames: id
            constraintName: reposize_pkey
  - changeSet:
      id: V063_normalize_reposize_id_autoincrement
      author: seafile
      dbms: mysql,mariadb
      changes:
        - addAutoIncrement:
            tableName: reposize
            columnName: id
            columnDataType: bigint
  - changeSet:
      id: V063_normalize_reposize_repo_id_idx
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: reposize
            indexName: repo_id
      changes:
        - dropUniqueConstraint:
            tableName: reposize
            constraintName: repo_id
  - changeSet:
      id: V063_normalize_reposize_repo_id_key
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: reposize
            indexName: reposize_repo_id_key
      changes:
        - dropUniqueConstraint:
            tableName: reposize
            constraintName: reposize_repo_id_key
  - changeSet:
      id: V063_normalize_RepoSize_repo_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: reposize
            indexName: RepoSize_repo_id
      changes:
        - dropIndex:
            tableName: reposize
            indexName: RepoSize_repo_id
  - changeSet:
      id: V063_add_unique_constraint_to_reposize_repo_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: reposize
                indexName: idx_reposize_repo_id
      changes:
        - addUniqueConstraint:
            tableName: reposize
            columnNames: repo_id
            constraintName: idx_reposize_repo_id
  - changeSet:
      id: V063_normalize_reposize_repo_id_type
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          columnExists:
            tableName: reposize
            columnName: repo_id
      changes:
        - modifyDataType:
            tableName: reposize
            columnName: repo_id
            newDataType: varchar(41)
