databaseChangeLog:
  - changeSet:
      id: V063_normalize_reposize_pkey_drop
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          primaryKeyExists:
            tableName: reposize
          not:
            - columnExists:
                tableName: reposize
                columnName: id
      changes:
        - dropPrimaryKey:
            tableName: reposize
  - changeSet:
      id: V063_normalize_reposize_compound_pkey
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: reposize
            indexName: reposize_pkey
            columnNames: repo_id
      changes:
        - dropPrimaryKey:
            tableName: reposize
  - changeSet:
      id: V063_normalize_reposize_id_pkey_old
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: reposize
            indexName: RepoSize_id_pkey
      changes:
        - dropPrimaryKey:
            tableName: reposize
            constraintName: RepoSize_id_pkey
  - changeSet:
      id: V063_add_id_to_reposize
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - columnExists:
                tableName: reposize
                columnName: id
      changes:
        - addColumn:
            tableName: reposize
            ifNotExists: true
            columns:
              - column:
                  name: id
                  type: bigserial
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: reposize_pkey
  - changeSet:
      id: V063_change_id_type_in_reposize
      author: seafile
      changes:
        - modifyDataType:
            tableName: reposize
            columnName: id
            newDataType: bigserial
  - changeSet:
      id: V063_normalize_reposize_pkey
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - primaryKeyExists:
                tableName: reposize
      changes:
        - addPrimaryKey:
            tableName: reposize
            columnNames: id
            constraintName: reposize_pkey
  - changeSet:
      id: V063_normalize_reposize_id_autoincrement
      author: seafile
      dbms: mysql,mariadb
      changes:
        - addAutoIncrement:
            tableName: reposize
            columnName: id
            columnDataType: bigint
  - changeSet:
      id: V063_normalize_reposize_repo_id_idx
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: reposize
            indexName: repo_id
      changes:
        - dropUniqueConstraint:
            tableName: reposize
            constraintName: repo_id
  - changeSet:
      id: V063_add_unique_constraint_to_reposize_repo_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: reposize
                indexName: idx_reposize_repo_id
      changes:
        - addUniqueConstraint:
            tableName: reposize
            columnNames: repo_id
            constraintName: idx_reposize_repo_id
