databaseChangeLog:
  - changeSet:
      id: V063_normalize_innerpubrepo_pkey_purge
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          primaryKeyExists:
            tableName: innerpubrepo
          not:
            columnExists:
              tableName: innerpubrepo
              columnName: id
      changes:
        - dropPrimaryKey:
            tableName: innerpubrepo
  - changeSet:
      id: V063_add_id_to_innerpubrepo
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - columnExists:
                tableName: innerpubrepo
                columnName: id
          not:
            - primaryKeyExists:
                tableName: innerpubrepo
      changes:
        - addColumn:
            tableName: innerpubrepo
            ifNotExists: true
            columns:
              - column:
                  name: id
                  type: bigserial
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: innerpubrepo_pkey
  - changeSet:
      id: V063_change_id_type_in_innerpubrepo
      author: seafile
      changes:
        - modifyDataType:
            tableName: innerpubrepo
            columnName: id
            newDataType: bigserial
  - changeSet:
      id: V063_normalize_innerpubrepo_pkey_rebuild
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          primaryKeyExists:
            tableName: innerpubrepo
          not:
            primaryKeyExists:
              tableName: innerpubrepo
              primaryKeyName: innerpubrepo_pkey
      changes:
        - dropPrimaryKey:
            tableName: innerpubrepo
        - addPrimaryKey:
            tableName: innerpubrepo
            columnNames: id
            constraintName: innerpubrepo_pkey
  - changeSet:
      id: V063_normalize_innerpubrepo_id_autoincrement
      author: seafile
      dbms: mysql,mariadb
      changes:
        - addAutoIncrement:
            tableName: innerpubrepo
            columnName: id
            columnDataType: bigint
  - changeSet:
      id: V063_normalize_innerpubrepo_repo_id_idx
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: innerpubrepo
            indexName: repo_id
      changes:
        - dropUniqueConstraint:
            tableName: innerpubrepo
            constraintName: repo_id
  - changeSet:
      id: V063_add_unique_constraint_to_innerpubrepo_repo_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: innerpubrepo
                indexName: idx_innerpubrepo_repo_id
      changes:
        - addUniqueConstraint:
            tableName: innerpubrepo
            columnNames: repo_id
            constraintName: idx_innerpubrepo_repo_id
  - changeSet:
      id: V063_normalize_innerpubrepo_repo_id_type
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          columnExists:
            tableName: innerpubrepo
            columnName: repo_id
      changes:
        - modifyDataType:
            tableName: innerpubrepo
            columnName: repo_id
            newDataType: varchar(41)
