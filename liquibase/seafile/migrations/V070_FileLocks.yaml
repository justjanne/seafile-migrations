databaseChangeLog:
  - changeSet:
      id: V070_rename_FileLocks_to_filelocks
      author: seafile
      failOnError: false
      preConditions:
        - tableExists:
            tableName: FileLocks
      changes:
        - renameTable:
            oldTableName: FileLocks
            newTableName: filelocks
  - changeSet:
      id: V070_create_filelocks
      author: seafile
      changes:
        - createTable:
            ifNotExists: true
            tableName: filelocks
            columns:
              - column:
                  name: id
                  type: bigserial
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: filelocks_pkey
              - column:
                  name: repo_id
                  type: varchar(41)
                  constraints:
                    nullable: false
              - column:
                  name: path
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: user_name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: lock_time
                  type: bigint
              - column:
                  name: expire
                  type: bigint
  - changeSet:
      id: V070_normalize_filelocks_repo_id_type
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          columnExists:
            tableName: filelocks
            columnName: repo_id
      changes:
        - modifyDataType:
            tableName: filelocks
            columnName: repo_id
            newDataType: varchar(41)
  - changeSet:
      id: V070_add_index_to_filelocks_repo_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: filelocks
                indexName: idx_filelocks_repo_id
      changes:
        - createIndex:
            indexName: idx_filelocks_repo_id
            tableName: filelocks
            columns:
              - column:
                  name: repo_id
