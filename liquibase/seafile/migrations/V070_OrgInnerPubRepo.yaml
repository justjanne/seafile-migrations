databaseChangeLog:
- changeSet:
    id: v070-orginnerpubrepo
    author: seafile
    changes:
    - createTable:
        tableName: orginnerpubrepo
        columns:
        - column:
            name: id
            type: bigint
            autoIncrement: true
            constraints:
              primaryKey: true
        - column:
            name: org_id
            type: int
        - column:
            name: repo_id
            type: char(37)
        - column:
            name: permission
            type: char(15)
    - addUniqueConstraint:
        tableName: orginnerpubrepo
        columnNames: org_id, repo_id
        constraintName: uk_orginnerpubrepo_org_repo
    preConditions:
      onFail: MARK_RAN
      not:
        tableExists:
          tableName: orginnerpubrepo
