      author: seafile
      preConditions:
        - onFail: MARK_RAN
          columnExists:
            tableName: repousertoken
            columnName: repo_id
      changes:
        - modifyDataType:
            tableName: repousertoken
            columnName: repo_id
            newDataType: varchar(41)
  - changeSet:
      id: V063_normalize_repousertoken_token_type
      author: seafile
      preConditions:
