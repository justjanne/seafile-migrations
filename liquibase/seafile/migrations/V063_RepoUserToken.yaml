          columnExists:
            tableName: repousertoken
            columnName: token
      changes:
        - modifyDataType:
            tableName: repousertoken
            columnName: token
            newDataType: varchar(41)
  - changeSet:
      id: V063_add_unique_constraint_to_repousertoken_repo_id_token
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
