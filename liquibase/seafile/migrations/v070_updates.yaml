databaseChangeLog:
  - changeSet:
      id: v070-create-filelocks
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not: { tableExists: { tableName: "${t_FileLocks}" } }
      changes:
        - createTable:
            tableName: "${t_FileLocks}"
            columns:
              - column: { name: id, type: bigint, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: repo_id, type: char(40), constraints: { nullable: false } }
              - column: { name: path, type: text, constraints: { nullable: false } }
              - column: { name: user_name, type: varchar(255), constraints: { nullable: false } }
              - column: { name: lock_time, type: bigint }
              - column: { name: expire, type: bigint }
        - createIndex:
            indexName: idx_filelocks_repo_id
            tableName: "${t_FileLocks}"
            columns:
              - column: { name: repo_id }

  - changeSet:
      id: v070-create-filelocktimestamp
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not: { tableExists: { tableName: "${t_FileLockTimestamp}" } }
      changes:
        - createTable:
            tableName: "${t_FileLockTimestamp}"
            columns:
              - column: { name: id, type: bigint, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: repo_id, type: char(40), constraints: { unique: true } }
              - column: { name: update_time, type: bigint, constraints: { nullable: false } }

  - changeSet:
      id: v070-create-foldergroupperm
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not: { tableExists: { tableName: "${t_FolderGroupPerm}" } }
      changes:
        - createTable:
            tableName: "${t_FolderGroupPerm}"
            columns:
              - column: { name: id, type: bigint, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: repo_id, type: char(36), constraints: { nullable: false } }
              - column: { name: path, type: text, constraints: { nullable: false } }
              - column: { name: permission, type: char(15) }
              - column: { name: group_id, type: int, constraints: { nullable: false } }
        - createIndex:
            indexName: idx_foldergroupperm_repo_id
            tableName: "${t_FolderGroupPerm}"
            columns:
              - column: { name: repo_id }

  - changeSet:
      id: v070-create-folderpermtimestamp
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not: { tableExists: { tableName: "${t_FolderPermTimestamp}" } }
      changes:
        - createTable:
            tableName: "${t_FolderPermTimestamp}"
            columns:
              - column: { name: id, type: bigint, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: repo_id, type: char(36), constraints: { unique: true } }
              - column: { name: timestamp, type: bigint }

  - changeSet:
      id: v070-create-folderuserperm
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not: { tableExists: { tableName: "${t_FolderUserPerm}" } }
      changes:
        - createTable:
            tableName: "${t_FolderUserPerm}"
            columns:
              - column: { name: id, type: bigint, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: repo_id, type: char(36), constraints: { nullable: false } }
              - column: { name: path, type: text, constraints: { nullable: false } }
              - column: { name: permission, type: char(15) }
              - column: { name: user, type: varchar(255), constraints: { nullable: false } }
        - createIndex:
            indexName: idx_folderuserperm_repo_id
            tableName: "${t_FolderUserPerm}"
            columns:
              - column: { name: repo_id }

  - changeSet:
      id: v070-create-gcid
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not: { tableExists: { tableName: "${t_GCID}" } }
      changes:
        - createTable:
            tableName: "${t_GCID}"
            columns:
              - column: { name: id, type: bigint, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: repo_id, type: char(36), constraints: { unique: true } }
              - column: { name: gc_id, type: char(36) }

  - changeSet:
      id: v070-create-lastgcid
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not: { tableExists: { tableName: "${t_LastGCID}" } }
      changes:
        - createTable:
            tableName: "${t_LastGCID}"
            columns:
              - column: { name: id, type: bigint, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: repo_id, type: char(36) }
              - column: { name: client_id, type: varchar(128) }
              - column: { name: gc_id, type: char(36) }
        - addUniqueConstraint: { columnNames: "repo_id, client_id", constraintName: uq_lastgcid_repo_client, tableName: "${t_LastGCID}" }

  - changeSet:
      id: v070-create-orggrouprepo
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not: { tableExists: { tableName: "${t_OrgGroupRepo}" } }
      changes:
        - createTable:
            tableName: "${t_OrgGroupRepo}"
            columns:
              - column: { name: id, type: bigint, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: org_id, type: int }
              - column: { name: repo_id, type: char(37) }
              - column: { name: group_id, type: int }
              - column: { name: owner, type: varchar(255) }
              - column: { name: permission, type: char(15) }
        - addUniqueConstraint: { columnNames: "org_id, group_id, repo_id", constraintName: uq_orggrouprepo_org_group_repo, tableName: "${t_OrgGroupRepo}" }
        - createIndex:
            indexName: idx_orggrouprepo_repo_id
            tableName: "${t_OrgGroupRepo}"
            columns:
              - column: { name: repo_id }
        - createIndex:
            indexName: idx_orggrouprepo_owner
            tableName: "${t_OrgGroupRepo}"
            columns:
              - column: { name: owner }

  - changeSet:
      id: v070-create-orginnerpubrepo
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not: { tableExists: { tableName: "${t_OrgInnerPubRepo}" } }
      changes:
        - createTable:
            tableName: "${t_OrgInnerPubRepo}"
            columns:
              - column: { name: id, type: bigint, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: org_id, type: int }
              - column: { name: repo_id, type: char(37) }
              - column: { name: permission, type: char(15) }
        - addUniqueConstraint: { columnNames: "org_id, repo_id", constraintName: uq_orginnerpubrepo_org_repo, tableName: "${t_OrgInnerPubRepo}" }

  - changeSet:
      id: v070-create-orgrepo
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not: { tableExists: { tableName: "${t_OrgRepo}" } }
      changes:
        - createTable:
            tableName: "${t_OrgRepo}"
            columns:
              - column: { name: id, type: bigint, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: org_id, type: int }
              - column: { name: repo_id, type: char(37) }
              - column: { name: user, type: varchar(255) }
        - addUniqueConstraint: { columnNames: "org_id, repo_id", constraintName: uq_orgrepo_org_repo, tableName: "${t_OrgRepo}" }
        - createIndex:
            indexName: idx_orgrepo_org_id_user
            tableName: "${t_OrgRepo}"
            columns:
              - column: { name: org_id }
              - column: { name: user }
        - createIndex:
            indexName: idx_orgrepo_user
            tableName: "${t_OrgRepo}"
            columns:
              - column: { name: user }

  - changeSet:
      id: v070-create-orgsharedrepo
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not: { tableExists: { tableName: "${t_OrgSharedRepo}" } }
      changes:
        - createTable:
            tableName: "${t_OrgSharedRepo}"
            columns:
              - column: { name: id, type: int, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: org_id, type: int }
              - column: { name: repo_id, type: char(37) }
              - column: { name: from_email, type: varchar(255) }
              - column: { name: to_email, type: varchar(255) }
              - column: { name: permission, type: char(15) }
        - createIndex:
            indexName: idx_orgsharedrepo_repo_id
            tableName: "${t_OrgSharedRepo}"
            columns:
              - column: { name: repo_id }
        - createIndex:
            indexName: idx_orgsharedrepo_org_repo
            tableName: "${t_OrgSharedRepo}"
            columns:
              - column: { name: org_id }
              - column: { name: repo_id }
        - createIndex:
            indexName: idx_orgsharedrepo_from_email
            tableName: "${t_OrgSharedRepo}"
            columns:
              - column: { name: from_email }
        - createIndex:
            indexName: idx_orgsharedrepo_to_email
            tableName: "${t_OrgSharedRepo}"
            columns:
              - column: { name: to_email }

  - changeSet:
      id: v070-update-repoinfo-status
      author: seafile
      preConditions:
        - onFail: CONTINUE
          not: { columnExists: { tableName: "${t_RepoInfo}", columnName: status } }
      changes:
        - addColumn:
            tableName: "${t_RepoInfo}"
            columns:
              - column: { name: status, type: int, defaultValueNumeric: 0 }

  - changeSet:
      id: v070-create-repostorageid
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not: { tableExists: { tableName: "${t_RepoStorageId}" } }
      changes:
        - createTable:
            tableName: "${t_RepoStorageId}"
            columns:
              - column: { name: id, type: bigint, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: repo_id, type: char(40), constraints: { unique: true, nullable: false } }
              - column: { name: storage_id, type: varchar(255), constraints: { nullable: false } }

  - changeSet:
      id: v070-create-reposyncerror
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not: { tableExists: { tableName: "${t_RepoSyncError}" } }
      changes:
        - createTable:
            tableName: "${t_RepoSyncError}"
            columns:
              - column: { name: id, type: bigint, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: token, type: char(41), constraints: { unique: true } }
              - column: { name: error_time, type: bigint }
              - column: { name: error_con, type: varchar(1024) }

  - changeSet:
      id: v070-create-rolequota
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not: { tableExists: { tableName: "${t_RoleQuota}" } }
      changes:
        - createTable:
            tableName: "${t_RoleQuota}"
            columns:
              - column: { name: id, type: bigint, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: role, type: varchar(255), constraints: { unique: true } }
              - column: { name: quota, type: bigint }

  - changeSet:
      id: v070-update-systeminfo-id-type
      author: seafile
      changes:
        - modifyDataType: { tableName: "${t_SystemInfo}", columnName: id, newDataType: int }

  - changeSet:
      id: v070-update-webap-id
      author: seafile
      preConditions:
        - onFail: CONTINUE
          not: { columnExists: { tableName: "${t_WebAP}", columnName: id } }
      changes:
        - dropPrimaryKey: { tableName: "${t_WebAP}" }
        - addColumn:
            tableName: "${t_WebAP}"
            columns:
              - column: { name: id, type: bigint, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
        - addUniqueConstraint: { columnNames: "repo_id", constraintName: uq_webap_repo_id, tableName: "${t_WebAP}" }

  - changeSet:
      id: v070-create-webuploadtempfiles
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not: { tableExists: { tableName: "${t_WebUploadTempFiles}" } }
      changes:
        - createTable:
            tableName: "${t_WebUploadTempFiles}"
            columns:
              - column: { name: id, type: bigint, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: repo_id, type: char(40), constraints: { nullable: false } }
              - column: { name: file_path, type: text, constraints: { nullable: false } }
              - column: { name: tmp_file_path, type: text, constraints: { nullable: false } }
