databaseChangeLog:
  - changeSet:
      id: v070-create-filelocks
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          sqlCheck:
            expectedResult: 0
            sql: "${table_exists_query} 'filelocks'"
      changes:
        - createTable:
            tableName: filelocks
            columns:
              - column: { name: id, type: bigint, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: repo_id, type: char(40), constraints: { nullable: false } }
              - column: { name: path, type: text, constraints: { nullable: false } }
              - column: { name: user_name, type: varchar(255), constraints: { nullable: false } }
              - column: { name: lock_time, type: bigint }
              - column: { name: expire, type: bigint }
        - createIndex:
            indexName: idx_filelocks_repo_id
            tableName: filelocks
            columns:
              - column: { name: repo_id }

