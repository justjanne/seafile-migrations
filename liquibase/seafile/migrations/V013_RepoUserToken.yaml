databaseChangeLog:
- changeSet:
    id: normalize-repousertoken
    author: seafile
    dbms: mysql,mariadb
    failOnError: false
    changes:
    - renameTable:
        oldTableName: repousertoken
        newTableName: repousertoken
- changeSet:
    id: normalize-repousertoken
    author: seafile
    dbms: mysql,mariadb
    failOnError: false
    changes:
    - renameTable:
        oldTableName: RepoUserToken
        newTableName: repousertoken
- changeSet:
    id: V013_RepoUserToken
    author: seafile
    changes:
    - createTable:
        tableName: repousertoken
        columns:
        - column:
            name: repo_id
            type: char(37)
        - column:
            name: email
            type: varchar(255)
        - column:
            name: token
            type: char(41)
    - addUniqueConstraint:
        columnNames: repo_id, token
        constraintName: UC_REPOUSERTOKEN_REPO_ID_TOKEN
        tableName: repousertoken
    preConditions:
      onFail: MARK_RAN
      not:
        tableExists:
          tableName: repousertoken
