databaseChangeLog:
  - changeSet:
      id: V130_UserDownloadRateLimit
      author: seafile
      changes:
        - createTable:
            tableName: UserDownloadRateLimit
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user
                  type: varchar(255)
                  constraints:
                    unique: true
              - column:
                  name: download_limit
                  type: bigint
