databaseChangeLog:
  - changeSet:
      id: V070_SystemInfo
      author: seafile
      dbms: mysql
      changes:
        - sql:
            sql: "ALTER TABLE SystemInfo MODIFY id int NOT NULL AUTO_INCREMENT;"
  - changeSet:
      id: V070_SystemInfo_pg
      author: seafile
      dbms: postgresql
      preConditions:
        - onFail: MARK_RAN
        - not:
            - columnExists:
                tableName: SystemInfo
                columnName: id
      changes:
        - addColumn:
            tableName: SystemInfo
            columns:
              - column:
                  name: id
                  type: INT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
