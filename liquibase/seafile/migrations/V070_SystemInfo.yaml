databaseChangeLog:
  - changeSet:
      id: V070_change_id_type_in_systeminfo
      author: seafile
      comment: Regular Migration - Change id type to int for systeminfo
      changes:
        - modifyDataType:
            tableName: systeminfo
            columnName: id
            newDataType: serial
  - changeSet:
      id: V070_normalize_systeminfo_id_autoincrement
      author: seafile
      comment: Regular Migration - Preserve auto-increment property for id column on MySQL/MariaDB
      dbms: mysql,mariadb
      changes:
        - addAutoIncrement:
            tableName: systeminfo
            columnName: id
            columnDataType: int
