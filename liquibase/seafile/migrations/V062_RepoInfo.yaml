databaseChangeLog:
  - changeSet:
      id: V062_rename_RepoInfo_to_repoinfo
      author: seafile
      failOnError: false
      preConditions:
        - tableExists:
            tableName: RepoInfo
      changes:
        - renameTable:
            oldTableName: RepoInfo
            newTableName: repoinfo
  - changeSet:
      id: V062_normalize_repoinfo_repo_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          columnExists:
            tableName: repoinfo
            columnName: repo_id
      changes:
        - addNotNullConstraint:
            tableName: repoinfo
            columnName: repo_id
            columnDataType: char(36)
            defaultNullValue: ""
        - dropDefaultValue:
            tableName: repoinfo
            columnName: repo_id
  - changeSet:
      id: V062_create_repoinfo
      author: seafile
      changes:
        - createTable:
            ifNotExists: true
            tableName: repoinfo
            columns:
              - column:
                  name: repo_id
                  type: char(36)
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: repoinfo_pkey
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: update_time
                  type: bigint
              - column:
                  name: version
                  type: int
              - column:
                  name: is_encrypted
                  type: int
              - column:
                  name: last_modifier
                  type: varchar(255)
