databaseChangeLog:
  - changeSet:
      id: V063_add_id_to_seafileconf
      author: seafile
      comment: "Regular Migration: Structural PK change - add bigint id column as primary key."
      preConditions:
        - onFail: MARK_RAN
          not:
            - columnExists:
                tableName: seafileconf
                columnName: id
      changes:
        - addColumn:
            tableName: seafileconf
            ifNotExists: true
            columns:
              - column:
                  name: id
                  type: bigserial
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: seafileconf_pkey
  - changeSet:
      id: V063_change_id_type_in_seafileconf
      author: seafile
      comment: "Regular Migration: Ensure id column is bigint/bigserial."
      changes:
        - modifyDataType:
            tableName: seafileconf
            columnName: id
            newDataType: bigserial
  - changeSet:
      id: V063_normalize_seafileconf_pkey
      author: seafile
      comment: "Regular Migration: Ensure id column is the primary key."
      preConditions:
        - onFail: MARK_RAN
          not:
            - primaryKeyExists:
                tableName: seafileconf
      changes:
        - addPrimaryKey:
            tableName: seafileconf
            columnNames: id
            constraintName: seafileconf_pkey
  - changeSet:
      id: V063_normalize_seafileconf_id_autoincrement
      author: seafile
      comment: "Regular Migration: Add auto-increment to id for MySQL/MariaDB."
      dbms: mysql,mariadb
      changes:
        - addAutoIncrement:
            tableName: seafileconf
            columnName: id
            columnDataType: bigint
