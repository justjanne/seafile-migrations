databaseChangeLog:
  - changeSet:
      id: v014-create-repohistorylimit
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not: { tableExists: { tableName: repohistorylimit } }
      changes:
        - createTable:
            tableName: repohistorylimit
            columns:
              - column: { name: repo_id, type: char(37), constraints: { primaryKey: true, nullable: false } }
              - column: { name: days, type: int }

  - changeSet:
      id: v014-create-repovalidsince
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not: { tableExists: { tableName: repovalidsince } }
      changes:
        - createTable:
            tableName: repovalidsince
            columns:
              - column: { name: repo_id, type: char(37), constraints: { primaryKey: true, nullable: false } }
              - column: { name: timestamp, type: bigint }
