databaseChangeLog:
  - changeSet:
      id: V070_rename_WebUploadTempFiles_to_webuploadtempfiles
      author: seafile
      failOnError: false
      preConditions:
        - tableExists:
            tableName: WebUploadTempFiles
      changes:
        - renameTable:
            oldTableName: WebUploadTempFiles
            newTableName: webuploadtempfiles
  - changeSet:
      id: V070_create_webuploadtempfiles
      author: seafile
      changes:
        - createTable:
            ifNotExists: true
            tableName: webuploadtempfiles
            columns:
              - column:
                  name: id
                  type: bigserial
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: webuploadtempfiles_pkey
              - column:
                  name: repo_id
                  type: varchar(41)
                  constraints:
                    nullable: false
              - column:
                  name: file_path
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: tmp_file_path
                  type: text
                  constraints:
                    nullable: false
  - changeSet:
      id: V070_normalize_webuploadtempfiles_pkey_purge
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          and:
            - primaryKeyExists:
                tableName: webuploadtempfiles
            - not:
                - columnExists:
                    tableName: webuploadtempfiles
                    columnName: id
      changes:
        - dropPrimaryKey:
            tableName: webuploadtempfiles
  - changeSet:
      id: V070_normalize_WebUploadTempFiles_pkey_purge
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: webuploadtempfiles
            indexName: WebUploadTempFiles_pkey
      changes:
        - dropPrimaryKey:
            tableName: webuploadtempfiles
            constraintName: WebUploadTempFiles_pkey
  - changeSet:
      id: V070_normalize_WebUploadTempFiles_id_pkey_purge
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          primaryKeyExists:
            tableName: webuploadtempfiles
            primaryKeyName: WebUploadTempFiles_id_pkey
      changes:
        - dropPrimaryKey:
            tableName: webuploadtempfiles
            constraintName: WebUploadTempFiles_id_pkey
  - changeSet:
      id: V070_add_id_to_webuploadtempfiles
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - columnExists:
                tableName: webuploadtempfiles
                columnName: id
      changes:
        - addColumn:
            tableName: webuploadtempfiles
            ifNotExists: true
            columns:
              - column:
                  name: id
                  type: bigserial
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: webuploadtempfiles_pkey
  - changeSet:
      id: V070_change_id_type_in_webuploadtempfiles
      author: seafile
      changes:
        - modifyDataType:
            tableName: webuploadtempfiles
            columnName: id
            newDataType: bigserial
  - changeSet:
      id: V070_normalize_webuploadtempfiles_pkey_rebuild
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - primaryKeyExists:
                tableName: webuploadtempfiles
      changes:
        - addPrimaryKey:
            tableName: webuploadtempfiles
            columnNames: id
            constraintName: webuploadtempfiles_pkey
  - changeSet:
      id: V070_normalize_webuploadtempfiles_id_autoincrement
      author: seafile
      dbms: mysql,mariadb
      changes:
        - addAutoIncrement:
            tableName: webuploadtempfiles
            columnName: id
            columnDataType: bigint
  - changeSet:
      id: V070_normalize_webuploadtempfiles_repo_id_type
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          columnExists:
            tableName: webuploadtempfiles
            columnName: repo_id
      changes:
        - modifyDataType:
            tableName: webuploadtempfiles
            columnName: repo_id
            newDataType: varchar(41)
