databaseChangeLog:
  - changeSet:
      id: V070_rename_WebUploadTempFiles_to_webuploadtempfiles
      author: seafile
      failOnError: false
      preConditions:
        - tableExists:
            tableName: WebUploadTempFiles
      changes:
        - renameTable:
            oldTableName: WebUploadTempFiles
            newTableName: webuploadtempfiles
  - changeSet:
      id: V070_create_webuploadtempfiles
      author: seafile
      changes:
        - createTable:
            ifNotExists: true
            tableName: webuploadtempfiles
            columns:
              - column:
                  name: id
                  type: bigserial
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: webuploadtempfiles_pkey
              - column:
                  name: repo_id
                  type: varchar(41)
                  constraints:
                    nullable: false
              - column:
                  name: file_path
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: tmp_file_path
                  type: text
                  constraints:
                    nullable: false
