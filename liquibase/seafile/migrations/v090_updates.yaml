databaseChangeLog:
  - changeSet:
      id: v090-update-repotokenpeerinfo-indices
      author: seafile
      preConditions:
        - onFail: CONTINUE
          not: { indexExists: { indexName: idx_repotokenpeerinfo_peer_id, tableName: "${t_RepoTokenPeerInfo}" } }
      changes:
        - createIndex:
            indexName: idx_repotokenpeerinfo_peer_id
            tableName: "${t_RepoTokenPeerInfo}"
            columns:
              - column: { name: peer_id }

  - changeSet:
      id: v090-update-repousertoken-indices
      author: seafile
      preConditions:
        - onFail: CONTINUE
          not: { indexExists: { indexName: idx_repousertoken_token, tableName: "${t_RepoUserToken}" } }
      changes:
        - createIndex:
            indexName: idx_repousertoken_token
            tableName: "${t_RepoUserToken}"
            columns:
              - column: { name: token }
