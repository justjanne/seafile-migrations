databaseChangeLog:
  - changeSet:
      id: V070_rename_FolderPermTimestamp_to_folderpermtimestamp
      author: seafile
      failOnError: false
      preConditions:
        - tableExists:
            tableName: FolderPermTimestamp
      changes:
        - renameTable:
            oldTableName: FolderPermTimestamp
            newTableName: folderpermtimestamp
  - changeSet:
      id: V070_create_folderpermtimestamp
      author: seafile
      changes:
        - createTable:
            ifNotExists: true
            tableName: folderpermtimestamp
            columns:
              - column:
                  name: id
                  type: bigserial
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: folderpermtimestamp_pkey
              - column:
                  name: repo_id
                  type: varchar(41)
              - column:
                  name: timestamp
                  type: bigint
  - changeSet:
      id: V070_normalize_folderpermtimestamp_repo_id_type
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          columnExists:
            tableName: folderpermtimestamp
            columnName: repo_id
      changes:
        - modifyDataType:
            tableName: folderpermtimestamp
            columnName: repo_id
            newDataType: varchar(41)
  - changeSet:
      id: V070_normalize_folderpermtimestamp_repo_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: folderpermtimestamp
            indexName: repo_id
      changes:
        - dropUniqueConstraint:
            tableName: folderpermtimestamp
            constraintName: repo_id
  - changeSet:
      id: V070_normalize_folderpermtimestamp_repo_id_key
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: folderpermtimestamp
            indexName: folderpermtimestamp_repo_id_key
      changes:
        - dropUniqueConstraint:
            tableName: folderpermtimestamp
            constraintName: folderpermtimestamp_repo_id_key
  - changeSet:
      id: V070_add_unique_constraint_to_folderpermtimestamp_repo_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: folderpermtimestamp
                indexName: idx_folderpermtimestamp_repo_id
      changes:
        - addUniqueConstraint:
            tableName: folderpermtimestamp
            columnNames: repo_id
            constraintName: idx_folderpermtimestamp_repo_id
