databaseChangeLog:
- changeSet:
    id: V018_WebAP
    author: seafile
    changes:
    - createTable:
        tableName: webap
        columns:
        - column:
            name: repo_id
            type: char(37)
            constraints:
              primaryKey: true
              nullable: false
        - column:
            name: access_property
            type: varchar(10)
    preConditions:
      onFail: MARK_RAN
      not:
        tableExists:
          tableName: webap
