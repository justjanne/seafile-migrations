databaseChangeLog:
  - changeSet:
      id: v063-normalize-groupstructure
      author: seafile
      dbms: mysql,mariadb
      preConditions: [ { onFail: CONTINUE, tableExists: { tableName: GroupStructure } } ]
      changes: [ { renameTable: { oldTableName: GroupStructure, newTableName: groupstructure } } ]
  - changeSet:
      id: v063-update-branch-id
      author: seafile
      preConditions: [ { onFail: CONTINUE, not: { columnExists: { tableName: branch, columnName: id } } } ]
      changes:
        - dropPrimaryKey: { tableName: branch }
        - addColumn:
            tableName: branch
            columns:
              - column: { name: id, type: bigint, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
        - addUniqueConstraint: { columnNames: "repo_id, name", constraintName: uq_branch_repo_name, tableName: branch }

