databaseChangeLog:
  - changeSet:
      id: v063-update-branch-id
      author: seafile
      preConditions:
        - onFail: CONTINUE
          not: { columnExists: { tableName: "${t_Branch}", columnName: id } }
      changes:
        - dropPrimaryKey: { tableName: "${t_Branch}" }
        - addColumn:
            tableName: "${t_Branch}"
            columns:
              - column: { name: id, type: bigint, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
        - addUniqueConstraint: { columnNames: "repo_id, name", constraintName: uq_branch_repo_name, tableName: "${t_Branch}" }

