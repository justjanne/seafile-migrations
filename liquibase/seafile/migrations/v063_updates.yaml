databaseChangeLog:
  - changeSet:
      id: v063-update-branch-id
      author: seafile
      changes:
        - dropPrimaryKey:
            tableName: branch
        - addColumn:
            tableName: branch
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
                  beforeColumn: name
        - addUniqueConstraint:
            columnNames: repo_id, name
            constraintName: uq_branch_repo_name
            tableName: branch

