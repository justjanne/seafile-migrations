databaseChangeLog:
  - changeSet:
      id: v130-normalize-orgdownloadratelimit
      author: seafile
      dbms: mysql,mariadb
      preConditions: [ { onFail: CONTINUE, tableExists: { tableName: orgdownloadratelimit } } ]
      changes: [ { renameTable: { oldTableName: OrgDownloadRateLimit, newTableName: orgdownloadratelimit } } ]
  - changeSet:
      id: v130-create-orgdownloadratelimit
      author: seafile
      preConditions: [ { onFail: MARK_RAN, not: { tableExists: { tableName: orgdownloadratelimit } } } ]
      changes:
        - createTable:
            tableName: orgdownloadratelimit
            columns:
              - column: { name: id, type: bigint, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: org_id, type: int, constraints: { unique: true } }
              - column: { name: download_limit, type: bigint }

