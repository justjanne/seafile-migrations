            columns:
              - column: { name: id, type: bigint, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: org_id, type: int, constraints: { unique: true } }
              - column: { name: quota, type: bigint }

  - changeSet:
      id: v130-create-roledownloadratelimit
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not: { tableExists: { tableName: "${t_RoleDownloadRateLimit}" } }
      changes:
        - createTable:
            tableName: "${t_RoleDownloadRateLimit}"
            columns:
              - column: { name: id, type: bigint, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: role, type: varchar(255), constraints: { unique: true } }
              - column: { name: download_limit, type: bigint }

  - changeSet:
      id: v130-create-roleuploadratelimit
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not: { tableExists: { tableName: "${t_RoleUploadRateLimit}" } }
      changes:
        - createTable:
            tableName: "${t_RoleUploadRateLimit}"
            columns:
              - column: { name: id, type: bigint, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: role, type: varchar(255), constraints: { unique: true } }
              - column: { name: upload_limit, type: bigint }

  - changeSet:
      id: v130-create-userdownloadratelimit
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not: { tableExists: { tableName: "${t_UserDownloadRateLimit}" } }
      changes:
        - createTable:
            tableName: "${t_UserDownloadRateLimit}"
            columns:
              - column: { name: id, type: bigint, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: user, type: varchar(255), constraints: { unique: true } }
              - column: { name: download_limit, type: bigint }

  - changeSet:
      id: v130-create-useruploadratelimit
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not: { tableExists: { tableName: "${t_UserUploadRateLimit}" } }
      changes:
        - createTable:
            tableName: "${t_UserUploadRateLimit}"
            columns:
              - column: { name: id, type: bigint, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
