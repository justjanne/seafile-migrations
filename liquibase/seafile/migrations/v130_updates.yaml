  - changeSet:
      id: v130-update-webuploadtempfiles-idx
      author: seafile
      preConditions:
        - onFail: CONTINUE
          not: { indexExists: { indexName: idx_webuploadtempfiles_repo_id, tableName: "${t_WebUploadTempFiles}" } }
      changes:
        - createIndex:
            indexName: idx_webuploadtempfiles_repo_id
            tableName: "${t_WebUploadTempFiles}"
            columns:
              - column: { name: repo_id }
