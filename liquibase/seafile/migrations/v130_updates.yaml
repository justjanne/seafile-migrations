databaseChangeLog:
  - changeSet:
      id: v130-create-orgdownloadratelimit
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not: { tableExists: { tableName: "${t_OrgDownloadRateLimit}" } }
      changes:
        - createTable:
            tableName: "${t_OrgDownloadRateLimit}"
            columns:
              - column: { name: id, type: bigint, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: org_id, type: int, constraints: { unique: true } }
              - column: { name: download_limit, type: bigint }

  - changeSet:
      id: v130-create-orguploadratelimit
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not: { tableExists: { tableName: "${t_OrgUploadRateLimit}" } }
      changes:
        - createTable:
            tableName: "${t_OrgUploadRateLimit}"
            columns:
              - column: { name: id, type: bigint, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: org_id, type: int, constraints: { unique: true } }
              - column: { name: upload_limit, type: bigint }

  - changeSet:
      id: v130-create-orguserdefaultquota
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not: { tableExists: { tableName: "${t_OrgUserDefaultQuota}" } }
      changes:
        - createTable:
