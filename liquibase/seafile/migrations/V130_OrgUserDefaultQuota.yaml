databaseChangeLog:
  - changeSet:
      id: V130_rename_OrgUserDefaultQuota_to_orguserdefaultquota
      author: seafile
      failOnError: false
      preConditions:
        - tableExists:
            tableName: OrgUserDefaultQuota
      changes:
        - renameTable:
            oldTableName: OrgUserDefaultQuota
            newTableName: orguserdefaultquota
  - changeSet:
      id: V130_create_orguserdefaultquota
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - tableExists:
                tableName: orguserdefaultquota
      changes:
        - createTable:
            ifNotExists: true
            tableName: orguserdefaultquota
            columns:
              - column:
                  name: id
                  type: bigserial
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: orguserdefaultquota_pkey
              - column:
                  name: org_id
                  type: int
              - column:
                  name: quota
                  type: bigint
  - changeSet:
      id: V130_normalize_orguserdefaultquota_org_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: orguserdefaultquota
            indexName: org_id
      changes:
        - dropUniqueConstraint:
            tableName: orguserdefaultquota
            constraintName: org_id
  - changeSet:
      id: V130_normalize_orguserdefaultquota_org_id_key
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: orguserdefaultquota
            indexName: orguserdefaultquota_org_id_key
      changes:
        - dropUniqueConstraint:
            tableName: orguserdefaultquota
            constraintName: orguserdefaultquota_org_id_key
  - changeSet:
      id: V130_add_unique_constraint_to_orguserdefaultquota_org_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: orguserdefaultquota
                indexName: idx_orguserdefaultquota_org_id
      changes:
        - addUniqueConstraint:
            tableName: orguserdefaultquota
            columnNames: org_id
            constraintName: idx_orguserdefaultquota_org_id
