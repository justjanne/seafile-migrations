databaseChangeLog:
  - changeSet:
      id: V041_rename_RepoTrash_to_repotrash
      author: seafile
      failOnError: false
      preConditions:
        - tableExists:
            tableName: RepoTrash
      changes:
        - renameTable:
            oldTableName: RepoTrash
            newTableName: repotrash
  - changeSet:
      id: V041_normalize_repotrash_repo_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          columnExists:
            tableName: repotrash
            columnName: repo_id
      changes:
        - addNotNullConstraint:
            tableName: repotrash
            columnName: repo_id
            columnDataType: varchar(41)
            defaultNullValue: ""
        - dropDefaultValue:
            tableName: repotrash
            columnName: repo_id
  - changeSet:
      id: V041_normalize_repotrash_repo_id_type
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          columnExists:
            tableName: repotrash
            columnName: repo_id
      changes:
        - modifyDataType:
            tableName: repotrash
            columnName: repo_id
            newDataType: varchar(41)
  - changeSet:
      id: V041_normalize_repotrash_head_id_type
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          columnExists:
            tableName: repotrash
            columnName: head_id
      changes:
        - modifyDataType:
            tableName: repotrash
            columnName: head_id
            newDataType: varchar(41)
  - changeSet:
      id: V041_create_repotrash
      author: seafile
      changes:
        - createTable:
            ifNotExists: true
            tableName: repotrash
            columns:
              - column:
                  name: repo_id
                  type: varchar(41)
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: repotrash_pkey
              - column:
                  name: repo_name
                  type: varchar(255)
              - column:
                  name: head_id
                  type: varchar(41)
              - column:
                  name: owner_id
                  type: varchar(255)
              - column:
                  name: size
                  type: bigint
              - column:
                  name: org_id
                  type: int
  - changeSet:
      id: V041_normalize_repotrash_owner_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: repotrash
            indexName: owner_id
      changes:
        - dropIndex:
            tableName: repotrash
            indexName: owner_id
  - changeSet:
      id: V041_normalize_repotrash_owner_id_idx
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: repotrash
            indexName: repotrash_owner_id
      changes:
        - dropIndex:
            tableName: repotrash
            indexName: repotrash_owner_id
  - changeSet:
      id: V041_add_index_to_repotrash_owner_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: repotrash
                indexName: idx_repotrash_owner_id
      changes:
        - createIndex:
            tableName: repotrash
            indexName: idx_repotrash_owner_id
            columns:
              - column:
                  name: owner_id
  - changeSet:
      id: V041_normalize_repotrash_org_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: repotrash
            indexName: org_id
      changes:
        - dropIndex:
            tableName: repotrash
            indexName: org_id
  - changeSet:
      id: V041_add_index_to_repotrash_org_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: repotrash
                indexName: idx_repotrash_org_id
      changes:
        - createIndex:
            tableName: repotrash
            indexName: idx_repotrash_org_id
            columns:
              - column:
                  name: org_id
