databaseChangeLog:
  - changeSet:
      id: v120-update-repoinfo-type
      author: seafile
      preConditions: [ { onFail: CONTINUE, not: { columnExists: { tableName: repoinfo, columnName: type } } } ]
      changes:
        - addColumn:
            tableName: repoinfo
            columns:
              - column: { name: type, type: varchar(10) }
        - createIndex: { indexName: idx_repoinfo_type, tableName: repoinfo, columns: [ { name: type } ] }
