databaseChangeLog:
  - changeSet:
      id: v120-update-repoinfo-type
      author: seafile
      preConditions:
        - onFail: CONTINUE
          not: { columnExists: { tableName: "${t_RepoInfo}", columnName: type } }
      changes:
        - addColumn:
            tableName: "${t_RepoInfo}"
            columns:
              - column: { name: type, type: varchar(10) }
        - createIndex:
            indexName: idx_repoinfo_type
            tableName: "${t_RepoInfo}"
            columns:
              - column: { name: type }
