databaseChangeLog:
- changeSet:
    id: V130_RoleUploadRateLimit
    author: seafile
    changes:
    - createTable:
        tableName: roleuploadratelimit
        columns:
        - column:
            name: id
            type: bigint
            autoIncrement: true
            constraints:
              primaryKey: true
              nullable: false
        - column:
            name: role
            type: varchar(255)
            constraints:
              unique: true
        - column:
            name: upload_limit
            type: bigint
    preConditions:
      onFail: MARK_RAN
      not:
        tableExists:
          tableName: roleuploadratelimit
