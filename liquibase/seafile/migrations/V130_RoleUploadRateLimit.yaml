databaseChangeLog:
  - changeSet:
      id: V130_rename_RoleUploadRateLimit_to_roleuploadratelimit
      author: seafile
      failOnError: false
      preConditions:
        - tableExists:
            tableName: RoleUploadRateLimit
      changes:
        - renameTable:
            oldTableName: RoleUploadRateLimit
            newTableName: roleuploadratelimit
  - changeSet:
      id: V130_create_roleuploadratelimit
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - tableExists:
                tableName: roleuploadratelimit
      changes:
        - createTable:
            ifNotExists: true
            tableName: roleuploadratelimit
            columns:
              - column:
                  name: id
                  type: bigserial
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: roleuploadratelimit_pkey
              - column:
                  name: role
                  type: varchar(255)
              - column:
                  name: upload_limit
                  type: bigint
  - changeSet:
      id: V130_normalize_roleuploadratelimit_role
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: roleuploadratelimit
            indexName: role
      changes:
        - dropUniqueConstraint:
            tableName: roleuploadratelimit
            constraintName: role
  - changeSet:
      id: V130_add_unique_constraint_to_roleuploadratelimit_role
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: roleuploadratelimit
                indexName: idx_roleuploadratelimit_role
      changes:
        - addUniqueConstraint:
            tableName: roleuploadratelimit
            columnNames: role
            constraintName: idx_roleuploadratelimit_role
