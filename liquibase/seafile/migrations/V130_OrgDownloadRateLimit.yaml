databaseChangeLog:
  - changeSet:
      id: V130_OrgDownloadRateLimit
      author: seafile
      changes:
        - createTable:
            tableName: OrgDownloadRateLimit
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: org_id
                  type: int
                  constraints:
                    unique: true
              - column:
                  name: download_limit
                  type: bigint
