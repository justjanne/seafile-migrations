databaseChangeLog:
  - changeSet:
      id: v060-create-repofilecount
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not: { tableExists: { tableName: "${t_RepoFileCount}" } }
      changes:
        - createTable:
            tableName: "${t_RepoFileCount}"
            columns:
              - column: { name: repo_id, type: char(36), constraints: { primaryKey: true, nullable: false } }
              - column: { name: file_count, type: bigint }

  - changeSet:
      id: v060-update-repotokenpeerinfo-client-ver
      author: seafile
      preConditions:
        - onFail: CONTINUE
          not: { columnExists: { tableName: "${t_RepoTokenPeerInfo}", columnName: client_ver } }
      changes:
        - addColumn:
            tableName: "${t_RepoTokenPeerInfo}"
            columns:
              - column: { name: client_ver, type: varchar(20) }
