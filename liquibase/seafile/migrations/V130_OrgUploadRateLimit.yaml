databaseChangeLog:
- changeSet:
    id: V130_OrgUploadRateLimit
    author: seafile
    changes:
    - createTable:
        tableName: orguploadratelimit
        columns:
        - column:
            name: id
            type: bigint
            autoIncrement: true
            constraints:
              primaryKey: true
              nullable: false
        - column:
            name: org_id
            type: int
            constraints:
              unique: true
        - column:
            name: upload_limit
            type: bigint
    preConditions:
      onFail: MARK_RAN
      not:
        tableExists:
          tableName: orguploadratelimit
