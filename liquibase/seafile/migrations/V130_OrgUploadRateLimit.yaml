databaseChangeLog:
  - changeSet:
      id: V130_rename_OrgUploadRateLimit_to_orguploadratelimit
      author: seafile
      failOnError: false
      preConditions:
        - tableExists:
            tableName: OrgUploadRateLimit
      changes:
        - renameTable:
            oldTableName: OrgUploadRateLimit
            newTableName: orguploadratelimit
  - changeSet:
      id: V130_create_orguploadratelimit
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - tableExists:
                tableName: orguploadratelimit
      changes:
        - createTable:
            ifNotExists: true
            tableName: orguploadratelimit
            columns:
              - column:
                  name: id
                  type: bigserial
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: orguploadratelimit_pkey
              - column:
                  name: org_id
                  type: int
              - column:
                  name: upload_limit
                  type: bigint
  - changeSet:
      id: V130_normalize_orguploadratelimit_drop_old_idx
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: orguploadratelimit
            indexName: org_id
      changes:
        - dropUniqueConstraint:
            tableName: orguploadratelimit
            constraintName: org_id
  - changeSet:
      id: V130_add_index_to_orguploadratelimit_org_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: orguploadratelimit
                indexName: idx_orguploadratelimit_org_id
      changes:
        - addUniqueConstraint:
            tableName: orguploadratelimit
            columnNames: org_id
            constraintName: idx_orguploadratelimit_org_id
