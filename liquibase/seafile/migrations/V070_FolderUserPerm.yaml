databaseChangeLog:
  - changeSet:
      id: V070_rename_FolderUserPerm_to_folderuserperm
      author: seafile
      failOnError: false
      preConditions:
        - tableExists:
            tableName: FolderUserPerm
      changes:
        - renameTable:
            oldTableName: FolderUserPerm
            newTableName: folderuserperm
  - changeSet:
      id: V070_create_folderuserperm
      author: seafile
      changes:
        - createTable:
            ifNotExists: true
            tableName: folderuserperm
            columns:
              - column:
                  name: id
                  type: bigserial
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: folderuserperm_pkey
              - column:
                  name: repo_id
                  type: varchar(41)
                  constraints:
                    nullable: false
              - column:
                  name: path
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: permission
                  type: varchar(15)
              - column:
                  name: user
                  type: varchar(255)
                  constraints:
                    nullable: false
  - changeSet:
      id: V070_normalize_folderuserperm_repo_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: folderuserperm
            indexName: repo_id
      changes:
        - dropUniqueConstraint:
            tableName: folderuserperm
            constraintName: repo_id
  - changeSet:
      id: V070_add_index_to_folderuserperm_repo_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: folderuserperm
                indexName: idx_folderuserperm_repo_id
      changes:
        - createIndex:
            indexName: idx_folderuserperm_repo_id
            tableName: folderuserperm
            columns:
              - column:
                  name: repo_id
