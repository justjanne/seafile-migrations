databaseChangeLog:
  - {{migration_add_pkey(V063,RepoInfo,id)}}
  - changeSet:
      id: V063_normalize_repoinfo_repo_id_idx
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: repoinfo
            indexName: repo_id
      changes:
        - dropUniqueConstraint:
            tableName: repoinfo
            constraintName: repo_id
  - changeSet:
      id: V063_normalize_repoinfo_repo_id_key
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: repoinfo
            indexName: repoinfo_repo_id_key
      changes:
        - dropUniqueConstraint:
            tableName: repoinfo
            constraintName: repoinfo_repo_id_key
  - changeSet:
      id: V063_add_unique_constraint_to_repoinfo_repo_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: repoinfo
                indexName: idx_repoinfo_repo_id
      changes:
        - addUniqueConstraint:
            tableName: repoinfo
            columnNames: repo_id
            constraintName: idx_repoinfo_repo_id
  - changeSet:
      id: V063_normalize_repoinfo_repo_id_type
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          columnExists:
            tableName: repoinfo
            columnName: repo_id
      changes:
        - modifyDataType:
            tableName: repoinfo
            columnName: repo_id
            newDataType: varchar(41)
