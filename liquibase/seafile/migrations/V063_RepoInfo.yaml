databaseChangeLog:
- changeSet:
    id: V063_RepoInfo
    author: seafile
    changes:
    - dropPrimaryKey:
        tableName: repoinfo
        constraintName: RepoInfo_pkey
    - addColumn:
        tableName: repoinfo
        columns:
        - column:
            name: id
            type: BIGINT
            autoIncrement: true
            constraints:
              primaryKey: true
              primaryKeyName: RepoInfo_pkey
    - sql:
        dbms: mysql,mariadb
        sql: ALTER TABLE `repoinfo` MODIFY COLUMN `repo_id` CHAR(36)
    - modifyDataType:
        tableName: repoinfo
        columnName: repo_id
        newDataType: CHAR(36)
        dbms: postgresql
    - dropDefaultValue:
        tableName: repoinfo
        columnName: repo_id
    - addUniqueConstraint:
        tableName: repoinfo
        columnNames: repo_id
        constraintName: RepoInfo_repo_id_uq
    preConditions:
      onFail: CONTINUE
      not:
        columnExists:
          tableName: repoinfo
          columnName: id
    failOnError: false
