databaseChangeLog:
  - changeSet:
      id: V063_normalize_repoinfo_pkey_drop
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          primaryKeyExists:
            tableName: repoinfo
          not:
            - columnExists:
                tableName: repoinfo
                columnName: id
      changes:
        - dropPrimaryKey:
            tableName: repoinfo
  - changeSet:
      id: V063_normalize_repoinfo_compound_pkey
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: repoinfo
            indexName: repoinfo_pkey
            columnNames: repo_id
      changes:
        - dropPrimaryKey:
            tableName: repoinfo
  - changeSet:
      id: V063_normalize_repoinfo_id_pkey_old
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: repoinfo
            indexName: RepoInfo_id_pkey
      changes:
        - dropPrimaryKey:
            tableName: repoinfo
            constraintName: RepoInfo_id_pkey
  - changeSet:
      id: V063_add_id_to_repoinfo
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - columnExists:
                tableName: repoinfo
                columnName: id
      changes:
        - addColumn:
            tableName: repoinfo
            ifNotExists: true
            columns:
              - column:
                  name: id
                  type: bigserial
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: repoinfo_pkey
  - changeSet:
      id: V063_change_id_type_in_repoinfo
      author: seafile
      changes:
        - modifyDataType:
            tableName: repoinfo
            columnName: id
            newDataType: bigserial
  - changeSet:
      id: V063_normalize_repoinfo_pkey
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - primaryKeyExists:
                tableName: repoinfo
      changes:
        - addPrimaryKey:
            tableName: repoinfo
            columnNames: id
            constraintName: repoinfo_pkey
  - changeSet:
      id: V063_normalize_repoinfo_id_autoincrement
      author: seafile
      dbms: mysql,mariadb
      changes:
        - addAutoIncrement:
            tableName: repoinfo
            columnName: id
            columnDataType: bigint
  - changeSet:
      id: V063_normalize_repoinfo_repo_id_idx
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: repoinfo
            indexName: repo_id
      changes:
        - dropUniqueConstraint:
            tableName: repoinfo
            constraintName: repo_id
  - changeSet:
      id: V063_add_unique_constraint_to_repoinfo_repo_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: repoinfo
                indexName: idx_repoinfo_repo_id
      changes:
        - addUniqueConstraint:
            tableName: repoinfo
            columnNames: repo_id
            constraintName: idx_repoinfo_repo_id
  - changeSet:
      id: V063_normalize_repoinfo_repo_id_type
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          columnExists:
            tableName: repoinfo
            columnName: repo_id
      changes:
        - modifyDataType:
            tableName: repoinfo
            columnName: repo_id
            newDataType: varchar(41)
