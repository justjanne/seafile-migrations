databaseChangeLog:
  - changeSet:
      id: V018_rename_RepoTokenPeerInfo_to_repotokenpeerinfo
      author: seafile
      failOnError: false
      preConditions:
        - tableExists:
            tableName: RepoTokenPeerInfo
      changes:
        - renameTable:
            oldTableName: RepoTokenPeerInfo
            newTableName: repotokenpeerinfo
  - changeSet:
      id: V018_normalize_repotokenpeerinfo_token
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          columnExists:
            tableName: repotokenpeerinfo
            columnName: token
      changes:
        - addNotNullConstraint:
            tableName: repotokenpeerinfo
            columnName: token
            columnDataType: varchar(41)
            defaultNullValue: ""
        - dropDefaultValue:
            tableName: repotokenpeerinfo
            columnName: token
  - changeSet:
      id: V018_create_repotokenpeerinfo
      author: seafile
      changes:
        - createTable:
            ifNotExists: true
            tableName: repotokenpeerinfo
            columns:
              - column:
                  name: token
                  type: varchar(41)
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: repotokenpeerinfo_pkey
              - column:
                  name: peer_id
                  type: varchar(41)
              - column:
                  name: peer_ip
                  type: varchar(41)
              - column:
                  name: peer_name
                  type: varchar(255)
              - column:
                  name: sync_time
                  type: bigint
