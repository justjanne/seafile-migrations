databaseChangeLog:
  - changeSet:
      id: V063_normalize_repofilecount_pkey_purge
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          and:
            - primaryKeyExists:
                tableName: repofilecount
            - not:
                - columnExists:
                    tableName: repofilecount
                    columnName: id
      changes:
        - dropPrimaryKey:
            tableName: repofilecount
  - changeSet:
      id: V063_normalize_RepoFileCount_pkey_purge
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: repofilecount
            indexName: RepoFileCount_pkey
      changes:
        - dropPrimaryKey:
            tableName: repofilecount
            constraintName: RepoFileCount_pkey
  - changeSet:
      id: V063_normalize_RepoFileCount_id_pkey_purge
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          primaryKeyExists:
            tableName: repofilecount
            primaryKeyName: RepoFileCount_id_pkey
      changes:
        - dropPrimaryKey:
            tableName: repofilecount
            constraintName: RepoFileCount_id_pkey
  - changeSet:
      id: V063_add_id_to_repofilecount
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - columnExists:
                tableName: repofilecount
                columnName: id
      changes:
        - addColumn:
            tableName: repofilecount
            ifNotExists: true
            columns:
              - column:
                  name: id
                  type: bigserial
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: repofilecount_pkey
  - changeSet:
      id: V063_change_id_type_in_repofilecount
      author: seafile
      changes:
        - modifyDataType:
            tableName: repofilecount
            columnName: id
            newDataType: bigserial
  - changeSet:
      id: V063_normalize_repofilecount_pkey_rebuild
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - primaryKeyExists:
                tableName: repofilecount
      changes:
        - addPrimaryKey:
            tableName: repofilecount
            columnNames: id
            constraintName: repofilecount_pkey
  - changeSet:
      id: V063_normalize_repofilecount_id_autoincrement
      author: seafile
      dbms: mysql,mariadb
      changes:
        - addAutoIncrement:
            tableName: repofilecount
            columnName: id
            columnDataType: bigint
  - changeSet:
      id: V063_normalize_repofilecount_repo_id_idx
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: repofilecount
            indexName: repo_id
      changes:
        - dropUniqueConstraint:
            tableName: repofilecount
            constraintName: repo_id
  - changeSet:
      id: V063_normalize_repofilecount_repo_id_key
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: repofilecount
            indexName: repofilecount_repo_id_key
      changes:
        - dropUniqueConstraint:
            tableName: repofilecount
            constraintName: repofilecount_repo_id_key
  - changeSet:
      id: V063_add_unique_constraint_to_repofilecount_repo_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: repofilecount
                indexName: idx_repofilecount_repo_id
      changes:
        - addUniqueConstraint:
            tableName: repofilecount
            columnNames: repo_id
            constraintName: idx_repofilecount_repo_id
  - changeSet:
      id: V063_normalize_repofilecount_repo_id_type
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          columnExists:
            tableName: repofilecount
            columnName: repo_id
      changes:
        - modifyDataType:
            tableName: repofilecount
            columnName: repo_id
            newDataType: varchar(41)
