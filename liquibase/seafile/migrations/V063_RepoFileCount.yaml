databaseChangeLog:
- changeSet:
    id: V063_RepoFileCount
    author: seafile
    changes:
    - dropPrimaryKey:
        tableName: repofilecount
        constraintName: RepoFileCount_pkey
    - addColumn:
        tableName: repofilecount
        columns:
        - column:
            name: id
            type: BIGINT
            autoIncrement: true
            constraints:
              primaryKey: true
              primaryKeyName: RepoFileCount_pkey
    - sql:
        dbms: mysql,mariadb
        sql: ALTER TABLE `repofilecount` MODIFY COLUMN `repo_id` CHAR(36)
    - modifyDataType:
        tableName: repofilecount
        columnName: repo_id
        newDataType: CHAR(36)
        dbms: postgresql
    - dropDefaultValue:
        tableName: repofilecount
        columnName: repo_id
    - addUniqueConstraint:
        tableName: repofilecount
        columnNames: repo_id
        constraintName: RepoFileCount_repo_id_uq
    preConditions:
      onFail: CONTINUE
      not:
        columnExists:
          tableName: repofilecount
          columnName: id
    failOnError: false
