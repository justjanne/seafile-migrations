databaseChangeLog:
- changeSet:
    id: normalize-sharedrepo
    author: seafile
    dbms: mysql,mariadb
    failOnError: false
    changes:
    - renameTable:
        oldTableName: SharedRepo
        newTableName: sharedrepo
- changeSet:
    id: V013_SharedRepo
    author: seafile
    changes:
    - createTable:
        tableName: sharedrepo
        columns:
        - column:
            name: repo_id
            type: char(37)
        - column:
            name: from_email
            type: varchar(512)
        - column:
            name: to_email
            type: varchar(512)
        - column:
            name: permission
            type: char(15)
    - createIndex:
        tableName: sharedrepo
        indexName: sharedrepo_repo_id_idx
        columns:
        - column:
            name: repo_id
    preConditions:
      onFail: MARK_RAN
      not:
        tableExists:
          tableName: sharedrepo
