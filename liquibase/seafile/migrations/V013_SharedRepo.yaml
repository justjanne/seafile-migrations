databaseChangeLog:
  - changeSet:
      id: V013_rename_SharedRepo_to_sharedrepo
      author: seafile
      failOnError: false
      preConditions:
        - tableExists:
            tableName: SharedRepo
      changes:
        - renameTable:
            oldTableName: SharedRepo
            newTableName: sharedrepo
  - changeSet:
      id: V013_create_sharedrepo
      author: seafile
      changes:
        - createTable:
            ifNotExists: true
            tableName: sharedrepo
            columns:
              - column:
                  name: repo_id
                  type: char(37)
              - column:
                  name: from_email
                  type: varchar(512)
              - column:
                  name: to_email
                  type: varchar(512)
              - column:
                  name: permission
                  type: char(15)
  - changeSet:
      id: V013_normalize_sharedrepo_repo_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: sharedrepo
            indexName: repo_id
      changes:
        - dropIndex:
            tableName: sharedrepo
            indexName: repo_id
  - changeSet:
      id: V013_add_index_to_sharedrepo_repo_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: sharedrepo
                indexName: idx_sharedrepo_repo_id
      changes:
        - createIndex:
            tableName: sharedrepo
            indexName: idx_sharedrepo_repo_id
            columns:
              - column:
                  name: repo_id
