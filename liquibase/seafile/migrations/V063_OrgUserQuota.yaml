databaseChangeLog:
  - {{migration_add_pkey(V063,OrgUserQuota,id)}}
  - changeSet:
      id: V063_normalize_orguserquota_org_id_idx
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: orguserquota
            indexName: org_id
      changes:
        - dropUniqueConstraint:
            tableName: orguserquota
            constraintName: org_id
  - changeSet:
      id: V063_normalize_orguserquota_org_id_user_key
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: orguserquota
            indexName: orguserquota_org_id_user_key
      changes:
        - dropUniqueConstraint:
            tableName: orguserquota
            constraintName: orguserquota_org_id_user_key
  - changeSet:
      id: V063_add_unique_constraint_to_orguserquota_org_id_user
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: orguserquota
                indexName: idx_orguserquota_org_id_user
      changes:
        - addUniqueConstraint:
            tableName: orguserquota
            columnNames: org_id, user
            constraintName: idx_orguserquota_org_id_user
