databaseChangeLog:
  - changeSet:
      id: V063_normalize_repotrash_pkey_drop
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          primaryKeyExists:
            tableName: repotrash
          not:
            - columnExists:
                tableName: repotrash
                columnName: id
      changes:
        - dropPrimaryKey:
            tableName: repotrash
  - changeSet:
      id: V063_normalize_repotrash_compound_pkey
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: repotrash
            indexName: repotrash_pkey
            columnNames: repo_id
      changes:
        - dropPrimaryKey:
            tableName: repotrash
  - changeSet:
      id: V063_normalize_repotrash_id_pkey_old
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: repotrash
            indexName: RepoTrash_id_pkey
      changes:
        - dropPrimaryKey:
            tableName: repotrash
            constraintName: RepoTrash_id_pkey
  - changeSet:
      id: V063_add_id_to_repotrash
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - columnExists:
                tableName: repotrash
                columnName: id
      changes:
        - addColumn:
            tableName: repotrash
            ifNotExists: true
            columns:
              - column:
                  name: id
                  type: bigserial
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: repotrash_pkey
  - changeSet:
      id: V063_change_id_type_in_repotrash
      author: seafile
      changes:
        - modifyDataType:
            tableName: repotrash
            columnName: id
            newDataType: bigserial
  - changeSet:
      id: V063_normalize_repotrash_pkey
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - primaryKeyExists:
                tableName: repotrash
      changes:
        - addPrimaryKey:
            tableName: repotrash
            columnNames: id
            constraintName: repotrash_pkey
  - changeSet:
      id: V063_normalize_repotrash_id_autoincrement
      author: seafile
      dbms: mysql,mariadb
      changes:
        - addAutoIncrement:
            tableName: repotrash
            columnName: id
            columnDataType: bigint
  - changeSet:
      id: V063_normalize_repotrash_repo_id_idx
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: repotrash
            indexName: repo_id
      changes:
        - dropUniqueConstraint:
            tableName: repotrash
            constraintName: repo_id
  - changeSet:
      id: V063_normalize_repotrash_repo_id_type
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          columnExists:
            tableName: repotrash
            columnName: repo_id
      changes:
        - modifyDataType:
            tableName: repotrash
            columnName: repo_id
            newDataType: varchar(41)
  - changeSet:
      id: V063_normalize_repotrash_head_id_type
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          columnExists:
            tableName: repotrash
            columnName: head_id
      changes:
        - modifyDataType:
            tableName: repotrash
            columnName: head_id
            newDataType: varchar(41)
  - changeSet:
      id: V063_add_unique_constraint_to_repotrash_repo_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: repotrash
                indexName: idx_repotrash_repo_id
      changes:
        - addUniqueConstraint:
            tableName: repotrash
            columnNames: repo_id
            constraintName: idx_repotrash_repo_id
