databaseChangeLog:
  - changeSet:
      id: V063_drop_primary_key_from_repotrash
      author: seafile
      comment: "Legacy/Normalization: Prepare for structural PK change by dropping old PK."
      preConditions:
        - onFail: MARK_RAN
          primaryKeyExists:
            tableName: repotrash
          not:
            - columnExists:
                tableName: repotrash
                columnName: id
      changes:
        - dropPrimaryKey:
            tableName: repotrash
  - changeSet:
      id: V063_normalize_repotrash_compound_pkey
      author: seafile
      comment: "Legacy/Normalization: Drop old compound primary key."
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: repotrash
            indexName: repotrash_pkey
            columnNames: repo_id
      changes:
        - dropPrimaryKey:
            tableName: repotrash
  - changeSet:
      id: V063_normalize_repotrash_id_pkey
      author: seafile
      comment: "Legacy/Normalization: Drop old named primary key."
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: repotrash
            indexName: RepoTrash_id_pkey
      changes:
        - dropPrimaryKey:
            tableName: repotrash
            constraintName: RepoTrash_id_pkey
  - changeSet:
      id: V063_add_id_to_repotrash
      author: seafile
      comment: "Regular Migration: Structural PK change - add bigint id column as primary key."
      preConditions:
        - onFail: MARK_RAN
          not:
            - columnExists:
                tableName: repotrash
                columnName: id
      changes:
        - addColumn:
            tableName: repotrash
            ifNotExists: true
            columns:
              - column:
                  name: id
                  type: bigserial
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: repotrash_pkey
  - changeSet:
      id: V063_change_id_type_in_repotrash
      author: seafile
      comment: "Regular Migration: Ensure id column is bigint/bigserial."
      changes:
        - modifyDataType:
            tableName: repotrash
            columnName: id
            newDataType: bigserial
  - changeSet:
      id: V063_normalize_repotrash_pkey
      author: seafile
      comment: "Regular Migration: Ensure id column is the primary key."
      preConditions:
        - onFail: MARK_RAN
          not:
            - primaryKeyExists:
                tableName: repotrash
      changes:
        - addPrimaryKey:
            tableName: repotrash
            columnNames: id
            constraintName: repotrash_pkey
  - changeSet:
      id: V063_normalize_repotrash_id_autoincrement
      author: seafile
      comment: "Regular Migration: Add auto-increment to id for MySQL/MariaDB."
      dbms: mysql,mariadb
      changes:
        - addAutoIncrement:
            tableName: repotrash
            columnName: id
            columnDataType: bigint
  - changeSet:
      id: V063_normalize_repotrash_repo_id_idx
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: repotrash
            indexName: repo_id
      changes:
        - dropUniqueConstraint:
            tableName: repotrash
            constraintName: repo_id
  - changeSet:
      id: V063_add_unique_constraint_to_repotrash_repo_id
      author: seafile
      comment: "Regular Migration: Add unique constraint on old key columns."
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: repotrash
                indexName: idx_repotrash_repo_id
      changes:
        - addUniqueConstraint:
            tableName: repotrash
            columnNames: repo_id
            constraintName: idx_repotrash_repo_id
