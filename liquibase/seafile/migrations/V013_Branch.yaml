databaseChangeLog:
  - changeSet:
      id: V013_Branch
      author: seafile
      changes:
        - createTable:
            tableName: Branch
            columns:
              - column:
                  name: name
                  type: varchar(10)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: repo_id
                  type: char(41)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: commit_id
                  type: char(41)
