databaseChangeLog:
  - changeSet:
      id: V042_rename_UserShareQuota_to_usersharequota
      author: seafile
      failOnError: false
      preConditions:
        - tableExists:
            tableName: UserShareQuota
      changes:
        - renameTable:
            oldTableName: UserShareQuota
            newTableName: usersharequota
  - changeSet:
      id: V042_normalize_usersharequota_user
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          columnExists:
            tableName: usersharequota
            columnName: user
      changes:
        - addNotNullConstraint:
            tableName: usersharequota
            columnName: user
            columnDataType: varchar(255)
            defaultNullValue: ""
        - dropDefaultValue:
            tableName: usersharequota
            columnName: user
  - changeSet:
      id: V042_create_usersharequota
      author: seafile
      changes:
        - createTable:
            ifNotExists: true
            tableName: usersharequota
            columns:
              - column:
                  name: user
                  type: varchar(255)
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: usersharequota_pkey
              - column:
                  name: quota
                  type: bigint
