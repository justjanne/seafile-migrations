databaseChangeLog:
  - changeSet:
      id: v021-normalize-systeminfo
      author: seafile
      failOnError: false
      dbms: mysql,mariadb
      changes:
        - renameTable:
            oldTableName: SystemInfo
            newTableName: systeminfo
  - changeSet:
      id: v021-create-systeminfo
      author: seafile
      preConditions:
        onFail: MARK_RAN
        not:
          tableExists:
            tableName: systeminfo
      changes:
        - createTable:
            tableName: systeminfo
            columns:
              - column: { name: info_key, type: varchar(256) }
              - column: { name: info_value, type: varchar(1024) }
