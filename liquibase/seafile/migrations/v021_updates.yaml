databaseChangeLog:
  - changeSet:
      id: v021-create-systeminfo
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          sqlCheck:
            expectedResult: 0
            sql: "${table_exists_query} 'systeminfo'"
      changes:
        - createTable:
            tableName: systeminfo
            columns:
              - column: { name: info_key, type: varchar(256) }
              - column: { name: info_value, type: varchar(1024) }
