databaseChangeLog:
  - changeSet:
      id: v021-create-systeminfo
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not: { tableExists: { tableName: "${t_SystemInfo}" } }
      changes:
        - createTable:
            tableName: "${t_SystemInfo}"
            columns:
              - column: { name: info_key, type: varchar(256) }
              - column: { name: info_value, type: varchar(1024) }
