databaseChangeLog:
  - changeSet:
      id: V070_rename_RepoStorageId_to_repostorageid
      author: seafile
      failOnError: false
      preConditions:
        - tableExists:
            tableName: RepoStorageId
      changes:
        - renameTable:
            oldTableName: RepoStorageId
            newTableName: repostorageid
  - changeSet:
      id: V070_create_repostorageid
      author: seafile
      changes:
        - createTable:
            ifNotExists: true
            tableName: repostorageid
            columns:
              - column:
                  name: id
                  type: bigserial
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: repostorageid_pkey
              - column:
                  name: repo_id
                  type: varchar(41)
                  constraints:
                    nullable: false
              - column:
                  name: storage_id
                  type: varchar(255)
                  constraints:
                    nullable: false
  - changeSet:
      id: V070_normalize_repostorageid_repo_id_type
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          columnExists:
            tableName: repostorageid
            columnName: repo_id
      changes:
        - modifyDataType:
            tableName: repostorageid
            columnName: repo_id
            newDataType: varchar(41)
  - changeSet:
      id: V070_normalize_repostorageid_repo_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: repostorageid
            indexName: repo_id
      changes:
        - dropUniqueConstraint:
            tableName: repostorageid
            constraintName: repo_id
  - changeSet:
      id: V070_normalize_repostorageid_repo_id_key
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: repostorageid
            indexName: repostorageid_repo_id_key
      changes:
        - dropUniqueConstraint:
            tableName: repostorageid
            constraintName: repostorageid_repo_id_key
  - changeSet:
      id: V070_add_unique_constraint_to_repostorageid_repo_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: repostorageid
                indexName: idx_repostorageid_repo_id
      changes:
        - addUniqueConstraint:
            tableName: repostorageid
            columnNames: repo_id
            constraintName: idx_repostorageid_repo_id
