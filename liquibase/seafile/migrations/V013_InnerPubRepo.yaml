databaseChangeLog:
  - changeSet:
      id: V013_rename_InnerPubRepo_to_innerpubrepo
      author: seafile
      failOnError: false
      preConditions:
        - tableExists:
            tableName: InnerPubRepo
      changes:
        - renameTable:
            oldTableName: InnerPubRepo
            newTableName: innerpubrepo
  - changeSet:
      id: V013_normalize_innerpubrepo_repo_id
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          columnExists:
            tableName: innerpubrepo
            columnName: repo_id
      changes:
        - addNotNullConstraint:
            tableName: innerpubrepo
            columnName: repo_id
            columnDataType: varchar(41)
            defaultNullValue: ""
        - dropDefaultValue:
            tableName: innerpubrepo
            columnName: repo_id
  - changeSet:
      id: V013_normalize_innerpubrepo_repo_id_type
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          columnExists:
            tableName: innerpubrepo
            columnName: repo_id
      changes:
        - modifyDataType:
            tableName: innerpubrepo
            columnName: repo_id
            newDataType: varchar(41)
  - changeSet:
      id: V013_normalize_innerpubrepo_permission_type
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          columnExists:
            tableName: innerpubrepo
            columnName: permission
      changes:
        - modifyDataType:
            tableName: innerpubrepo
            columnName: permission
            newDataType: varchar(15)
  - changeSet:
      id: V013_create_innerpubrepo
      author: seafile
      changes:
        - createTable:
            ifNotExists: true
            tableName: innerpubrepo
            columns:
              - column:
                  name: repo_id
                  type: varchar(41)
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: innerpubrepo_pkey
              - column:
                  name: permission
                  type: varchar(15)
