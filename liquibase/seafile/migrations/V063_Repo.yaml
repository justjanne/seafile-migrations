databaseChangeLog:
  - changeSet:
      id: V063_drop_primary_key_from_repo
      author: seafile
      comment: "Legacy/Normalization: Prepare for structural PK change by dropping old PK."
      preConditions:
        - onFail: MARK_RAN
          primaryKeyExists:
            tableName: repo
          not:
            - columnExists:
                tableName: repo
                columnName: id
      changes:
        - dropPrimaryKey:
            tableName: repo
  - changeSet:
      id: V063_normalize_repo_compound_pkey
      author: seafile
      comment: "Legacy/Normalization: Drop old compound primary key."
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: repo
            indexName: repo_pkey
            columnNames: repo_id
      changes:
        - dropPrimaryKey:
            tableName: repo
  - changeSet:
      id: V063_normalize_repo_id_pkey
      author: seafile
      comment: "Legacy/Normalization: Drop old named primary key."
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: repo
            indexName: Repo_id_pkey
      changes:
        - dropPrimaryKey:
            tableName: repo
            constraintName: Repo_id_pkey
  - changeSet:
      id: V063_add_id_to_repo
      author: seafile
      comment: "Regular Migration: Structural PK change - add bigint id column as primary key."
      preConditions:
        - onFail: MARK_RAN
          not:
            - columnExists:
                tableName: repo
                columnName: id
      changes:
        - addColumn:
            tableName: repo
            ifNotExists: true
            columns:
              - column:
                  name: id
                  type: bigserial
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: repo_pkey
  - changeSet:
      id: V063_change_id_type_in_repo
      author: seafile
      comment: "Regular Migration: Ensure id column is bigint/bigserial."
      changes:
        - modifyDataType:
            tableName: repo
            columnName: id
            newDataType: bigserial
  - changeSet:
      id: V063_normalize_repo_pkey
      author: seafile
      comment: "Regular Migration: Ensure id column is the primary key."
      preConditions:
        - onFail: MARK_RAN
          not:
            - primaryKeyExists:
                tableName: repo
      changes:
        - addPrimaryKey:
            tableName: repo
            columnNames: id
            constraintName: repo_pkey
  - changeSet:
      id: V063_normalize_repo_id_autoincrement
      author: seafile
      comment: "Regular Migration: Add auto-increment to id for MySQL/MariaDB."
      dbms: mysql,mariadb
      changes:
        - addAutoIncrement:
            tableName: repo
            columnName: id
            columnDataType: bigint
  - changeSet:
      id: V063_normalize_repo_repo_id_idx
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          indexExists:
            tableName: repo
            indexName: repo_id
      changes:
        - dropUniqueConstraint:
            tableName: repo
            constraintName: repo_id
  - changeSet:
      id: V063_add_unique_constraint_to_repo_repo_id
      author: seafile
      comment: "Regular Migration: Add unique constraint on old key columns."
      preConditions:
        - onFail: MARK_RAN
          not:
            - indexExists:
                tableName: repo
                indexName: idx_repo_repo_id
      changes:
        - addUniqueConstraint:
            tableName: repo
            columnNames: repo_id
            constraintName: idx_repo_repo_id
