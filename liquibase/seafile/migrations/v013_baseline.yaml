databaseChangeLog:
  # --- branch ---
  - changeSet:
      id: v013-normalize-branch
      author: seafile
      dbms: mysql,mariadb
      preConditions:
        - onFail: CONTINUE
          tableExists:
            tableName: Branch
        - onFail: CONTINUE
          not:
            tableExists:
              tableName: branch
      changes:
        - renameTable:
            oldTableName: Branch
            newTableName: branch

  - changeSet:
      id: v013-baseline-branch
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            tableExists:
              tableName: branch
      changes:
        - createTable:
            tableName: branch
            columns:
              - column:
                  name: name
                  type: varchar(10)
                  constraints:
                    nullable: false
              - column:
                  name: repo_id
                  type: char(41)
                  constraints:
                    nullable: false
              - column:
                  name: commit_id
                  type: char(41)
        - addPrimaryKey:
            tableName: branch
            columnNames: "repo_id, name"
            constraintName: pk_branch

