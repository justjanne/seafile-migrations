databaseChangeLog:
  - changeSet:
      id: v013-baseline-branch
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            tableExists:
              tableName: branch
      changes:
        - createTable:
            tableName: branch
            columns:
              - column:
                  name: name
                  type: varchar(10)
                  constraints:
                    nullable: false
              - column:
                  name: repo_id
                  type: char(41)
                  constraints:
                    nullable: false
              - column:
                  name: commit_id
                  type: char(41)
        - addPrimaryKey:
            columnNames: repo_id, name
            constraintName: pk_branch
            tableName: branch

  - changeSet:
      id: v013-baseline-innerpubrepo
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            tableExists:
              tableName: innerpubrepo
      changes:
        - createTable:
            tableName: innerpubrepo
            columns:
              - column:
                  name: repo_id
                  type: char(37)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: permission
                  type: char(15)

  - changeSet:
      id: v013-baseline-orgquota
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            tableExists:
              tableName: orgquota
      changes:
        - createTable:
            tableName: orgquota
            columns:
              - column:
                  name: org_id
                  type: int
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: quota
                  type: bigint

  - changeSet:
      id: v013-baseline-orguserquota
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            tableExists:
              tableName: orguserquota
      changes:
        - createTable:
            tableName: orguserquota
            columns:
              - column:
                  name: org_id
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: user
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: quota
                  type: bigint
        - addPrimaryKey:
            columnNames: org_id, user
            constraintName: pk_orguserquota
            tableName: orguserquota

  - changeSet:
      id: v013-baseline-repo
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            tableExists:
              tableName: repo
      changes:
        - createTable:
            tableName: repo
            columns:
              - column:
                  name: repo_id
                  type: char(37)
                  constraints:
                    primaryKey: true
                    nullable: false

  - changeSet:
      id: v013-baseline-repogroup
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          not:
            tableExists:
              tableName: repogroup
      changes:
        - createTable:
            tableName: repogroup
            columns:
              - column:
                  name: repo_id
                  type: char(37)
              - column:
                  name: group_id
                  type: int
              - column:
                  name: user_name
                  type: varchar(255)
              - column:
                  name: permission
                  type: char(15)
        - addUniqueConstraint:
            columnNames: group_id, repo_id
            constraintName: uq_repogroup_group_repo
            tableName: repogroup
        - createIndex:
            indexName: idx_repogroup_repo_id
            tableName: repogroup
            columns:
              - column:
                  name: repo_id
        - createIndex:
            indexName: idx_repogroup_user_name
            tableName: repogroup
            columns:
              - column:
                  name: user_name

