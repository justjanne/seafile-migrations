databaseChangeLog:
  - changeSet:
      id: v013-baseline-branch
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          sqlCheck: { expectedResult: 0, sql: "${table_exists_query} 'branch'" }
      changes:
        - createTable:
            tableName: "${t_Branch}"
            columns:
              - column: { name: name, type: varchar(10), constraints: { nullable: false } }
              - column: { name: repo_id, type: char(41), constraints: { nullable: false } }
              - column: { name: commit_id, type: char(41) }
        - addPrimaryKey: { columnNames: "repo_id, name", constraintName: pk_branch, tableName: "${t_Branch}" }

  - changeSet:
      id: v013-baseline-innerpubrepo
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          sqlCheck: { expectedResult: 0, sql: "${table_exists_query} 'innerpubrepo'" }
      changes:
        - createTable:
            tableName: "${t_InnerPubRepo}"
            columns:
              - column: { name: repo_id, type: char(37), constraints: { primaryKey: true, nullable: false } }
              - column: { name: permission, type: char(15) }

  - changeSet:
      id: v013-baseline-orgquota
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          sqlCheck: { expectedResult: 0, sql: "${table_exists_query} 'orgquota'" }
      changes:
        - createTable:
            tableName: "${t_OrgQuota}"
            columns:
              - column: { name: org_id, type: int, constraints: { primaryKey: true, nullable: false } }
              - column: { name: quota, type: bigint }

  - changeSet:
      id: v013-baseline-orguserquota
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          sqlCheck: { expectedResult: 0, sql: "${table_exists_query} 'orguserquota'" }
      changes:
        - createTable:
            tableName: "${t_OrgUserQuota}"
            columns:
              - column: { name: org_id, type: int, constraints: { nullable: false } }
              - column: { name: user, type: varchar(255), constraints: { nullable: false } }
              - column: { name: quota, type: bigint }
        - addPrimaryKey: { columnNames: "org_id, user", constraintName: pk_orguserquota, tableName: "${t_OrgUserQuota}" }

  - changeSet:
      id: v013-baseline-repo
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          sqlCheck: { expectedResult: 0, sql: "${table_exists_query} 'repo'" }
      changes:
        - createTable:
            tableName: "${t_Repo}"
            columns:
              - column: { name: repo_id, type: char(37), constraints: { primaryKey: true, nullable: false } }

  - changeSet:
      id: v013-baseline-repogroup
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          sqlCheck: { expectedResult: 0, sql: "${table_exists_query} 'repogroup'" }
      changes:
        - createTable:
            tableName: "${t_RepoGroup}"
            columns:
              - column: { name: repo_id, type: char(37) }
              - column: { name: group_id, type: int }
              - column: { name: user_name, type: varchar(255) }
              - column: { name: permission, type: char(15) }
        - addUniqueConstraint: { columnNames: "group_id, repo_id", constraintName: uq_repogroup_group_repo, tableName: "${t_RepoGroup}" }
        - createIndex: { indexName: idx_repogroup_repo_id, tableName: "${t_RepoGroup}", columns: [ { name: repo_id } ] }
        - createIndex: { indexName: idx_repogroup_user_name, tableName: "${t_RepoGroup}", columns: [ { name: user_name } ] }

  - changeSet:
      id: v013-baseline-repohead
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          sqlCheck: { expectedResult: 0, sql: "${table_exists_query} 'repohead'" }
