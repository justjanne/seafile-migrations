              - column: { name: to_email, type: varchar(512) }
              - column: { name: permission, type: char(15) }
        - createIndex: { indexName: idx_sharedrepo_repo_id, tableName: "${t_SharedRepo}", columns: [ { name: repo_id } ] }

  - changeSet:
      id: v013-baseline-userquota
      author: seafile
      preConditions:
        - onFail: MARK_RAN
          sqlCheck: { expectedResult: 0, sql: "${table_exists_query} 'userquota'" }
      changes:
        - createTable:
